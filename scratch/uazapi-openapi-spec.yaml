openapi: 3.1.0
info:
  title: uazapiGO - WhatsApp API
  version: 2.1.1
  x-logo:
    url: /uazapi-logo.png
  description: >
    API para gerenciamento de instâncias do WhatsApp e comunicações.


    ## ⚠️ Recomendação Importante: WhatsApp Business

    **É ALTAMENTE RECOMENDADO usar contas do WhatsApp Business** em vez do WhatsApp normal para integração, o WhatsApp
    normal pode apresentar inconsistências, desconexões, limitações e instabilidades durante o uso com a nossa API.


    ## Autenticação

    - Endpoints regulares requerem um header 'token' com o token da instância

    - Endpoints administrativos requerem um header 'admintoken'


    ## Estados da Instância

    As instâncias podem estar nos seguintes estados:

    - `disconnected`: Desconectado do WhatsApp

    - `connecting`: Em processo de conexão

    - `connected`: Conectado e autenticado com sucesso

    - `hibernated`: Sessão pausada, com credenciais preservadas para reconexão


    ## Limites de Uso

    - O servidor possui um limite máximo de instâncias conectadas

    - Quando o limite é atingido, novas tentativas receberão erro 429

    - Servidores gratuitos/demo podem ter restrições adicionais de tempo de vida
servers:
  - url: https://{subdomain}.uazapi.com
    description: Servidor da API uazapiGO
    variables:
      subdomain:
        enum:
          - free
          - api
        default: free
components:
  securitySchemes:
    token:
      name: token
      type: apiKey
      in: header
    admintoken:
      name: admintoken
      type: apiKey
      in: header
      description: Token de administrador para endpoints administrativos
  schemas:
    Instance:
      type: object
      description: Representa uma instância do WhatsApp
      properties:
        id:
          type: string
          format: uuid
          description: ID único gerado automaticamente
        token:
          type: string
          description: Token de autenticação da instância
        status:
          type: string
          description: Status atual da conexão
          enum:
            - disconnected
            - connecting
            - connected
            - hibernated
        paircode:
          type: string
          description: Código de pareamento
        qrcode:
          type: string
          description: QR Code em base64 para autenticação
        name:
          type: string
          description: Nome da instância
        profileName:
          type: string
          description: Nome do perfil WhatsApp
        profilePicUrl:
          type: string
          format: uri
          description: URL da foto do perfil
        isBusiness:
          type: boolean
          description: Indica se é uma conta business
        plataform:
          type: string
          description: Plataforma de origem (iOS/Android/Web)
        systemName:
          type: string
          description: Nome do sistema operacional
        owner:
          type: string
          description: Proprietário da instância
        current_presence:
          type: string
          description: Status atual de presença da instância (campo não persistido)
          enum:
            - available
            - unavailable
          example: available
        lastDisconnect:
          type: string
          format: date-time
          description: Data/hora da última desconexão
        lastDisconnectReason:
          type: string
          description: Motivo da última desconexão
        adminField01:
          type: string
          description: Campo administrativo 01
        adminField02:
          type: string
          description: Campo administrativo 02
        openai_apikey:
          type: string
          description: Chave da API OpenAI
        chatbot_enabled:
          type: boolean
          description: Habilitar chatbot automático
        chatbot_ignoreGroups:
          type: boolean
          description: Ignorar mensagens de grupos
        chatbot_stopConversation:
          type: string
          description: Palavra-chave para parar conversa
        chatbot_stopMinutes:
          type: integer
          description: Por quanto tempo ficará pausado o chatbot ao usar stop conversation
        chatbot_stopWhenYouSendMsg:
          type: integer
          description: Por quanto tempo ficará pausada a conversa quando você enviar mensagem manualmente
        fieldsMap:
          type: object
          description: Mapa de campos customizados da instância (quando presente)
          additionalProperties: true
        currentTime:
          type: string
          description: Horário atual retornado pelo backend
        created:
          type: string
          format: date-time
          description: Data de criação da instância
        updated:
          type: string
          format: date-time
          description: Data da última atualização
      example:
        id: i91011ijkl
        token: abc123xyz
        status: connected
        paircode: 1234-5678
        qrcode: data:image/png;base64,iVBORw0KGg...
        name: Instância Principal
        profileName: Loja ABC
        profilePicUrl: https://example.com/profile.jpg
        isBusiness: true
        plataform: Android
        systemName: uazapi
        owner: user@example.com
        lastDisconnect: '2025-01-24T14:00:00Z'
        lastDisconnectReason: Network error
        adminField01: custom_data
        openai_apikey: sk-...xyz
        chatbot_enabled: true
        chatbot_ignoreGroups: true
        chatbot_stopConversation: parar
        chatbot_stopMinutes: 60
        created: '2025-01-24T14:00:00Z'
        updated: '2025-01-24T14:30:00Z'
        currentPresence: available
    Webhook:
      type: object
      description: Configuração completa de webhook com filtros e opções avançadas
      properties:
        id:
          type: string
          format: uuid
          description: ID único gerado automaticamente
        enabled:
          type: boolean
          description: Webhook ativo/inativo
          default: false
        url:
          type: string
          format: uri
          description: URL de destino dos eventos
        events:
          type: array
          items:
            type: string
            enum:
              - connection
              - history
              - messages
              - messages_update
              - newsletter_messages
              - call
              - contacts
              - presence
              - groups
              - labels
              - chats
              - chat_labels
              - blocks
              - sender
          description: Tipos de eventos monitorados
        addUrlTypesMessages:
          type: boolean
          description: Incluir na URLs o tipo de mensagem
          default: false
        addUrlEvents:
          type: boolean
          description: Incluir na URL o nome do evento
          default: false
        excludeMessages:
          type: array
          items:
            type: string
            enum:
              - wasSentByApi
              - wasNotSentByApi
              - fromMeYes
              - fromMeNo
              - isGroupYes
              - isGroupNo
          description: Filtros para excluir tipos de mensagens
      required:
        - url
        - events
      example:
        id: wh_9a8b7c6d5e
        enabled: true
        url: https://webhook.cool/example
        events:
          - messages
          - newsletter_messages
          - connection
        addUrlTypesMessages: false
        addUrlEvents: false
        excludeMessages: []
    Chat:
      type: object
      description: Representa uma conversa/chamado no sistema
      properties:
        id:
          type: string
          description: ID único da conversa (r + 7 bytes aleatórios em hex)
        wa_fastid:
          type: string
          description: Identificador rápido do WhatsApp
        wa_chatid:
          type: string
          description: ID completo do chat no WhatsApp
        wa_chatlid:
          type: string
          description: LID do chat no WhatsApp (quando disponível)
        wa_archived:
          type: boolean
          description: Indica se o chat está arquivado
          default: false
        wa_contactName:
          type: string
          description: |
            Nome salvo nos contatos pelo dono da conta/instância.
            Só existe quando o número estiver salvo na agenda/contatos.
          default: ''
        wa_name:
          type: string
          description: |
            Nome definido pelo usuário no perfil do WhatsApp ("push name").
            Vem do perfil do contato e pode não estar disponível dependendo do contexto ou da origem dos dados.
          default: ''
        name:
          type: string
          description: >
            Nome resolvido pelo sistema como fallback.

            Normalmente consolida o melhor valor disponível entre dados internos, nome vindo do WhatsApp e nome salvo
            nos contatos.

            Por isso, costuma ter maior chance de vir preenchido.
          default: ''
        image:
          type: string
          description: URL da imagem do chat
          default: ''
        imagePreview:
          type: string
          description: URL da miniatura da imagem
          default: ''
        wa_ephemeralExpiration:
          type: integer
          format: int64
          description: Tempo de expiração de mensagens efêmeras
          default: 0
        wa_isBlocked:
          type: boolean
          description: Indica se o contato está bloqueado
          default: false
        wa_isGroup:
          type: boolean
          description: Indica se é um grupo
          default: false
        wa_isGroup_admin:
          type: boolean
          description: Indica se o usuário é admin do grupo
          default: false
        wa_isGroup_announce:
          type: boolean
          description: Indica se é um grupo somente anúncios
          default: false
        wa_isGroup_community:
          type: boolean
          description: Indica se é uma comunidade
          default: false
        wa_isGroup_member:
          type: boolean
          description: Indica se é membro do grupo
          default: false
        wa_isPinned:
          type: boolean
          description: Indica se o chat está fixado
          default: false
        wa_label:
          type: array
          description: Labels do chat
          items:
            type: string
        wa_notes:
          type: string
          description: Anotações internas do chat sincronizadas via app state
          default: ''
        wa_lastMessageTextVote:
          type: string
          description: Texto/voto da última mensagem
          default: ''
        wa_lastMessageType:
          type: string
          description: Tipo da última mensagem
          default: ''
        wa_lastMsgTimestamp:
          type: integer
          format: int64
          description: Timestamp da última mensagem
          default: 0
        wa_lastMessageSender:
          type: string
          description: Remetente da última mensagem
          default: ''
        wa_muteEndTime:
          type: integer
          format: int64
          description: Timestamp do fim do silenciamento
          default: 0
        owner:
          type: string
          description: Dono da instância
          default: ''
        wa_unreadCount:
          type: integer
          format: int64
          description: Contador de mensagens não lidas
          default: 0
        phone:
          type: string
          description: Número de telefone
          default: ''
        common_groups:
          type: string
          description: 'Grupos em comum separados por vírgula, formato: (nome_grupo)id_grupo'
          default: ''
          example: Grupo Família(120363123456789012@g.us),Trabalho(987654321098765432@g.us)
        lead_name:
          type: string
          description: Nome do lead
          default: ''
        lead_fullName:
          type: string
          description: Nome completo do lead
          default: ''
        lead_email:
          type: string
          description: Email do lead
          default: ''
        lead_personalid:
          type: string
          description: Documento de identificação
          default: ''
        lead_status:
          type: string
          description: Status do lead
          default: ''
        lead_tags:
          type: array
          description: Tags do lead
          items:
            type: string
        lead_notes:
          type: string
          description: Anotações sobre o lead
          default: ''
        lead_isTicketOpen:
          type: boolean
          description: Indica se tem ticket aberto
          default: false
        lead_assignedAttendant_id:
          type: string
          description: ID do atendente responsável
          default: ''
        lead_kanbanOrder:
          type: integer
          format: int64
          description: Ordem no kanban
          default: 0
        lead_field01:
          type: string
          default: ''
        lead_field02:
          type: string
          default: ''
        lead_field03:
          type: string
          default: ''
        lead_field04:
          type: string
          default: ''
        lead_field05:
          type: string
          default: ''
        lead_field06:
          type: string
          default: ''
        lead_field07:
          type: string
          default: ''
        lead_field08:
          type: string
          default: ''
        lead_field09:
          type: string
          default: ''
        lead_field10:
          type: string
          default: ''
        lead_field11:
          type: string
          default: ''
        lead_field12:
          type: string
          default: ''
        lead_field13:
          type: string
          default: ''
        lead_field14:
          type: string
          default: ''
        lead_field15:
          type: string
          default: ''
        lead_field16:
          type: string
          default: ''
        lead_field17:
          type: string
          default: ''
        lead_field18:
          type: string
          default: ''
        lead_field19:
          type: string
          default: ''
        lead_field20:
          type: string
          default: ''
        chatbot_agentResetMemoryAt:
          type: integer
          format: int64
          description: Timestamp do último reset de memória
          default: 0
        chatbot_lastTrigger_id:
          type: string
          description: ID do último gatilho executado
          default: ''
        chatbot_lastTriggerAt:
          type: integer
          format: int64
          description: Timestamp do último gatilho
          default: 0
        chatbot_disableUntil:
          type: integer
          format: int64
          description: Timestamp até quando chatbot está desativado
          default: 0
    Message:
      type: object
      description: Representa uma mensagem trocada no sistema
      properties:
        id:
          type: string
          format: uuid
          description: ID único interno da mensagem (formato r + 7 caracteres hex aleatórios)
        messageid:
          type: string
          description: ID original da mensagem no provedor
        chatid:
          type: string
          description: ID da conversa relacionada
        sender:
          type: string
          description: ID do remetente da mensagem
        senderName:
          type: string
          description: Nome exibido do remetente
        isGroup:
          type: boolean
          description: Indica se é uma mensagem de grupo
          default: false
        fromMe:
          type: boolean
          description: Indica se a mensagem foi enviada pelo usuário
          default: false
        messageType:
          type: string
          description: Tipo de conteúdo da mensagem
        source:
          type: string
          description: Plataforma de origem da mensagem
        messageTimestamp:
          type: integer
          description: Timestamp original da mensagem em milissegundos
          default: 0
        status:
          type: string
          description: |
            Status do ciclo de vida da mensagem.
            Exemplos comuns: `Queued`, `Canceled`, `Failed`, `Sent`, `Delivered`, `Read`.
        text:
          type: string
          description: Texto original da mensagem
          default: ''
        quoted:
          type: string
          description: ID da mensagem citada/respondida
          default: ''
        edited:
          type: string
          description: Histórico de edições da mensagem
          default: ''
        reaction:
          type: string
          description: ID da mensagem reagida
          default: ''
        vote:
          type: string
          description: Dados de votação de enquete e listas
          default: ''
        convertOptions:
          type: string
          description: Conversão de opções da mensagem, lista, enquete e botões
          default: ''
        buttonOrListid:
          type: string
          description: ID do botão ou item de lista selecionado
          default: ''
        owner:
          type: string
          description: Dono da mensagem
          default: ''
        error:
          type: string
          description: Mensagem de erro caso o envio tenha falhado
          default: ''
        content:
          description: Conteúdo bruto da mensagem (JSON serializado ou texto)
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
              description: Texto bruto quando não for JSON
        wasSentByApi:
          type: boolean
          description: Indica se a mensagem foi enviada via API
        sendFunction:
          type: string
          description: Função usada para enviar a mensagem (quando enviada via API)
        sendPayload:
          description: Payload enviado (texto/JSON serializado)
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
              description: Texto bruto quando não for JSON
        fileURL:
          type: string
          description: URL ou referência de arquivo da mensagem
        send_folder_id:
          type: string
          description: Pasta associada ao envio (quando aplicável)
        track_source:
          type: string
          description: Origem de rastreamento
        track_id:
          type: string
          description: ID de rastreamento (pode repetir)
        ai_metadata:
          type: object
          description: Metadados do processamento por IA
          properties:
            agent_id:
              type: string
              description: ID do agente de IA responsável
            request:
              type: object
              description: Dados da requisição à API de IA
              properties:
                messages:
                  type: array
                  description: Histórico de mensagens enviadas para a API
                tools:
                  type: array
                  description: Ferramentas disponíveis para o agente
                options:
                  type: object
                  description: Opções de configuração da API
                  properties:
                    model:
                      type: string
                    temperature:
                      type: number
                    maxTokens:
                      type: integer
                    topP:
                      type: number
                    frequencyPenalty:
                      type: number
                    presencePenalty:
                      type: number
            response:
              type: object
              description: Resposta da API de IA
              properties:
                choices:
                  type: array
                  description: Resultados retornados pela API
                toolResults:
                  type: array
                  description: Resultados da execução de ferramentas
                error:
                  type: string
                  description: Mensagem de erro, se houver
        sender_pn:
          type: string
          description: JID PN resolvido do remetente (quando disponível)
        sender_lid:
          type: string
          description: LID original do remetente (quando disponível)
    Label:
      type: object
      description: Representa uma etiqueta/categoria no sistema
      properties:
        id:
          type: string
          format: uuid
          description: ID único da etiqueta
        name:
          type: string
          description: Nome da etiqueta
        color:
          type: integer
          description: Índice numérico da cor (0-19)
          minimum: 0
          maximum: 19
          example: 2
        colorHex:
          type: string
          description: Cor hexadecimal correspondente ao índice
          enum:
            - '#ff9484'
            - '#64c4ff'
            - '#fed428'
            - '#dfaef0'
            - '#9ab6c1'
            - '#56ccb4'
            - '#fe9dfe'
            - '#d3a91f'
            - '#6f7bcf'
            - '#d8e651'
            - '#01d0e2'
            - '#ffc5c7'
            - '#92ceac'
            - '#f64847'
            - '#00a1f2'
            - '#83e421'
            - '#ffae04'
            - '#b4ebff'
            - '#9ba6ff'
            - '#9568cf'
          example: '#fed428'
        labelid:
          type: string
          description: ID da label no WhatsApp (quando sincronizada)
        owner:
          type: string
          description: Dono da etiqueta
        created:
          type: string
          format: date-time
          description: Data de criação
        updated:
          type: string
          format: date-time
          description: Data da última atualização
      example:
        id: l121314mnop
        name: Cliente VIP
        color: 2
        colorHex: '#fed428'
        created: '2025-01-24T14:35:00.000Z'
        updated: '2025-01-24T15:00:00.000Z'
    Attendant:
      type: object
      description: Modelo de atendente do sistema
      properties:
        id:
          type: string
          format: uuid
          description: ID único gerado automaticamente
        name:
          type: string
          description: Nome do atendente
          default: ''
        phone:
          type: string
          description: Número de telefone
          default: ''
        email:
          type: string
          format: email
          description: Endereço de e-mail
          default: ''
        department:
          type: string
          description: Departamento de atuação
          default: ''
        customField01:
          type: string
          description: Campo personalizável 01
          default: ''
        customField02:
          type: string
          description: Campo personalizável 02
          default: ''
        owner:
          type: string
          description: Responsável pelo cadastro
          default: ''
        created:
          type: string
          format: date-time
          description: Data de criação automática
        updated:
          type: string
          format: date-time
          description: Data de atualização automática
      example:
        id: r1234abcd
        name: João da Silva
        phone: '+5511999999999'
        email: joao@empresa.com
        department: Suporte Técnico
        customField01: 'Turno: Manhã'
        customField02: 'Nível: 2'
        owner: admin
        created: '2025-01-24T13:52:19.000Z'
        updated: '2025-01-24T13:52:19.000Z'
    MessageQueueFolder:
      type: object
      description: Pasta para organização de campanhas de mensagens em massa
      properties:
        id:
          type: string
          description: Identificador único
        info:
          type: string
          description: Informações adicionais sobre a pasta
        status:
          type: string
          description: Status atual da pasta
          example: ativo
        scheduled_for:
          type: integer
          format: int64
          description: Timestamp Unix para execução agendada
        delayMax:
          type: integer
          format: int64
          description: Atraso máximo entre mensagens em milissegundos
        delayMin:
          type: integer
          format: int64
          description: Atraso mínimo entre mensagens em milissegundos
        log_delivered:
          type: integer
          format: int64
          description: Contagem de mensagens entregues
        log_failed:
          type: integer
          format: int64
          description: Contagem de mensagens com falha
        log_played:
          type: integer
          format: int64
          description: Contagem de mensagens reproduzidas (para áudio/vídeo)
        log_read:
          type: integer
          format: int64
          description: Contagem de mensagens lidas
        log_sucess:
          type: integer
          format: int64
          description: Contagem de mensagens enviadas com sucesso
        log_total:
          type: integer
          format: int64
          description: Contagem total de mensagens
        owner:
          type: string
          description: Identificador do proprietário da instância
        created:
          type: string
          format: date-time
          description: Data e hora de criação
        updated:
          type: string
          format: date-time
          description: Data e hora da última atualização
    QuickReply:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único da resposta rápida
        onWhatsApp:
          type: boolean
          description: Indica se a resposta está sincronizada com o WhatsApp Business
          default: false
        docName:
          type: string
          description: Nome de documento associado (quando aplicável)
          default: ''
        file:
          type: string
          description: Caminho ou conteúdo do arquivo associado
          default: ''
        shortCut:
          type: string
          description: Atalho para acionar a resposta
        text:
          type: string
          description: Conteúdo da mensagem pré-definida
        type:
          type: string
          description: Tipo da resposta rápida (texto/documento/outros)
        owner:
          type: string
          description: Dono da resposta rápida
        created:
          type: string
          format: date-time
          description: Data de criação
        updated:
          type: string
          format: date-time
          description: Data da última atualização
      required:
        - shortCut
        - text
    Group:
      type: object
      description: Representa um grupo/conversa coletiva
      properties:
        JID:
          type: string
          format: jid
          description: Identificador único do grupo
          example: jid8@g.us
        OwnerJID:
          type: string
          format: jid
          description: JID do proprietário do grupo
          example: 1232@s.whatsapp.net
        OwnerPN:
          type: string
          format: jid
          description: Número/LID do proprietário (quando disponível)
        Name:
          type: string
          description: Nome do grupo
          example: Grupo de Suporte
        NameSetAt:
          type: string
          format: date-time
          description: Data da última alteração do nome
        NameSetBy:
          type: string
          format: jid
          description: JID do usuário que definiu o nome
        NameSetByPN:
          type: string
          format: jid
          description: LID/PN de quem definiu o nome
        Topic:
          type: string
          description: Descrição do grupo
        TopicID:
          type: string
          description: ID interno da descrição
        TopicSetAt:
          type: string
          format: date-time
          description: Data da última alteração da descrição
        TopicSetBy:
          type: string
          format: jid
          description: JID de quem alterou a descrição
        TopicSetByPN:
          type: string
          format: jid
          description: LID/PN de quem alterou a descrição
        TopicDeleted:
          type: boolean
          description: Indica se a descrição foi apagada
        IsLocked:
          type: boolean
          description: |
            Indica se apenas administradores podem editar informações do grupo
            - true = apenas admins podem editar
            - false = todos podem editar
          example: true
        IsAnnounce:
          type: boolean
          description: Indica se apenas administradores podem enviar mensagens
        AnnounceVersionID:
          type: string
          description: Versão da configuração de anúncios
        IsEphemeral:
          type: boolean
          description: Indica se as mensagens são temporárias
        DisappearingTimer:
          type: integer
          description: Tempo em segundos para desaparecimento de mensagens
          minimum: 0
        IsIncognito:
          type: boolean
          description: Indica se o grupo é incognito
        IsParent:
          type: boolean
          description: Indica se é um grupo pai (comunidade)
        IsJoinApprovalRequired:
          type: boolean
          description: Indica se requer aprovação para novos membros
        LinkedParentJID:
          type: string
          format: jid
          description: JID da comunidade vinculada
        IsDefaultSubGroup:
          type: boolean
          description: Indica se é um subgrupo padrão da comunidade
        DefaultMembershipApprovalMode:
          type: string
          description: Modo padrão de aprovação de membros (quando comunidade)
        GroupCreated:
          type: string
          format: date-time
          description: Data de criação do grupo
        CreatorCountryCode:
          type: string
          description: Código do país do criador
        ParticipantVersionID:
          type: string
          description: Versão da lista de participantes
        Participants:
          type: array
          items:
            $ref: '#/GroupParticipant'
          description: Lista de participantes do grupo
        MemberAddMode:
          type: string
          enum:
            - admin_add
            - all_member_add
          description: Modo de adição de novos membros
        AddressingMode:
          type: string
          enum:
            - pn
            - lid
          description: Endereçamento preferido do grupo
        OwnerCanSendMessage:
          type: boolean
          description: Verifica se é possível você enviar mensagens
        OwnerIsAdmin:
          type: boolean
          description: Verifica se você adminstrador do grupo
        DefaultSubGroupId:
          type: string
          description: Se o grupo atual for uma comunidade, nesse campo mostrará o ID do subgrupo de avisos
        invite_link:
          type: string
          description: Link de convite para entrar no grupo
        request_participants:
          type: string
          description: Lista de solicitações de entrada, separados por vírgula
    GroupParticipant:
      type: object
      description: Participante de um grupo
      properties:
        JID:
          type: string
          format: jid
          description: Identificador do participante
        LID:
          type: string
          format: jid
          description: Identificador local do participante
        PhoneNumber:
          type: string
          format: jid
          description: Número do participante (quando disponível)
        IsAdmin:
          type: boolean
          description: Indica se é administrador
        IsSuperAdmin:
          type: boolean
          description: Indica se é super administrador
        DisplayName:
          type: string
          description: Nome exibido no grupo (para usuários anônimos)
        Error:
          type: integer
          description: Código de erro ao adicionar participante
          minimum: 0
        AddRequest:
          type: object
          description: Informações da solicitação de entrada
          properties:
            Code:
              type: string
              description: Código da solicitação
            Expiration:
              type: string
              format: date-time
              description: Data de expiração da solicitação
    WebhookEvent:
      type: object
      required:
        - event
        - instance
        - data
      properties:
        event:
          type: string
          enum:
            - message
            - status
            - presence
            - group
            - connection
          description: Tipo do evento recebido
        instance:
          type: string
          description: ID da instância que gerou o evento
        data:
          type: object
          description: |
            Payload do evento enviado pelo webhook. O formato varia conforme o tipo do evento
            (messages, messages_update, connection, presence, etc) e segue o que o backend envia
            em `callHook` (map[string]interface{}). Consulte os exemplos de cada evento específico.
          additionalProperties: true
security:
  - token: []
tags:
  - name: Admininstração
    description: |
      Endpoints para **administração geral** do sistema.
      Requerem um `admintoken` para autenticação.
  - name: Instancia
    description: |
      Operações relacionadas ao ciclo de vida de uma instância, como conectar,
      desconectar e verificar o status.
  - name: Proxy
    description: >
      A uazapiGO opera com um proxy interno como padrão.

      Você pode manter esse padrão, configurar um proxy próprio via `proxy_url` ou usar seu celular android como proxy
      instalando o app em https://github.com/uazapi/silver_proxy_apk (APK direto:
      https://github.com/uazapi/silver_proxy_apk/raw/refs/heads/main/silver_proxy.apk).

      Se nada for enviado, seguimos no proxy interno. IPs são brasileiros; para clientes internacionais, considere um
      proxy da região do cliente.
  - name: Perfil
    description: |
      Operações relacionadas ao perfil da conta do WhatsApp atualmente conectada, como alterar
      nome e imagem de perfil.
  - name: Business
    description: |
      ⚠️ **EXPERIMENTAL** - Endpoints ainda não testados completamente.

      Operações relacionadas ao perfil comercial do WhatsApp Business.
      Permite consultar e atualizar dados do perfil comercial como descrição,
      endereço, email, categorias e gerenciar o catálogo de produtos.

      **Requisitos:**
      - A conta atualmente conectada deve ser uma conta **WhatsApp Business**
      - Contas pessoais do WhatsApp não possuem perfil comercial

      **Nota:** Estes endpoints podem não funcionar como esperado.
      Reporte problemas encontrados.
  - name: Chamadas
    description: |
      Operações relacionadas a chamadas peloWhatsApp.
      Permite realizar e rejeitar chamadas programaticamente.
  - name: Webhooks e SSE
  - name: Enviar Mensagem
    description: >
      Endpoints para envio de mensagens do WhatsApp com diferentes tipos de conteúdo.


      ## Campos Opcionais Comuns


      Todos os endpoints de envio de mensagem suportam os seguintes campos opcionais:


      - **`delay`** *(integer)*: Atraso em milissegundos antes do envio
        - Durante o atraso aparecerá "Digitando..." ou "Gravando áudio..." dependendo do tipo
        - Exemplo: `5000` (5 segundos)

      - **`readchat`** *(boolean)*: Marcar chat como lido após envio
        - Remove o contador de mensagens não lidas do chat
        - Exemplo: `true`

      - **`readmessages`** *(boolean)*: Marcar últimas mensagens recebidas como lidas
        - Marca as últimas 10 mensagens **recebidas** (não enviadas por você) como lidas
        - Útil para confirmar leitura de mensagens pendentes antes de responder
        - Diferente do `readchat` que apenas remove contador de não lidas
        - Exemplo: `true`

      - **`replyid`** *(string)*: ID da mensagem para responder
        - Cria uma resposta vinculada à mensagem original
        - Suporte varia por tipo de mensagem

      - **`viewOnce`** *(boolean)*: Recomendado quando quiser mídia de visualização única
        - Use em `/send/media` com `type` compatível (`image`, `video`, `videoplay`, `ptv`, `audio`, `myaudio`, `ptt`)
        - Nos demais endpoints de envio, o campo é aceito, mas é ignorado silenciosamente
        - Exemplo: `"3A12345678901234567890123456789012"`

      - **`mentions`** *(string)*: Números para mencionar (apenas para envio em grupos)
        - Números específicos: `"5511999999999,5511888888888"`
        - Mencionar todos: `"all"`

      - **`forward`** *(boolean)*: Marca a mensagem como encaminhada no WhatsApp
        - Adiciona o indicador "Encaminhada" na mensagem
        - Exemplo: `true`

      - **`track_source`** *(string)*: Origem do rastreamento da mensagem
        - Identifica o sistema ou fonte que está enviando a mensagem
        - Útil para integrações (ex: "chatwoot", "crm", "chatbot")
        - Exemplo: `"chatwoot"`

      - **`track_id`** *(string)*: ID para rastreamento da mensagem
        - Identificador livre para acompanhar a mensagem em sistemas externos
        - Permite correlacionar mensagens entre diferentes plataformas
        - **Nota**: O sistema aceita valores duplicados - não há validação de unicidade
        - Use o mesmo ID em várias mensagens se fizer sentido para sua integração
        - Exemplo: `"msg_123456789"`

      - **`async`** *(boolean)*: Envia pela fila interna sem bloquear a requisição
        - Resposta 200 indica que a mensagem entrou na fila; o envio real pode falhar depois
        - Em caso de falha, pesquise em `/message/find` com `status=failed`

      ## Diagnóstico de limites do WhatsApp


      Em alguns casos, o WhatsApp pode recusar novas conversas por regras próprias de volume, qualidade ou limitação
      temporária.


      Quando isso acontecer, a resposta de erro pode incluir:

      - `error_source: "whatsapp_server"`

      - `provider: "whatsapp"`

      - `provider_code: 463`

      - `error_key`

      - `message`

      - `message_ptbr`

      - `provider_message`

      - `provider_message_ptbr`

      - `diagnostics_endpoint`

      - `details.new_chat_message_capping`

      - `details.reachout_timelock`


      Para consultar o estado atual desses limites para a conta atualmente conectada, use:

      - `GET /instance/wa_messages_limits`


      ### Envio para Grupos

      - **`number`** *(string)*: Para enviar mensagem para grupo, use o ID do grupo que termina com `@g.us`
        - Exemplo: `"120363012345678901@g.us"`
        - **Como obter o ID do grupo:**
          - Use o `chatid` do webhook recebido quando alguém envia mensagem no grupo
          - Use o endpoint `GET /group/list` para listar todos os grupos e seus IDs

      ## Placeholders Disponíveis


      Todos os endpoints de envio de mensagem suportam placeholders dinâmicos para personalização automática:


      ### Campos de Nome

      - **`{{name}}`**: Nome consolidado do chat, usando a primeira opção disponível:
        1. Nome do lead (`lead_name`)
        2. Nome completo do lead (`lead_fullName`)
        3. Nome do contato no WhatsApp (`wa_contactName`)
        4. Nome do perfil do WhatsApp (`wa_name`)

      - **`{{first_name}}`**: Primeira palavra válida do nome consolidado (mínimo 2 caracteres)


      ### Campos do WhatsApp

      - **`{{wa_name}}`**: Nome do perfil do WhatsApp

      - **`{{wa_contactName}}`**: Nome do contato como salvo no WhatsApp


      ### Campos do Lead

      - **`{{lead_name}}`**: Nome do lead

      - **`{{lead_fullName}}`**: Nome completo do lead

      - **`{{lead_personalid}}`**: ID pessoal (CPF, CNPJ, etc)

      - **`{{lead_email}}`**: Email do lead

      - **`{{lead_status}}`**: Status atual do lead

      - **`{{lead_notes}}`**: Anotações do lead

      - **`{{lead_assignedAttendant_id}}`**: ID do atendente designado


      ### Campos Personalizados

      Campos adicionados via custom fields são acessíveis usando `{{lead_field01}}` à `{{lead_field20}}` ou usar
      `{{nomedocampo}}` definido em `/instance/updateFieldsMap`.


      ### Exemplo de Uso

      ```

      Olá {{name}}! Vi que você trabalha na {{company}}.

      Seu email {{lead_email}} está correto?

      ```


      **💡 Dica**: Use `/chat/find` para buscar dados do chat e ver os campos disponíveis antes de enviar mensagens com
      placeholders.
  - name: Mensagem Async
    description: |
      Controles operacionais da fila interna de envio assíncrono usada quando um endpoint de envio recebe `async=true`.

      Esta seção serve para:
      - consultar o estado atual da fila async
      - configurar o delay entre mensagens enviadas com `async=true`
      - limpar backlog pendente e cancelar mensagens ainda não concluídas

      Escopo:
      - cobre apenas a fila interna de mensagens diretas async
      - não cobre campanhas do sender (`/sender/*`)
      - não altera mensagens já enviadas com sucesso
  - name: Ações na mensagem e Buscar
  - name: Chats
  - name: Contatos
  - name: Bloqueios
  - name: Etiquetas
  - name: Grupos e Comunidades
  - name: Newsletters e Canais
    description: |
      Operações para leitura e acompanhamento de canais do WhatsApp (newsletters).

      Casos de uso principais:
      - listar posts já publicados em um canal
      - editar posts recentes de um canal
      - deletar posts recentes de um canal
      - consultar updates de engajamento dos posts
      - integrar canais sem necessidade de persistir as mensagens localmente

      Observações:
      - `/newsletter/messages` retorna o conteúdo dos posts
      - `/newsletter/messages/edit` edita o conteúdo de posts recentes
      - `/newsletter/messages/delete` apaga posts recentes
      - `/newsletter/updates` retorna updates dos posts, como views e reactions
      - views e reactions de canal devem ser consultados por `/newsletter/updates`, não por evento de webhook
      - newsletters usam rotas próprias e não devem usar `/message/edit` ou `/message/delete`
  - name: Respostas Rápidas
    description: |
      Gerenciamento de respostas rápidas para agilizar o atendimento.

      **⚠️ Importante**: Este recurso tem serventia apenas se você utilizar um sistema frontend/interface
      personalizada para registrar e utilizar as respostas. A API apenas armazena as respostas, 
      mas não as aplica automaticamente.

      ### Como funciona:
      - **Criar**: Cadastre respostas pré-definidas com títulos e conteúdo
      - **Listar**: Recupere todas as respostas cadastradas para exibir na sua interface
      - **Usar**: Seu sistema frontend pode usar essas respostas para agilizar digitação

      ### Casos de uso:
      - Interfaces web personalizadas de atendimento
      - Apps mobile com sugestões de resposta
      - Sistemas CRM com templates de mensagem
      - Ferramentas de produtividade para atendentes

      **Não é um chatbot**: Para respostas automáticas, use os recursos de Chatbot.
  - name: CRM
    description: |
      Sistema completo de gestão de relacionamento com clientes integrado à API.

      **💾 Armazenamento interno**: Todos os dados dos leads ficam salvos diretamente na API,
      eliminando a necessidade de bancos de dados externos. Sua aplicação pode focar apenas
      na interface e lógica de negócio.

      ### Recursos disponíveis:
      - **📋 20+ campos personalizáveis**: Nome, telefone, email, empresa, observações, etc.
      - **🏷️ Sistema de etiquetas**: Organize e categorize seus contatos
      - **🔍 Busca avançada**: Filtre por qualquer campo ou etiqueta
      - **📊 Histórico completo**: Todas as interações ficam registradas automaticamente

      ### 🎯 Placeholders em mensagens:
      Use variáveis dinâmicas nas mensagens para personalização automática:

      ```
      Olá {{nome}}! Vi que você trabalha na {{empresa}}.
      Seu email {{email}} está correto?
      Observações: {{observacoes}}
      ```

      ### Fluxo típico:
      1. **Captura**: Leads chegam via WhatsApp ou formulários
      2. **Enriquecimento**: Adicione dados usando `/chat/editLead`
      3. **Segmentação**: Organize com etiquetas
      4. **Comunicação**: Envie mensagens personalizadas com placeholders
      5. **Acompanhamento**: Histórico fica salvo automaticamente

      **Ideal para**: Vendas, marketing, atendimento, qualificação de leads
  - name: Mensagem em massa
  - name: Integração Chatwoot
    description: >
      **🚧 INTEGRAÇÃO BETA - Sistema de integração com Chatwoot para atendimento unificado**


      **⚠️ AVISO**: Esta integração está em fase BETA. Use por sua conta e risco. Recomendamos testes em ambiente
      não-produtivo antes do uso em produção.


      Esta categoria contém recursos para configurar e gerenciar a integração com o Chatwoot, uma plataforma de
      atendimento ao cliente open-source. A integração permite centralizar conversas do WhatsApp no Chatwoot.


      ### Recursos disponíveis:

      - 🔧 **Configuração Completa**: Configure URL, tokens e credenciais do Chatwoot

      - 📬 **Sincronização Bidirecional**: Mensagens novas entre WhatsApp e Chatwoot são sincronizadas automaticamente

      - 📱 **Gerenciamento de Contatos**: Sincronização automática de nomes e telefones

      - 🔄 **Atualização LID→PN**: Migração automática de Local ID para Phone Number

      - 🏷️ **Nomes Inteligentes**: Sistema de nomes com til (~) para atualização automática

      - 🚫 **Separação de Grupos**: Opção para ignorar grupos na sincronização

      - 👤 **Assinatura de Mensagens**: Identificação do agente nas mensagens enviadas

      - 🔗 **Webhook Automático**: URL gerada automaticamente para configurar no Chatwoot


      ### 🏷️ Sistema de Nomes Inteligentes:

      - **Nomes com til (~)**: Atualizados automaticamente quando contato modifica nome no WhatsApp

      - **Nomes específicos**: Para nome fixo, remover til (~) do nome no Chatwoot

      - **Exemplo**: "~João Silva" = automático, "João Silva" = fixo

      - **Migração LID→PN**: Sem duplicação de conversas durante a transição

      - **Respostas nativas**: Aparecem diretamente no Chatwoot sem marcações externas


      ### ⚠️ Limitações conhecidas:

      - **Sincronização de histórico**: Não implementada - apenas mensagens novas são sincronizadas


      ### Casos de uso:

      - Atendimento centralizado no Chatwoot

      - Equipes de suporte com múltiplos agentes

      - Integração com CRM via Chatwoot

      - Centralização de canais de comunicação

      - Gestão automática de contatos e nomes


      **Ideal para**: Empresas com equipes de atendimento, call centers, suporte técnico (em ambiente de testes)


      **Requer**: Instância do Chatwoot configurada, tokens de API e ambiente de testes


      **🚧 Lembre-se**: Integração em BETA - funcionalidades podem mudar sem aviso prévio
paths:
  /instance/create:
    post:
      operationId: createInstance
      tags:
        - Admininstração
      summary: Criar Instancia
      security:
        - admintoken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome da instância
                  example: minha-instancia
                adminField01:
                  type: string
                  description: Campo administrativo 1 para metadados personalizados (opcional)
                  example: custom-metadata-1
                adminField02:
                  type: string
                  description: Campo administrativo 2 para metadados personalizados (opcional)
                  example: custom-metadata-2
              required:
                - name
      description: >
        Cria uma nova instância do WhatsApp. Para criar uma instância você precisa:


        1. Ter um admintoken válido

        2. Enviar pelo menos o nome da instância

        3. A instância será criada desconectada

        4. Será gerado um token único para autenticação


        Após criar a instância, guarde o token retornado pois ele será necessário

        para todas as outras operações.


        Estados possíveis da instância:


        - `disconnected`: Desconectado do WhatsApp

        - `connecting`: Em processo de conexão

        - `connected`: Conectado e autenticado

        - `hibernated`: Sessão pausada, com credenciais preservadas para reconexão


        Campos administrativos (adminField01/adminField02) são opcionais e podem ser usados para armazenar metadados
        personalizados. 

        OS valores desses campos são vísiveis para o dono da instancia via token, porém apenas o administrador da api
        (via admin token) pode editá-los.
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Instance created successfully
                  instance:
                    $ref: ../schemas/instance.yaml#/Instance
                  connected:
                    type: boolean
                    example: false
                  loggedIn:
                    type: boolean
                    example: false
                  name:
                    type: string
                    example: minha-instancia
                  token:
                    type: string
                    example: 123e4567-e89b-12d3-a456-426614174000
                  info:
                    type: string
                    example: This instance will be automatically disconnected and deleted after 1 hour.
        '401':
          description: Token inválido/expirado
        '404':
          description: Instância não encontrada
        '500':
          description: Erro interno
  /instance/all:
    get:
      operationId: listAllInstances
      tags:
        - Admininstração
      summary: Listar todas as instâncias
      security:
        - admintoken: []
      description: |
        Retorna uma lista completa de todas as instâncias do sistema, incluindo:
        - ID e nome de cada instância
        - Status atual (disconnected, connecting, connected, hibernated)
        - Data de criação
        - Última desconexão e motivo
        - Informações de perfil (se conectado)

        Requer permissões de administrador.
      responses:
        '200':
          description: Lista de instâncias retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/instance.yaml#/Instance
              example:
                - id: r183e2ef9597845
                  name: instancia-1
                  token: abc123xyz
                  status: connected
                  profileName: Meu WhatsApp
                  profilePicUrl: https://example.com/profile.jpg
                  isBusiness: true
                  plataform: Android
                  systemName: uazapi
                  owner: user@example.com
                  created: '2024-01-01T12:00:00.000Z'
                  updated: '2024-01-01T12:30:00.000Z'
                - id: r283e2ef9597846
                  name: instancia-2
                  token: def456xyz
                  status: disconnected
                  lastDisconnect: '2024-01-02T12:00:00.000Z'
                  lastDisconnectReason: manual disconnect
                  created: '2024-01-02T12:00:00.000Z'
                  updated: '2024-01-02T12:30:00.000Z'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '403':
          description: Token de administrador inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid AdminToken Header
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
  /instance/connect:
    post:
      operationId: connectInstance
      tags:
        - Instancia
      summary: Conectar instância ao WhatsApp
      description: >
        Inicia o processo de conexão de uma instância ao WhatsApp. Este endpoint:

        1. Requer o token de autenticação da instância

        2. Recebe o número de telefone associado à conta WhatsApp

        3. Gera um QR code caso não passe o campo `phone`

        4. Ou Gera código de pareamento se passar o o campo `phone`

        5. Atualiza o status da instância para "connecting"


        O processo de conexão permanece pendente até que:

        - O QR code seja escaneado no WhatsApp do celular, ou

        - O código de pareamento seja usado no WhatsApp

        - Timeout de 2 minutos para QRCode seja atingido ou 5 minutos para o código de pareamento


        Use o endpoint /instance/status para monitorar o progresso da conexão.


        Estados possíveis da instância:

        - `disconnected`: Desconectado do WhatsApp

        - `connecting`: Em processo de conexão

        - `connected`: Conectado e autenticado

        - `hibernated`: Sessão pausada, com credenciais preservadas para reconexão


        Sincronização e armazenamento de mensagens:

        - Todas as mensagens recebidas da Meta durante a sincronização da conexão (leitura do QR code) são enviadas no
        evento `history` do webhook.

        - As mensagens dos últimos 7 dias são armazenadas no banco de dados e ficam acessíveis pelos endpoints: `POST
        /message/find` e `POST /chat/find`.

        - Depois que a instância conecta, todas as mensagens enviadas ou recebidas são armazenadas no banco de dados.

        - Mensagens mais antigas do que 7 dias são excluídas durante a madrugada.


        Proxy regional:

        - No momento, o proxy regional público está disponível para Brasil (`br`).

        - Use `GET /proxy-managed/cities?country=br` para listar cidades brasileiras.

        - Envie `proxy_managed_city` com o `value` retornado pela cidade.

        - Quando a cidade retornar `state`, envie também `proxy_managed_state` com esse valor.

        - O backend valida a combinação de país, estado e cidade antes de salvar.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: >-
                    Número de telefone no formato internacional (ex: 5511999999999). Se informado, gera código de
                    pareamento. Se omitido, gera QR code.
                  example: '5511999999999'
                  pattern: ^\d{10,15}$
                browser:
                  type: string
                  description: >-
                    Browser usado no ciclo de autenticação/conexão. `auto` preserva um perfil válido já salvo ou escolhe
                    Safari, Firefox ou Edge para novas conexões.
                  enum:
                    - auto
                    - safari
                    - firefox
                    - edge
                    - chrome
                  default: auto
                  example: auto
                systemName:
                  type: string
                  description: >-
                    Sistema/nome exibido no celular em aparelhos conectados. Ajuda a identificar a instância no
                    WhatsApp; para maior estabilidade, recomendamos deixar em branco e usar o valor padrão do navegador
                    escolhido.
                  example: Minha Empresa
                proxy_managed_country:
                  type: string
                  description: País desejado para o proxy regional, em ISO alpha-2 minúsculo. No momento, use `br`.
                  example: br
                  pattern: ^[a-z]{2}$
                proxy_managed_state:
                  type: string
                  description: >-
                    Estado/subdivisão da cidade escolhida. Quando o país/cidade exigir desambiguação, use o campo
                    `state` retornado por `GET /proxy-managed/cities?country=br`.
                  example: sp
                proxy_managed_city:
                  type: string
                  description: >-
                    Cidade escolhida para o proxy regional. Use sempre o campo `value` retornado por `GET
                    /proxy-managed/cities`.
                  example: campinas
            examples:
              qr_code_brasil_com_proxy_regional:
                summary: QR code com proxy regional em Campinas/SP
                value:
                  browser: auto
                  systemName: Minha Empresa
                  proxy_managed_country: br
                  proxy_managed_state: sp
                  proxy_managed_city: campinas
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                    description: Estado atual da conexão
                    example: false
                  loggedIn:
                    type: boolean
                    description: Estado do login
                    example: false
                  jid:
                    type:
                      - object
                      - 'null'
                    description: ID do WhatsApp (quando logado)
                    example: null
                  instance:
                    $ref: ../schemas/instance.yaml#/Instance
                    description: Detalhes completos da instância
        '401':
          description: Token inválido/expirado
        '404':
          description: Instância não encontrada
        '429':
          description: Limite de conexões simultâneas atingido
        '500':
          description: Erro interno
        '503':
          description: Capacidade de conexão temporariamente indisponível
          headers:
            Retry-After:
              description: Tempo recomendado, em segundos, para tentar novamente.
              schema:
                type: integer
                example: 5
  /instance/disconnect:
    post:
      operationId: disconnectInstance
      tags:
        - Instancia
      summary: Desconectar instância
      description: |
        Desconecta a conta do WhatsApp atualmente conectada, encerrando a sessão atual.
        Esta operação:

        - Encerra a conexão ativa

        - Requer novo QR code para reconectar


        Diferenças entre desconectar e hibernar:

        - Desconectar: Encerra completamente a sessão, exigindo novo login

        - Hibernar: Mantém a sessão ativa, apenas pausa a conexão


        Use este endpoint para:

        1. Encerrar completamente uma sessão

        2. Forçar uma nova autenticação

        3. Limpar credenciais da sessão atual

        4. Reiniciar o processo de conexão


        Estados possíveis após desconectar:

        - `disconnected`: Desconectado do WhatsApp

        - `connecting`: Em processo de reconexão (após usar /instance/connect)
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance:
                    $ref: ../schemas/instance.yaml#/Instance
                  response:
                    type: string
                    example: Disconnected
                  info:
                    type: string
                    example: >-
                      The device has been successfully disconnected from WhatsApp. A new QR code will be required for
                      the next connection.
        '401':
          description: Token inválido/expirado
        '404':
          description: Instância não encontrada
        '500':
          description: Erro interno
  /instance/reset:
    post:
      operationId: resetInstance
      tags:
        - Instancia
      summary: Reiniciar runtime da instância
      description: |
        Solicita um reset controlado do runtime da instância atual.

        Este endpoint é útil quando a sessão ficou presa, o envio não está progredindo
        ou a instância precisa forçar uma tentativa de recuperação sem apagar o registro
        da instância.

        Comportamentos possíveis:
        - inicia um novo reset quando a instância está apta
        - informa que um reset já está em andamento
        - informa que existe cooldown ativo entre resets
        - retorna erro quando a sessão não pode ser recuperada ou quando a política de
          reconexão bloqueia a operação

        A resposta sempre informa:
        - `instanceId`: ID da instância autenticada
        - `resetting`: se há reset em andamento no momento
        - `queuedRecoveryAttempted`: se houve tentativa de recuperação da fila interna
      security:
        - token: []
      responses:
        '200':
          description: Reset aceito, já em andamento ou em cooldown
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Instance reset started
                  resetting:
                    type: boolean
                    example: true
                  instanceId:
                    type: string
                    example: r183e2ef9597845
                  queuedRecoveryAttempted:
                    type: boolean
                    example: true
              examples:
                started:
                  summary: Reset iniciado
                  value:
                    response: Instance reset started
                    resetting: true
                    instanceId: r183e2ef9597845
                    queuedRecoveryAttempted: true
                inProgress:
                  summary: Reset já em andamento
                  value:
                    response: Instance reset already in progress
                    resetting: true
                    instanceId: r183e2ef9597845
                    queuedRecoveryAttempted: false
                cooldown:
                  summary: Cooldown ativo
                  value:
                    response: Instance reset cooldown active (8s remaining)
                    resetting: false
                    instanceId: r183e2ef9597845
                    queuedRecoveryAttempted: false
        '400':
          description: Payload JSON inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid payload
        '401':
          description: Token inválido, ausente ou cliente não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '403':
          description: Reset bloqueado pela política de reconexão
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  resetting:
                    type: boolean
                    example: false
                  instanceId:
                    type: string
                  queuedRecoveryAttempted:
                    type: boolean
        '409':
          description: Sessão atual não é reconectável por reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  resetting:
                    type: boolean
                    example: false
                  instanceId:
                    type: string
                  queuedRecoveryAttempted:
                    type: boolean
        '500':
          description: Erro interno ao solicitar o reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: server not available
                  resetting:
                    type: boolean
                    example: false
                  instanceId:
                    type: string
                  queuedRecoveryAttempted:
                    type: boolean
  /instance/status:
    get:
      operationId: getInstanceStatus
      tags:
        - Instancia
      summary: Verificar status da instância
      description: |
        Retorna o status atual de uma instância, incluindo:
        - Estado da conexão (disconnected, connecting, connected, hibernated)
        - QR code atualizado (se em processo de conexão)
        - Código de pareamento (se disponível)
        - Informações da última desconexão
        - Detalhes completos da instância

        Este endpoint é particularmente útil para:
        1. Monitorar o progresso da conexão
        2. Obter QR codes atualizados durante o processo de conexão
        3. Verificar o estado atual da instância
        4. Identificar problemas de conexão

        Estados possíveis:
        - `disconnected`: Desconectado do WhatsApp
        - `connecting`: Em processo de conexão (aguardando QR code ou código de pareamento)
        - `connected`: Conectado e autenticado com sucesso
        - `hibernated`: Sessão pausada, com credenciais preservadas para reconexão
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance:
                    $ref: ../schemas/instance.yaml#/Instance
                  status:
                    type: object
                    properties:
                      connected:
                        type: boolean
                        description: Indica se está conectado ao WhatsApp
                      loggedIn:
                        type: boolean
                        description: Indica se está autenticado no WhatsApp
                      jid:
                        type:
                          - object
                          - 'null'
                        description: ID do WhatsApp quando conectado
              example:
                instance:
                  id: r183e2ef9597845
                  name: minha-instancia
                  status: connected
                  profileName: Meu WhatsApp
                  currentTime: '2024-01-25T12:00:00.000Z'
                status:
                  connected: true
                  loggedIn: true
                  jid:
                    user: '5511999999999'
                    agent: 0
                    device: 0
                    server: s.whatsapp.net
        '401':
          description: Token inválido/expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: instance info not found
        '404':
          description: Instância não encontrada
        '500':
          description: Erro interno
  /instance/wa_messages_limits:
    get:
      operationId: getWAMessageLimits
      tags:
        - Instancia
      summary: Consultar limites atuais de novas conversas no WhatsApp
      description: >
        Consulta o estado atual de limitação do WhatsApp para a conta atualmente conectada.


        Este endpoint é útil para:

        - diagnosticar erros de envio com `provider_code: 463`

        - verificar se o WhatsApp indica que a conta atualmente conectada pode iniciar novas conversas

        - exibir informações de suporte antes de campanhas ou envios de alto volume


        A resposta consolida duas fontes internas do WhatsApp:

        - `new_chat_message_capping`: limite de mensagens para iniciar novas conversas

        - `reachout_timelock`: restrição temporária para iniciar novas conversas


        Observações:

        - este endpoint depende de sessão ativa e conectada

        - se o WhatsApp não retornar os dados esperados, a resposta pode marcar os blocos como indisponíveis via
        `available: false` e `lookup_error`

        - `message` descreve o estado atual da conta atualmente conectada

        - `provider_message` detalha o motivo reportado pelo WhatsApp quando houver restrição ativa
      responses:
        '200':
          description: Diagnóstico atual dos limites de novas conversas da conta atualmente conectada
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                    example: whatsapp
                  reachable:
                    type: boolean
                    description: Indica se ao menos uma das consultas ao WhatsApp retornou dados úteis
                    example: true
                  can_send_new_messages:
                    type:
                      - boolean
                      - 'null'
                    description: |
                      Indica se o WhatsApp sinaliza que a conta atualmente conectada pode iniciar novas conversas.
                      Pode ser `null` quando não foi possível concluir o diagnóstico.
                    example: false
                  error_key:
                    type: string
                    description: Chave de erro derivada do diagnóstico atual
                    example: WHATSAPP_REACHOUT_TIMELOCK
                  message:
                    type: string
                    description: Mensagem técnica principal em inglês
                    example: >-
                      WhatsApp indicates that the currently connected account is under a temporary restriction for
                      starting new conversations. This is not an internal API error.
                  message_ptbr:
                    type: string
                    description: Mensagem principal traduzida para pt-BR
                    example: >-
                      O WhatsApp indica que a conta atualmente conectada está sob uma restrição temporária para iniciar
                      novas conversas. Isso não é um erro interno da API.
                  provider_message:
                    type: string
                    description: Motivo detalhado reportado pelo WhatsApp em inglês
                    example: >-
                      WhatsApp reported that the currently connected account is under a temporary restriction for
                      starting new conversations, usually related to sending volume or quality.
                  provider_message_ptbr:
                    type: string
                    description: Motivo detalhado reportado pelo WhatsApp em pt-BR
                    example: >-
                      O WhatsApp informou que a conta atualmente conectada está sob uma restrição temporária para
                      iniciar novas conversas, normalmente relacionada a volume ou qualidade de envios.
                  diagnostics_endpoint:
                    type: string
                    example: /instance/wa_messages_limits
                  new_chat_message_capping:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      status:
                        type: string
                        example: CAPPED
                      used_quota:
                        type: integer
                        example: 10
                      total_quota:
                        type: integer
                        example: 10
                      cycle_start:
                        type: string
                        format: date-time
                      cycle_end:
                        type: string
                        format: date-time
                      server_sent_at:
                        type: string
                        format: date-time
                      ote_status:
                        type: string
                        example: EXHAUSTED
                      mv_status:
                        type: string
                        example: ACTIVE
                      lookup_error:
                        type: string
                  reachout_timelock:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      active:
                        type: boolean
                        example: true
                      until:
                        type: string
                        format: date-time
                      enforcement_type:
                        type: string
                        example: BIZ_QUALITY
                      lookup_error:
                        type: string
              examples:
                restricted:
                  summary: Conta conectada com restrição ativa
                  value:
                    provider: whatsapp
                    reachable: true
                    can_send_new_messages: false
                    error_key: WHATSAPP_REACHOUT_TIMELOCK
                    message: >-
                      WhatsApp indicates that the currently connected account is under a temporary restriction for
                      starting new conversations. This is not an internal API error.
                    message_ptbr: >-
                      O WhatsApp indica que a conta atualmente conectada está sob uma restrição temporária para iniciar
                      novas conversas. Isso não é um erro interno da API.
                    provider_message: >-
                      WhatsApp reported that the currently connected account is under a temporary restriction for
                      starting new conversations, usually related to sending volume or quality.
                    provider_message_ptbr: >-
                      O WhatsApp informou que a conta atualmente conectada está sob uma restrição temporária para
                      iniciar novas conversas, normalmente relacionada a volume ou qualidade de envios.
                    diagnostics_endpoint: /instance/wa_messages_limits
                    new_chat_message_capping:
                      available: true
                      status: CAPPED
                      used_quota: 10
                      total_quota: 10
                      cycle_end: '2026-04-30T23:59:59Z'
                      ote_status: EXHAUSTED
                      mv_status: ACTIVE
                    reachout_timelock:
                      available: true
                      active: true
                      until: '2026-04-07T12:00:00Z'
                      enforcement_type: BIZ_QUALITY
                unrestricted:
                  summary: Conta conectada sem restrições
                  value:
                    provider: whatsapp
                    reachable: true
                    can_send_new_messages: true
                    message: >-
                      No WhatsApp restriction for starting new conversations was detected for the currently connected
                      account.
                    message_ptbr: >-
                      Nenhuma restrição de envio de novas conversas foi identificada no WhatsApp para a conta atualmente
                      conectada.
                    diagnostics_endpoint: /instance/wa_messages_limits
                    new_chat_message_capping:
                      available: true
                      status: NONE
                      used_quota: 2
                      total_quota: 10
                    reachout_timelock:
                      available: true
                      active: false
        '401':
          description: Token inválido ou ausente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid token
        '500':
          description: Erro interno ao consultar os limites
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
  /instance/updateFieldsMap:
