        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: Número do WhatsApp no formato internacional (ex. 5511999999999)
                  example: '5511999999999'
                block:
                  type: boolean
                  description: True para bloquear, False para desbloquear
                  example: true
              required:
                - number
                - block
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmação
                    example: Blocked successfully
                  blockList:
                    type: array
                    description: Lista atualizada de contatos bloqueados
                    items:
                      type: string
                    example:
                      - 5511999999999@s.whatsapp.net
                      - 5511888888888@s.whatsapp.net
        '401':
          description: Não autorizado - token inválido
        '404':
          description: Contato não encontrado
        '500':
          description: Erro do servidor ao processar a requisição
  /chat/blocklist:
    get:
      operationId: getBlocklist
      summary: Lista contatos bloqueados
      description: |
        Retorna a lista completa de contatos que foram bloqueados pela instância.
        Esta lista é atualizada em tempo real conforme contatos são bloqueados/desbloqueados.
      tags:
        - Bloqueios
      responses:
        '200':
          description: Lista de contatos bloqueados recuperada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  blockList:
                    type: array
                    items:
                      type: string
                      description: JIDs dos contatos bloqueados no formato "número@s.whatsapp.net"
                    example:
                      - 5511999999999@s.whatsapp.net
                      - 5511888888888@s.whatsapp.net
        '401':
          description: Token inválido ou não fornecido
        '500':
          description: Erro interno do servidor ou instância não conectada
  /chat/labels:
    post:
      operationId: setChatLabels
      summary: Gerencia labels de um chat
      description: >
        Atualiza as labels associadas a um chat específico. Este endpoint oferece três modos de operação:


        1. **Definir todas as labels** (labelids): Define o conjunto completo de labels para o chat, substituindo labels
        existentes

        2. **Adicionar uma label** (add_labelid): Adiciona uma única label ao chat sem afetar as existentes

        3. **Remover uma label** (remove_labelid): Remove uma única label do chat sem afetar as outras


        **Importante**: Use apenas um dos três parâmetros por requisição. Labels inexistentes serão rejeitadas.


        As labels devem ser fornecidas no formato id ou labelid encontradas na função get labels.
      tags:
        - Etiquetas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: Número do chat ou grupo
                  example: '5511999999999'
                labelids:
                  type: array
                  items:
                    type: string
                  description: Lista de IDs das labels a serem aplicadas ao chat (define todas as labels)
                  example:
                    - '10'
                    - '20'
                add_labelid:
                  type: string
                  description: ID da label a ser adicionada ao chat
                  example: '10'
                remove_labelid:
                  type: string
                  description: ID da label a ser removida do chat
                  example: '20'
              required:
                - number
              oneOf:
                - required:
                    - labelids
                - required:
                    - add_labelid
                - required:
                    - remove_labelid
            examples:
              definir_todas_labels:
                summary: Definir todas as labels do chat
                description: Define o conjunto completo de labels, substituindo as existentes
                value:
                  number: '5511999999999'
                  labelids:
                    - '10'
                    - '20'
                    - '30'
              adicionar_label:
                summary: Adicionar uma label ao chat
                description: Adiciona uma única label sem afetar as existentes
                value:
                  number: '5511999999999'
                  add_labelid: '10'
              remover_label:
                summary: Remover uma label do chat
                description: Remove uma única label sem afetar as outras
                value:
                  number: '5511999999999'
                  remove_labelid: '20'
      responses:
        '200':
          description: Labels atualizadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmação
                  editions:
                    type: array
                    items:
                      type: string
                    description: Lista de operações realizadas (apenas para operação labelids)
              examples:
                definir_todas_labels:
                  summary: Resposta para definir todas as labels
                  value:
                    response: Labels updated successfully
                    editions:
                      - Added label 10 to chat
                      - Added label 20 to chat
                      - Removed label 5 from chat
                adicionar_label:
                  summary: Resposta para adicionar uma label
                  value:
                    response: Label added to chat
                remover_label:
                  summary: Resposta para remover uma label
                  value:
                    response: Label removed from chat
        '400':
          description: Erro na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Use only one operation: labelids, add_labelid, or remove_labelid'
        '404':
          description: Chat não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Chat not found
  /chat/delete:
    post:
      operationId: deleteChat
      summary: Deleta chat
      description: |
        Deleta ou limpa um chat e/ou suas mensagens do WhatsApp e/ou banco de dados.
        Você pode escolher:
        - Deletar o chat do WhatsApp
        - Limpar a conversa no WhatsApp
        - Deletar o chat do banco de dados
        - Deletar apenas as mensagens do banco de dados
        - Qualquer combinação das opções acima
        Observação:
        - Se clearChatWhatsApp e deleteChatWhatsApp forem true, o clear tem prioridade.
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: |
                    Número do chat no formato internacional.
                    Para grupos use o ID completo do grupo.
                  example: '5511999999999'
                deleteChatDB:
                  type: boolean
                  description: Se true, deleta o chat do banco de dados
                  default: false
                  example: true
                deleteMessagesDB:
                  type: boolean
                  description: Se true, deleta todas as mensagens do chat do banco de dados
                  default: false
                  example: true
                deleteChatWhatsApp:
                  type: boolean
                  description: |
                    Se true, deleta o chat do WhatsApp.
                    Para grupos, esta operação não é permitida e o chat será apenas limpo.
                  default: false
                  example: true
                clearChatWhatsApp:
                  type: boolean
                  description: |
                    Se true, limpa a conversa do chat no WhatsApp (sem sair do chat).
                    Funciona para grupos e conversas individuais.
                  default: false
                  example: true
              required:
                - number
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de sucesso
                    example: Chat deletion process completed
                  actions:
                    type: array
                    description: Lista de ações realizadas
                    items:
                      type: string
                    example:
                      - Chat deleted from WhatsApp
                      - Chat deleted from database
                      - 'Messages associated with chat deleted from database: 42'
                  errors:
                    type: array
                    description: Lista de erros ocorridos, se houver
                    items:
                      type: string
                    example:
                      - 'Error deleting chat from WhatsApp: connection timeout'
        '400':
          description: Erro nos parâmetros da requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing number in payload
        '401':
          description: Token inválido ou não fornecido
        '404':
          description: Chat não encontrado
        '500':
          description: Erro interno do servidor
  /chat/archive:
    post:
      operationId: archiveChat
      summary: Arquivar/desarquivar chat
      description: |
        Altera o estado de arquivamento de um chat do WhatsApp.
        - Quando arquivado, o chat é movido para a seção de arquivados no WhatsApp
        - A ação é sincronizada entre todos os dispositivos conectados
        - Não afeta as mensagens ou o conteúdo do chat
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
                - archive
              properties:
                number:
                  type: string
                  description: Número do telefone (formato E.164) ou ID do grupo
                  example: '5511999999999'
                archive:
                  type: boolean
                  description: true para arquivar, false para desarquivar
                  example: true
      responses:
        '200':
          description: Chat arquivado/desarquivado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Chat updated successfully
        '400':
          description: Dados da requisição inválidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid phone number format
        '401':
          description: Token de autenticação ausente ou inválido
        '500':
          description: Erro ao executar a operação
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error archiving chat
  /chat/ephemeral:
    post:
      operationId: updateChatEphemeral
      summary: Configurar mensagens temporárias em chat privado
      description: |
        Define o temporizador de mensagens temporárias (disappearing messages) de um chat privado.

        Valores aceitos para a duração:
        - `0` ou `off` para desativar
        - `1d`
        - `7d`
        - `90d`

        Observações:
        - este endpoint é apenas para chats privados
        - se o identificador informado for de grupo, a API retorna erro orientando usar `/group/ephemeral`
        - a resposta também atualiza o `wa_ephemeralExpiration` do chat no cache local
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
                - duration
              properties:
                number:
                  type: string
                  description: Identificador do chat privado
                  example: 5511999999999@s.whatsapp.net
                duration:
                  oneOf:
                    - type: string
                    - type: integer
                  description: Duração desejada para mensagens temporárias
                  example: 7d
            examples:
              ativar_7_dias:
                summary: Ativar por 7 dias
                value:
                  number: 5511999999999@s.whatsapp.net
                  duration: 7d
              desativar:
                summary: Desativar mensagens temporárias
                value:
                  number: 5511999999999@s.whatsapp.net
                  duration: 'off'
      responses:
        '200':
          description: Temporizador atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Ephemeral timer updated successfully
                  chat:
                    $ref: ../schemas/chat.yaml#/Chat
                  ephemeral:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        example: true
                      seconds:
                        type: integer
                        format: int64
                        example: 604800
                      label:
                        type: string
                        example: 7d
              examples:
                sucesso:
                  summary: Timer atualizado
                  value:
                    response: Ephemeral timer updated successfully
                    chat:
                      wa_chatid: 5511999999999@s.whatsapp.net
                      wa_ephemeralExpiration: 604800
                      wa_isGroup: false
                    ephemeral:
                      enabled: true
                      seconds: 604800
                      label: 7d
        '400':
          description: Payload inválido, chat inválido ou duração não suportada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'invalid duration. Allowed values: 0, off, 1d, 7d, 90d'
        '401':
          description: Token inválido ou ausente
        '500':
          description: Erro interno ao atualizar o temporizador
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Error updating chat ephemeral timer: connection closed'
  /chat/read:
    post:
      operationId: markChatRead
      summary: Marcar chat como lido/não lido
      description: |
        Atualiza o status de leitura de um chat no WhatsApp.

        Quando um chat é marcado como lido:
        - O contador de mensagens não lidas é zerado
        - O indicador visual de mensagens não lidas é removido
        - O remetente recebe confirmação de leitura (se ativado)

        Quando marcado como não lido:
        - O chat aparece como pendente de leitura
        - Não afeta as confirmações de leitura já enviadas
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
                - read
              properties:
                number:
                  type: string
                  description: |
                    Identificador do chat no formato:
                    - Para usuários: [número]@s.whatsapp.net (ex: 5511999999999@s.whatsapp.net)
                    - Para grupos: [id-grupo]@g.us (ex: 123456789-987654321@g.us)
                  example: 5511999999999@s.whatsapp.net
                read:
                  type: boolean
                  description: |
                    - true: marca o chat como lido
                    - false: marca o chat como não lido
      responses:
        '200':
          description: Status de leitura atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Chat read status updated successfully
        '401':
          description: Token de autenticação ausente ou inválido
        '404':
          description: Chat não encontrado
        '500':
          description: Erro ao atualizar status de leitura
  /chat/mute:
    post:
      operationId: muteChat
      summary: Silenciar chat
      description: |
        Silencia notificações de um chat por um período específico. 
        As opções de silenciamento são:
        * 0 - Remove o silenciamento
        * 8 - Silencia por 8 horas
        * 168 - Silencia por 1 semana (168 horas)
        * -1 - Silencia permanentemente
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
                - muteEndTime
              properties:
                number:
                  type: string
                  description: ID do chat no formato 123456789@s.whatsapp.net ou 123456789-123456@g.us
                  example: 5511999999999@s.whatsapp.net
                muteEndTime:
                  type: integer
                  description: |
                    Duração do silenciamento:
                    * 0 = Remove silenciamento
                    * 8 = Silencia por 8 horas
                    * 168 = Silencia por 1 semana
                    * -1 = Silencia permanentemente
                  enum:
                    - 0
                    - 8
                    - 168
                    - -1
                  example: 8
      responses:
        '200':
          description: Chat silenciado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Chat mute settings updated successfully
        '400':
          description: Duração inválida ou formato de número incorreto
        '401':
          description: Token inválido ou ausente
        '404':
          description: Chat não encontrado
  /chat/pin:
    post:
      operationId: pinChat
      summary: Fixar/desafixar chat
      description: |
        Fixa ou desafixa um chat no topo da lista de conversas. Chats fixados permanecem 
        no topo mesmo quando novas mensagens são recebidas em outros chats.
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: |
                    Número do chat no formato internacional completo (ex: "5511999999999") 
                    ou ID do grupo (ex: "123456789-123456@g.us")
                  example: '5511999999999'
                pin:
                  type: boolean
                  description: |
                    Define se o chat deve ser fixado (true) ou desafixado (false)
                  example: true
              required:
                - number
                - pin
      responses:
        '200':
          description: Chat fixado/desafixado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmação
                    example: Chat pinned
        '400':
          description: Erro na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro
                    example: Could not parse phone
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro de autenticação
                    example: Invalid token
  /chat/find:
    post:
      operationId: findChats
      summary: Busca chats com filtros
      description: |
        Busca chats com diversos filtros e ordenação. Suporta filtros em todos os campos do chat, 
        paginação e ordenação customizada.

        Operadores de filtro:
        - `~` : LIKE (contém)
        - `!~` : NOT LIKE (não contém)
        - `!=` : diferente
        - `>=` : maior ou igual
        - `>` : maior que
        - `<=` : menor ou igual
        - `<` : menor que
        - Sem operador: LIKE (contém)
      tags:
        - Chats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operator:
                  type: string
                  enum:
                    - AND
                    - OR
                  default: AND
                  description: Operador lógico entre os filtros
                sort:
                  type: string
                  description: Campo para ordenação (+/-campo). Ex -wa_lastMsgTimestamp
                limit:
                  type: integer
                  description: Quantidade máxima de resultados a retornar
                  default: 20
                offset:
                  type: integer
                  description: Número de registros a pular (para paginação)
                  default: 0
                wa_fastid:
                  type: string
                wa_chatid:
                  type: string
                wa_archived:
                  type: boolean
                wa_contactName:
                  type: string
                wa_name:
                  type: string
                name:
                  type: string
                wa_isBlocked:
                  type: boolean
                wa_isGroup:
                  type: boolean
                wa_isGroup_admin:
                  type: boolean
                wa_isGroup_announce:
                  type: boolean
                wa_isGroup_member:
                  type: boolean
                wa_isPinned:
                  type: boolean
                wa_label:
                  type: string
                  description: ID da label aplicada ao chat. Use o valor retornado por `/labels`, não o nome da etiqueta.
                wa_notes:
                  type: string
                lead_tags:
                  type: string
                lead_isTicketOpen:
                  type: boolean
                lead_assignedAttendant_id:
                  type: string
                lead_status:
                  type: string
              example:
                operator: AND
                sort: '-wa_lastMsgTimestamp'
                limit: 50
                offset: 0
                wa_isGroup: true
                lead_status: ~novo
                wa_label: '10'
                wa_notes: ~vip
      responses:
        '200':
          description: Lista de chats encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  chats:
                    type: array
                    items:
                      $ref: ../schemas/chat.yaml#/Chat
                  totalChatsStats:
                    type: object
                    description: Contadores totais de chats
                  pagination:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                        description: Total de registros encontrados
                      limit:
                        type: integer
                        description: Limite aplicado na busca
                      offset:
                        type: integer
                        description: Offset usado para recuperar os resultados
  /chat/notes:
    post:
      operationId: getChatNotes
      tags:
        - Chats
      summary: Consultar notas internas do chat
      description: |
        Retorna `wa_notes` de um chat usando apenas os dados já persistidos localmente.

        Casos de uso:
        - ler a anotação local já persistida no chat
        - consultar notas mesmo durante reconexão da sessão do WhatsApp

        Regras:
        - envie `number`
        - para recarregar do WhatsApp, use `/chat/notes/refresh`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: JID completo do chat
                  example: 5511999999999@s.whatsapp.net
            examples:
              por_number:
                summary: Consultar nota por number
                value:
                  number: 5511999999999@s.whatsapp.net
      responses:
        '200':
          description: Nota do chat retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat:
                    $ref: ../schemas/chat.yaml#/Chat
                  wa_notes:
                    type: string
                    description: Conteúdo atual da nota do chat
                    example: Cliente prefere contato no período da tarde
                  source:
                    type: string
                    description: Origem usada para compor a resposta
                    enum:
                      - local
                    example: local
              examples:
                sucesso_local:
                  value:
                    chat:
                      wa_fastid: admin:5511999999999
                      wa_chatid: 5511999999999@s.whatsapp.net
                      wa_notes: Cliente prefere contato no período da tarde
                    wa_notes: Cliente prefere contato no período da tarde
                    source: local
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: number is required
        '404':
          description: Chat não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: chat not found
        '500':
          description: Erro interno ao consultar a nota local
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to load chat notes from local database
  /chat/notes/refresh:
    post:
      operationId: refreshChatNotes
      tags:
        - Chats
      summary: Recarregar notas internas do chat no WhatsApp
      description: |
        Faz uma nova leitura das notas internas do chat no WhatsApp antes de retornar o valor atualizado.

        Uso recomendado:
        - tente primeiro com `force=false`
        - se isso não atualizar a nota corretamente, tente `force=true`
        - use `force=true` apenas como tentativa de correção, porque ele faz uma recarga mais pesada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: JID completo do chat
                  example: 5511999999999@s.whatsapp.net
                force:
                  type: boolean
                  description: |
                    Tente primeiro com `false`.
                    Use `true` apenas quando a recarga padrão não funcionar bem,
                    pois esse modo faz uma nova leitura mais completa das notas.
                  default: false
                  example: false
            examples:
              recarregar:
                summary: Recarregar no modo padrão
                value:
                  number: 5511999999999@s.whatsapp.net
              reparar_full_sync:
                summary: Recarregar em modo forçado
                value:
                  number: 5511999999999@s.whatsapp.net
                  force: true
      responses:
        '200':
          description: Nota do chat recarregada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat:
                    $ref: ../schemas/chat.yaml#/Chat
                  wa_notes:
                    type: string
                    description: Conteúdo atual da nota do chat
                    example: Cliente prefere contato no período da tarde
                  source:
                    type: string
                    description: Origem usada para compor a resposta
                    enum:
                      - appstate_reload
                    example: appstate_reload
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: number is required
        '404':
          description: Chat não encontrado após o reload
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: chat not found
        '409':
          description: O reload não pode ser executado porque o history sync inicial ainda está em andamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: history sync still in progress, try again in a moment
        '500':
          description: Erro interno ao recarregar a nota
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'failed to fetch regular_low app state: connection closed'
  /chat/notes/edit:
    post:
      operationId: editChatNotes
      tags:
        - Chats
      summary: Editar notas internas do chat
      description: |
        Atualiza `wa_notes` de um chat via app state do WhatsApp e persiste o resultado localmente.

        Regras:
        - envie `number`
        - envie `notes` como campo principal
        - envie string vazia para limpar a nota do chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: JID completo do chat
                  example: 5511999999999@s.whatsapp.net
                notes:
                  type: string
                  description: Conteúdo da nota a persistir no chat
                  example: Cliente prefere contato no período da tarde
            examples:
              salvar:
                summary: Salvar nota
                value:
                  number: 5511999999999@s.whatsapp.net
                  notes: Cliente prefere contato no período da tarde
              limpar:
                summary: Limpar nota
                value:
                  number: 5511999999999@s.whatsapp.net
                  notes: ''
      responses:
        '200':
          description: Nota atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Chat notes updated
                  chat:
                    $ref: ../schemas/chat.yaml#/Chat
                  wa_notes:
                    type: string
                    description: Conteúdo atual da nota após a atualização
                    example: Cliente prefere contato no período da tarde
                  source:
                    type: string
                    description: Origem da atualização
                    enum:
                      - api
                    example: api
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: notes is required
        '404':
          description: Chat não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: chat not found
        '409':
          description: A edição não pode ser executada porque o history sync inicial ainda está em andamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: history sync still in progress, try again in a moment
        '500':
          description: Erro interno ao atualizar a nota
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'error editing chat notes: client is not connected'
  /chat/editLead:
    post:
      operationId: editLead
      summary: Edita informações de lead
      description: |
        Atualiza as informações de lead associadas a um chat. Permite modificar status do ticket, 
        atribuição de atendente, posição no kanban, tags e outros campos customizados.

        As alterações são refletidas imediatamente no banco de dados e disparam eventos webhook/SSE
        para manter a aplicação sincronizada.
      tags:
        - CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: |
                    Identificador do chat. Pode ser:
                    - wa_chatid (ex: "5511999999999@s.whatsapp.net")
                    - wa_fastid (ex: "5511888888888:5511999999999")
                  example: 5511999999999@s.whatsapp.net
                chatbot_disableUntil:
                  type: integer
                  format: int64
                  description: |
                    Timestamp UTC até quando o chatbot deve ficar desativado para este chat.
                    Use 0 para reativar imediatamente.
                  example: 1735686000
                lead_isTicketOpen:
                  type: boolean
                  description: |
                    Status do ticket associado ao lead.
                    - true: Ticket está aberto/em atendimento
                    - false: Ticket está fechado/resolvido
                  example: true
                lead_assignedAttendant_id:
                  type: string
                  description: |
                    ID do atendente atribuído ao lead.
                    Use string vazia ("") para remover a atribuição.
                  example: att_123456
                lead_kanbanOrder:
                  type: integer
                  format: int64
                  description: |
                    Posição do card no quadro kanban.
                    Valores maiores aparecem primeiro.
                  example: 1000
                lead_tags:
                  type: array
                  items:
                    type: string
                  description: |
                    Lista de tags associadas ao lead.
                    Tags inexistentes são criadas automaticamente.
                    Envie array vazio ([]) para remover todas as tags.
                  example:
