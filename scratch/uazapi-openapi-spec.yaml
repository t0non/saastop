  /newsletter/messages:
    post:
      operationId: getNewsletterMessages
      tags:
        - Newsletters e Canais
      summary: Buscar mensagens de um canal
      description: |
        Busca diretamente no WhatsApp os posts/mensagens de um canal (newsletter).

        Esta rota não depende de mensagens salvas localmente e é útil para:
        - carregar o histórico recente de posts de um canal
        - paginar mensagens anteriores usando `beforeid`
        - consumir conteúdo de newsletters sem persistência em banco

        Identificação do canal:
        - envie `id` com o identificador numérico do canal; o backend converte para `@newsletter`
        - ou envie `jid` completo no formato `1234567890@newsletter`

        Observações:
        - `count` controla quantos posts retornar
        - use preferencialmente `beforeid`
        - `beforeid` pagina para trás a partir de um `serverid`
        - o retorno vem no campo `response`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID numérico do canal. Se informado sem domínio, será convertido para `@newsletter`.
                  example: '120363123456789012'
                jid:
                  type: string
                  description: JID completo do canal.
                  example: 120363123456789012@newsletter
                count:
                  type: integer
                  minimum: 1
                  description: Quantidade de mensagens/posts a buscar.
                  example: 20
                beforeid:
                  type: integer
                  minimum: 1
                  description: |
                    Retorna mensagens anteriores ao `serverid` informado.
                    Use para paginação retroativa.
                  example: 12345
            examples:
              basico:
                summary: Buscar últimos posts do canal
                value:
                  id: '120363123456789012'
                  count: 20
              paginacao:
                summary: Buscar posts anteriores a um server id
                value:
                  jid: 120363123456789012@newsletter
                  count: 20
                  beforeid: 12345
      responses:
        '200':
          description: Mensagens do canal recuperadas com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    description: Lista de mensagens/posts do canal retornados diretamente pelo WhatsApp.
                    items:
                      type: object
                      properties:
                        serverid:
                          type: integer
                          description: Identificador sequencial do post no canal.
                          example: 12345
                        messageid:
                          type: string
                          description: ID lógico da mensagem.
                          example: 3EB0B4302B3A8A52F7A1
                        type:
                          type: string
                          description: Tipo da mensagem do canal.
                          example: text
                        timestamp:
                          type: string
                          format: date-time
                          description: Momento em que o post foi publicado.
                        viewsCount:
                          type: integer
                          description: Quantidade de visualizações conhecida no momento da consulta.
                          example: 1200
                        reactionCounts:
                          type: object
                          additionalProperties:
                            type: integer
                          description: Mapa de emoji para quantidade de reações.
                          example:
                            👍: 22
                            🔥: 7
                        message:
                          type: object
                          description: Conteúdo bruto da mensagem retornado pelo WhatsApp quando disponível.
                          additionalProperties: true
              examples:
                sucesso:
                  value:
                    response:
                      - messageid: 3EB0B4302B3A8A52F7A1
                        serverid: 12345
                        type: text
                        timestamp: '2026-03-24T18:20:00Z'
                        viewsCount: 1200
                        reactionCounts:
                          👍: 22
                          🔥: 7
                        message:
                          conversation: Post do canal
        '400':
          description: Payload inválido ou ID/JID do canal inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid newsletter id
        '401':
          description: Instância não autenticada ou cliente não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '500':
          description: Erro interno ao consultar mensagens do canal no WhatsApp
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: connection closed
  /newsletter/messages/edit:
    post:
      operationId: editNewsletterMessage
      tags:
        - Newsletters e Canais
      summary: Editar mensagem recente de um canal
      description: |
        Edita o conteúdo de um post recente de newsletter diretamente no WhatsApp.

        Esta rota:
        - nao depende de mensagens salvas localmente
        - busca a mensagem recente do canal via WhatsApp/whatsmeow
        - localiza o post por `messageid` ou `serverid`
        - edita apenas tipos suportados (`text`, `image`, `video`, `document`)

        Observações:
        - use `jid` ou `id` para identificar o canal
        - envie ao menos um entre `messageid` e `serverid`
        - envie `text` com o novo conteúdo/legenda
        - `count` e `maxpages` controlam a janela de busca no canal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                id:
                  type: string
                  description: ID numérico do canal. Se informado sem domínio, será convertido para `@newsletter`.
                  example: '120363123456789012'
                jid:
                  type: string
                  description: JID completo do canal.
                  example: 120363123456789012@newsletter
                messageid:
                  type: string
                  description: ID lógico da mensagem no canal.
                  example: 3EB0B4302B3A8A52F7A1
                serverid:
                  type: integer
                  minimum: 1
                  description: Identificador sequencial do post no canal.
                  example: 12345
                text:
                  type: string
                  description: Novo texto ou nova legenda do post.
                  example: Post atualizado
                count:
                  type: integer
                  minimum: 1
                  description: Quantidade de mensagens buscadas por página ao localizar o post.
                  example: 100
                maxpages:
                  type: integer
                  minimum: 1
                  description: Quantidade máxima de páginas buscadas ao localizar o post.
                  example: 5
            examples:
              por_message_id:
                summary: Editar usando o ID lógico da mensagem
                value:
                  jid: 120363123456789012@newsletter
                  messageid: 3EB0B4302B3A8A52F7A1
                  text: Post atualizado
              por_server_id:
                summary: Editar usando o server id do post
                value:
                  id: '120363123456789012'
                  serverid: 12345
                  text: Nova legenda do post
      responses:
        '200':
          description: Mensagem do canal editada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      jid:
                        type: string
                        example: 120363123456789012@newsletter
                      targetmessageid:
                        type: string
                        description: ID lógico do post editado.
                        example: 3EB0B4302B3A8A52F7A1
                      targetserverid:
                        type: integer
                        description: Identificador sequencial do post editado.
                        example: 12345
                      messageid:
                        type: string
                        description: ID da operação de edição enviada ao WhatsApp.
                        example: 3EB01234567890ABCDEF
                      serverid:
                        type: integer
                        description: Server id retornado pela operação de edição.
                        example: 12346
        '400':
          description: Payload inválido, mensagem não editável, mensagem alvo não identificada ou canal inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: text is required
        '401':
          description: Instância não autenticada ou cliente não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '404':
          description: Mensagem do canal não encontrada na janela recente consultada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: newsletter message not found in recent history
        '500':
          description: Erro interno ao consultar ou editar a mensagem do canal
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: connection closed
