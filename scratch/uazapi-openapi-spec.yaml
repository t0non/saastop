  /message/async:
    get:
      operationId: getAsyncQueueStatus
      tags:
        - Mensagem Async
      summary: Consultar fila async de envio direto
      description: |
        Retorna um resumo simples da fila de envio `async=true` da instância atual autenticada.

        Este endpoint cobre apenas a fila interna de envio direto assíncrono. Ele **não** representa:
        - campanhas de envio em massa do sender (`/sender/*`)

        A resposta padrão foi pensada para clientes:
        - `status`: visão resumida da fila (`idle`, `queued`, `processing`, `waiting_connection`, `resetting`)
        - `pending`: quantidade total estimada de mensagens pendentes
        - `processingNow`: indica se o worker está ocupando um job neste momento
        - `acceptingNewMessages`: indica se a fila aceita novos envios async
        - `sessionReady`: indica se a sessão WhatsApp está pronta para envio
        - `resetting`: indica se a fila está pausada por reset/clear
      responses:
        '200':
          description: Resumo da fila async
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Async queue status
                  instanceId:
                    type: string
                    description: ID da instância
                  queue:
                    type: object
                    properties:
                      status:
                        type: string
                        description: Estado resumido da fila
                        example: waiting_connection
                      pending:
                        type: integer
                        format: int64
                        description: Quantidade total estimada de mensagens pendentes
                        example: 3
                      processingNow:
                        type: boolean
                        description: Indica se há um job ativo no worker agora
                        example: true
                      acceptingNewMessages:
                        type: boolean
                        description: Indica se a fila aceita novos envios async
                        example: true
                      sessionReady:
                        type: boolean
                        description: Indica se a sessão WhatsApp está pronta para envio
                        example: false
                      resetting:
                        type: boolean
                        description: Indica se a fila async está pausada por reset/clear
                        example: false
        '401':
          description: Token inválido ou ausente
        '500':
          description: Erro interno ao consultar a fila async
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  instanceId:
                    type: string
    delete:
      operationId: clearAsyncQueue
      tags:
        - Mensagem Async
      summary: Limpar fila async de envio direto
      description: >
        Cancela toda a fila de envio `async=true` da instância e marca as mensagens pendentes como `Canceled`.


        Este endpoint atua apenas na fila interna de envio direto assíncrono. Ele **não** afeta:

        - campanhas do sender (`/sender/*`)

        - mensagens já enviadas com sucesso

        - mensagens em massa agendadas


        O fluxo executado é:

        1. pausa o worker interno da fila async

        2. drena jobs pendentes em memória e overflow

        3. marca backlog persistido em `Queued` como `Canceled`

        4. libera a fila para novos envios async


        Use este endpoint quando houver backlog preso, fila acumulada ou quando você quiser abortar todos os envios
        assíncronos ainda não concluídos.
      responses:
        '200':
          description: Fila async limpa com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Async queue cleared
                  instanceId:
                    type: string
                    description: ID da instância
                  stats:
                    type: object
                    properties:
                      trackedJobsCleared:
                        type: integer
                        description: Quantidade de IDs rastreados removidos da fila em memória
                        example: 3
                      bufferedJobsMarkedCanceled:
                        type: integer
                        description: Jobs em memória marcados como `Canceled`
                        example: 2
                      drainedChannelJobs:
                        type: integer
                        description: Jobs removidos do canal principal da fila
                        example: 1
                      clearedOverflowJobs:
                        type: integer
                        description: Jobs removidos do backlog de overflow
                        example: 1
                      persistedQueuedCanceled:
                        type: integer
                        format: int64
                        description: Mensagens persistidas em `Queued` que foram atualizadas para `Canceled`
                        example: 5
        '401':
          description: Token inválido ou ausente
        '409':
          description: >-
            A fila não pôde ser limpa porque a instância está em reset ou havia envio em progresso que não drenou a
            tempo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: async queue did not drain before reset
                  instanceId:
                    type: string
                  stats:
                    type: object
                    additionalProperties: true
        '500':
          description: Erro interno ao limpar a fila async
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  instanceId:
                    type: string
                  stats:
                    type: object
                    additionalProperties: true
  /instance/updateDelaySettings:
    post:
      operationId: updateDelaySettings
      tags:
        - Mensagem Async
      summary: Configurar delay entre mensagens async
      description: |
        Configura o intervalo de tempo entre mensagens diretas enviadas com `async=true`.

        ### Detalhes
        - Configuração aplicada apenas à fila interna de mensagens async
        - Afeta mensagens enviadas pelos endpoints de envio com `async=true`
        - Não afeta campanhas do sender (`/sender/*`)
        - Delay mínimo (msg_delay_min): 0 ou mais segundos (0 = sem delay)
        - Delay máximo (msg_delay_max): se menor que min, será ajustado para o mesmo valor de min
        - Sistema ajusta automaticamente valores negativos para 0

        ### Exemplo
        ```json
        {
          "msg_delay_min": 0,
          "msg_delay_max": 2
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                msg_delay_min:
                  type: integer
                  format: int64
                  minimum: 0
                  description: Delay mínimo em segundos (0 = sem delay)
                  example: 0
                msg_delay_max:
                  type: integer
                  format: int64
                  minimum: 0
                  description: Delay máximo em segundos
                  example: 2
              required:
                - msg_delay_min
                - msg_delay_max
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance:
                    $ref: ../schemas/instance.yaml#/Instance
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid request payload
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to update delay settings
  /message/download:
    post:
      operationId: downloadMessage
      tags:
        - Ações na mensagem e Buscar
      summary: Baixar arquivo de uma mensagem
      description: >
        Baixa o arquivo associado a uma mensagem de mídia (imagem, vídeo, áudio, documento ou sticker).


        ## Parâmetros


        - **id** (string, obrigatório): ID da mensagem

        - **return_base64** (boolean, default: false): Retorna arquivo em base64

        - **generate_mp3** (boolean, default: true): Para áudios, define formato de retorno
          - `true`: Retorna MP3
          - `false`: Retorna OGG
        - **return_link** (boolean, default: true): Retorna URL pública do arquivo

        - **transcribe** (boolean, default: false): Transcreve áudios para texto

        - **openai_apikey** (string, opcional): Chave OpenAI para transcrição
          - Se não informada, usa a chave salva na instância
          - Se informada, atualiza e salva na instância para próximas chamadas
        - **download_quoted** (boolean, default: false): Baixa mídia da mensagem citada
          - Útil para baixar conteúdo original de status do WhatsApp
          - Quando uma mensagem é resposta a um status, permite baixar a mídia do status original
          - **Contextualização**: Ao baixar a mídia citada, você identifica o contexto da conversa
            - Exemplo: Se alguém responde a uma promoção, baixando a mídia você saberá que a pergunta é sobre aquela promoção específica

        ## Exemplos


        ### Baixar áudio como MP3:

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "generate_mp3": true
        }

        ```


        ### Transcrever áudio:

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "transcribe": true
        }

        ```


        ### Apenas base64 (sem salvar):

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "return_base64": true,
          "return_link": false
        }

        ```


        ### Baixar mídia de status (mensagem citada):

        ```json

        {
          "id": "7EB0F01D7244B421048F0706368376E0",
          "download_quoted": true
        }

        ```

        *Útil quando o cliente responde a uma promoção/status - você baixa a mídia original para entender sobre qual
        produto/oferta ele está perguntando.*


        ## Resposta


        ```json

        {
          "fileURL": "https://api.exemplo.com/files/arquivo.mp3",
          "mimetype": "audio/mpeg",
          "base64Data": "UklGRkj...",
          "transcription": "Texto transcrito"
        }

        ```


        **Nota**: 

        - Por padrão, se não definido o contrário:
          1. áudios são retornados como MP3. 
          2. E todos os pedidos de download são retornados com URL pública.
        - Transcrição requer chave OpenAI válida. A chave pode ser configurada uma vez na instância e será reutilizada
        automaticamente.

        - Retenção de mídia: mantemos as mídias no nosso storage por 2 dias. Após 2 dias, elas são removidas na limpeza
        automática e o link retornado deixa de ficar disponível. Para voltar a disponibilizar a mídia, é necessário
        refazer o download pelo endpoint. Se o cliente solicitar novamente, a mídia será baixada do CDN da Meta, o que
        pode aumentar o tempo de resposta. Enquanto estiver no nosso storage, a resposta tende a ser mais rápida.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID da mensagem contendo o arquivo
                  example: 7EB0F01D7244B421048F0706368376E0
                return_base64:
                  type: boolean
                  description: Se verdadeiro, retorna o conteúdo em base64
                  default: false
                generate_mp3:
                  type: boolean
                  description: Para áudios, define formato de retorno (true=MP3, false=OGG)
                  default: true
                return_link:
                  type: boolean
                  description: Salva e retorna URL pública do arquivo
                  default: true
                transcribe:
                  type: boolean
                  description: Se verdadeiro, transcreve áudios para texto
                  default: false
                openai_apikey:
                  type: string
                  description: Chave da API OpenAI para transcrição (opcional)
                  example: sk-...
                download_quoted:
                  type: boolean
                  description: Se verdadeiro, baixa mídia da mensagem citada ao invés da mensagem principal
                  default: false
              required:
                - id
      responses:
        '200':
          description: Successful file download
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileURL:
                    type: string
                    description: URL pública para acessar o arquivo (se return_link=true)
                    example: https://api.exemplo.com/files/arquivo.mp3
                  mimetype:
                    type: string
                    description: Tipo MIME do arquivo
                    example: audio/mpeg
                  base64Data:
                    type: string
                    description: Conteúdo do arquivo em base64 (se return_base64=true)
                    example: UklGRkj...
                  transcription:
                    type: string
                    description: Texto transcrito do áudio (se transcribe=true)
                    example: Texto transcrito
                required:
                  - mimetype
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unsupported media type or no media found in message
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid token
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - Message not found
                      - No quoted message found in this message
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to download media
  /message/find:
    post:
      operationId: findMessages
      tags:
        - Ações na mensagem e Buscar
      summary: Buscar mensagens em um chat
      description: |
        Busca mensagens com múltiplos filtros disponíveis. Este endpoint permite:

        1. **Busca por ID específico**: Use `id` para encontrar uma mensagem exata
        2. **Filtrar por chat**: Use `chatid` para mensagens de uma conversa específica
        3. **Filtrar por rastreamento**: Use `track_source` e `track_id` para mensagens com dados de tracking
        4. **Limitar resultados**: Use `limit` para controlar quantas mensagens retornar
        5. **Ordenação**: Resultados ordenados por data (mais recentes primeiro)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID específico da mensagem para busca exata
                  example: user123:r3EB0538
                chatid:
                  type: string
                  description: ID do chat no formato internacional
                  example: 5511999999999@s.whatsapp.net
                track_source:
                  type: string
                  description: Origem do rastreamento para filtrar mensagens
                  example: chatwoot
                track_id:
                  type: string
                  description: ID de rastreamento para filtrar mensagens
                  example: msg_123456789
                limit:
                  type: integer
                  description: Numero maximo de mensagens a retornar (padrao 100)
                  minimum: 1
                  default: 100
                  example: 20
                offset:
                  type: integer
                  description: Deslocamento para paginacao (0 retorna as mensagens mais recentes)
                  default: 0
            examples:
              chatSearch:
                summary: Buscar por chat especifico
                description: Busca mensagens de uma conversa especifica
                value:
                  chatid: 5511999999999@s.whatsapp.net
                  limit: 20
                  offset: 0
              idSearch:
                summary: Buscar por ID especifico
                description: Busca uma mensagem especifica pelo seu ID
                value:
                  id: user123:r3EB0538
              trackingSearch:
                summary: Buscar por rastreamento
                description: Busca mensagens usando dados de tracking com paginacao
                value:
                  track_source: chatwoot
                  track_id: conv_123456
                  limit: 50
                  offset: 100
      responses:
        '200':
          description: Lista de mensagens encontradas com metadados de paginacao
          content:
            application/json:
              schema:
                type: object
                properties:
                  returnedMessages:
                    type: integer
                    description: Quantidade de mensagens retornadas nesta pagina
                  messages:
                    type: array
                    items:
                      $ref: ../schemas/message.yaml#/Message
                  limit:
                    type: integer
                    description: Limite aplicado na busca
                  offset:
                    type: integer
                    description: Offset usado para recuperar os resultados
                  nextOffset:
                    type: integer
                    description: Offset sugerido para a proxima pagina
                  hasMore:
                    type: boolean
                    description: Indica se existem mais mensagens apos esta pagina
        '400':
          description: Parametros invalidos
        '401':
          description: Token invalido ou expirado
        '404':
          description: Chat nao encontrado
        '500':
          description: Erro interno do servidor
  /message/history-sync:
    post:
      operationId: requestHistorySync
      tags:
        - Ações na mensagem e Buscar
      summary: Solicitar histórico sob demanda de um chat
      description: >
        Solicita ao WhatsApp um sync sob demanda de mensagens antigas de um chat

        ou tenta recuperar uma mensagem exata já conhecida localmente.


        Modos suportados:

        - `history` (padrão): busca histórico para trás a partir de uma mensagem âncora

        - `exact`: tenta recarregar a mensagem exata informada em `messageid`


        Regras:

        - envie `number`

        - `mode` é opcional; quando omitido, assume `history`

        - em `mode=history`, `count` é opcional e limitado a 100

        - em `mode=history`, `messageid` é opcional; quando informado, a API usa essa mensagem como referência para
        buscar mensagens mais antigas do chat

        - em `mode=exact`, `messageid` é obrigatório e `count` não é necessário


        Observação:

        - **Importante:** a recuperação pode só acontecer depois de abrir o WhatsApp no celular ou deixá-lo ativo em
        segundo plano

        - em `mode=history`, `messageid` define a mensagem de referência para carregar histórico anterior

        - em `mode=history`, esse campo não serve para buscar essa mensagem específica

        - em `mode=history`, o histórico é buscado para trás a partir da mensagem de referência informada

        - se você quiser recuperar apenas uma mensagem específica `X` via histórico, informe como `messageid` a mensagem
        logo depois de `X` e use `count=1`

        - se `messageid` não for informado em `mode=history`, a API usa a mensagem mais antiga conhecida localmente
        desse chat como referência para buscar histórico anterior

        - em `mode=exact`, a API tenta um rerequest da mensagem exata informada em `messageid`

        - **`mode=exact` está em teste** e funciona melhor quando a mensagem já existe no histórico local da instância

        - as mensagens retornam depois via webhook/SSE em eventos do tipo `history` e também ficam disponíveis em
        `/message/find`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
              properties:
                mode:
                  type: string
                  enum:
                    - history
                    - exact
                  default: history
                  description: |
                    Define o comportamento da operação.
                    - `history`: busca mensagens mais antigas a partir de uma âncora
                    - `exact`: tenta recuperar a mensagem exata informada em `messageid`
                  example: history
                messageid:
                  type: string
                  description: |
                    Em `mode=history`, ID da mensagem de referência usada para buscar mensagens mais antigas do chat.
                    Em `mode=exact`, ID exato da mensagem que deve ser recarregada.
                  example: 3EB01234567890ABCDEF
                number:
                  type: string
                  description: >-
                    JID completo do chat. Mantido obrigatório em todos os modos para simplificar o contrato público e
                    restringir a busca ao chat esperado.
                  example: 5511999999999@s.whatsapp.net
                count:
                  type: integer
                  minimum: 1
                  maximum: 100
                  description: Quantidade desejada de mensagens no sync em `mode=history`. Em `mode=exact`, este campo é ignorado.
                  example: 20
            examples:
              recuperar_mensagem_exata:
                summary: Recuperar a mensagem exata informada
                value:
                  number: 5511999999999@s.whatsapp.net
                  mode: exact
                  messageid: 3EB01234567890ABCDEF
              usando_ancora_explicita:
                summary: Buscar histórico anterior a uma mensagem de referência
                value:
                  number: 5511999999999@s.whatsapp.net
                  mode: history
                  messageid: 3EB01234567890ABCDEF
                  count: 20
              recuperar_mensagem_especifica:
                summary: Recuperar apenas a mensagem imediatamente anterior à referência
                value:
                  number: 5511999999999@s.whatsapp.net
                  mode: history
                  messageid: 3EB0MENSAGEM_LOGO_APOS_X
                  count: 1
              usando_ancora_local:
                summary: Reutilizar âncora local já persistida
                value:
                  number: 5511999999999@s.whatsapp.net
                  mode: history
                  count: 50
      responses:
        '200':
          description: Solicitação enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  mode:
                    type: string
                    example: history
                  message:
                    type: string
                    example: History sync request sent. Messages will be received as history sync events.
                  details:
                    type: object
                    additionalProperties: true
                    description: Metadados adicionais da operação
              examples:
                async_padrão:
                  summary: Solicitação de histórico enviada
                  value:
                    success: true
                    mode: history
                    message: History sync request sent. Messages will be received as history sync events.
                exact_padrão:
                  summary: Solicitação de mensagem exata enviada
                  value:
                    success: true
                    mode: exact
                    message: Exact message reload request sent. The message will be received if available.
        '400':
          description: Payload inválido, modo inválido ou âncora insuficiente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: number is required
        '404':
          description: Mensagem exata não encontrada no histórico local
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: messageid not found in local history for chat; use mode=history to fetch older messages first
        '500':
          description: Erro interno ao solicitar o history sync ou o rerequest exato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to request history: connection closed'
  /message/markread:
    post:
      operationId: markMessageRead
      tags:
        - Ações na mensagem e Buscar
      summary: Marcar mensagens como lidas
      description: |
        Marca uma ou mais mensagens como lidas. Este endpoint permite:
        1. Marcar múltiplas mensagens como lidas de uma vez
        2. Atualizar o status de leitura no WhatsApp
        3. Sincronizar o status de leitura entre dispositivos

        Exemplo de requisição básica:
        ```json
        {
          "id": [
            "62AD1AD844E518180227BF68DA7ED710",
            "ECB9DE48EB41F77BFA8491BFA8D6EF9B"  
          ]
        }
        ```

        Exemplo de resposta:
        ```json
        {
          "success": true,
          "message": "Messages marked as read",
          "markedMessages": [
            {
              "id": "62AD1AD844E518180227BF68DA7ED710",
              "timestamp": 1672531200000
            },
            {
              "id": "ECB9DE48EB41F77BFA8491BFA8D6EF9B",
              "timestamp": 1672531300000
            }
          ]
        }
        ```

        Parâmetros disponíveis:
        - id: Lista de IDs das mensagens a serem marcadas como lidas

        Erros comuns:
        - 401: Token inválido ou expirado
        - 400: Lista de IDs vazia ou inválida
        - 404: Uma ou mais mensagens não encontradas
        - 500: Erro ao marcar mensagens como lidas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: array
                  description: Lista de IDs das mensagens a serem marcadas como lidas
                  items:
                    type: string
                  example:
                    - 62AD1AD844E518180227BF68DA7ED710
                    - ECB9DE48EB41F77BFA8491BFA8D6EF9B
              required:
                - id
      responses:
        '200':
          description: Messages successfully marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        message_id:
                          type: string
                          description: ID of the message that was processed
                        status:
                          type: string
                          enum:
                            - success
                            - error
                          description: Status of the mark as read operation
                        error:
                          type: string
                          description: Error message if status is error
                    example:
                      - message_id: 62AD1AD844E518180227BF68DA7ED710
                        status: success
                      - message_id: ECB9DE48EB41F77BFA8491BFA8D6EF9B
                        status: error
                        error: Message not found
        '400':
          description: Invalid request payload or missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing Id in Payload
        '401':
          description: Unauthorized - invalid or missing token
        '500':
          description: Server error while processing the request
  /message/react:
    post:
      operationId: reactToMessage
      tags:
        - Ações na mensagem e Buscar
      summary: Enviar reação a uma mensagem
      description: |
        Envia uma reação (emoji) a uma mensagem específica. Este endpoint permite:

        1. Adicionar ou remover reações em mensagens

        2. Usar qualquer emoji Unicode válido

        3. Reagir a mensagens em chats individuais ou grupos

        4. Remover reações existentes

        5. Verificar o status da reação enviada


        Tipos de reações suportados:

        - Qualquer emoji Unicode válido (👍, ❤️, 😂, etc)

        - String vazia para remover reação


        Exemplo de requisição básica:

        ```json

        {
          "number": "5511999999999@s.whatsapp.net",
          "text": "👍",
          "id": "3EB0538DA65A59F6D8A251"
        }

        ```


        Exemplo de requisição para remover reação:

        ```json

        {
          "number": "5511999999999@s.whatsapp.net",
          "text": "",
          "id": "3EB0538DA65A59F6D8A251"
        }

        ```


        Exemplo de resposta:

        ```json

        {
          "success": true,
          "message": "Reaction sent",
          "reaction": {
            "id": "3EB0538DA65A59F6D8A251",
            "emoji": "👍",
            "timestamp": 1672531200000,
            "status": "sent"
          }
        }

        ```


        Exemplo de resposta ao remover reação:

        ```json

        {
          "success": true,
          "message": "Reaction removed",
          "reaction": {
            "id": "3EB0538DA65A59F6D8A251",
            "emoji": null,
            "timestamp": 1672531200000,
            "status": "removed"
          }
        }

        ```


        Parâmetros disponíveis:

        - number: Número do chat no formato internacional (ex:
        5511999999999@s.whatsapp.net)

        - text: Emoji Unicode da reação (ou string vazia para remover reação)

        - id: ID da mensagem que receberá a reação


        Erros comuns:

        - 401: Token inválido ou expirado

        - 400: Número inválido ou emoji não suportado

        - 404: Mensagem não encontrada

        - 500: Erro ao enviar reação


        Limitações:

        - Só é possível reagir a mensagens enviadas por outros usuários

        - Não é possível reagir a mensagens antigas (mais de 7 dias)

        - O mesmo usuário só pode ter uma reação ativa por mensagem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: Número do chat no formato internacional
                  example: 5511999999999@s.whatsapp.net
                text:
                  type: string
                  description: Emoji Unicode da reação (ou string vazia para remover reação)
                  example: 👍
                id:
                  type: string
                  description: ID da mensagem que receberá a reação
                  example: 3EB0538DA65A59F6D8A251
              required:
                - number
                - text
                - id
      responses:
        '200':
          description: Reação enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID único da mensagem de reação
                    example: owner:generated_message_id
                  messageid:
                    type: string
                    description: ID gerado para a mensagem de reação
                    example: generated_message_id
                  content:
                    type: object
                    description: Detalhes da reação
                  messageTimestamp:
                    type: number
                    description: Timestamp da mensagem em milissegundos
                    example: 1672531200000
                  messageType:
                    type: string
                    description: Tipo da mensagem
                    example: reaction
                  status:
                    type: string
                    description: Status atual da mensagem
                    example: Pending
                  owner:
                    type: string
                    description: Proprietário da instância
                    example: instance_owner
        '400':
          description: Erro nos dados da requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing Id in Payload
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '404':
          description: Mensagem não encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Message not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error sending message
  /message/delete:
    post:
      operationId: deleteMessage
      tags:
        - Ações na mensagem e Buscar
      summary: Apagar Mensagem Para Todos
      description: |
        Apaga uma mensagem para todos os participantes da conversa.

        ### Funcionalidades:
        - Apaga mensagens em conversas individuais ou grupos
        - Funciona com mensagens enviadas pelo usuário ou recebidas
        - Atualiza o status no banco de dados
        - Envia webhook de atualização

        **Notas Técnicas**:
        1. O ID da mensagem pode ser fornecido em dois formatos:
           - ID completo (contém ":"): usado diretamente
           - ID curto: concatenado com o owner para busca
        2. Gera evento webhook do tipo "messages_update"
        3. Atualiza o status da mensagem para "Deleted"
        4. Para newsletters/canais, use `POST /newsletter/messages/delete`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID da mensagem a ser apagada
              required:
                - id
      responses:
        '200':
          description: Mensagem apagada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                  id:
                    type: string
        '400':
          description: Payload inválido ou ID de chat/sender inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid payload
        '401':
          description: Token não fornecido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '404':
          description: Mensagem não encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: message not found
        '500':
          description: Erro interno do servidor ou sessão não iniciada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
  /message/edit:
    post:
      operationId: editMessage
      tags:
        - Ações na mensagem e Buscar
      summary: Edita uma mensagem enviada
      description: |
        Edita o conteúdo de uma mensagem já enviada usando a funcionalidade nativa do WhatsApp.

        O endpoint realiza:
        - Busca a mensagem original no banco de dados usando o ID fornecido
        - Edita o conteúdo da mensagem para o novo texto no WhatsApp
        - Gera um novo ID para a mensagem editada
        - Retorna objeto de mensagem completo seguindo o padrão da API
        - Dispara eventos SSE/Webhook automaticamente

        **Importante**: 
        - Só é possível editar mensagens enviadas pela própria instância
        - A mensagem deve existir no banco de dados
        - O ID pode ser fornecido no formato completo (owner:messageid) ou apenas messageid
        - A mensagem deve estar dentro do prazo permitido pelo WhatsApp para edição
        - Para newsletters/canais, use `POST /newsletter/messages/edit`
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - text
              properties:
                id:
                  type: string
                  description: ID único da mensagem que será editada (formato owner:messageid ou apenas messageid)
                  example: 3A12345678901234567890123456789012
                text:
                  type: string
                  description: Novo conteúdo de texto da mensagem
                  example: Texto editado da mensagem
      responses:
        '200':
          description: Mensagem editada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID único da mensagem no formato owner:messageid
                    example: 5511999999999:3A12345678901234567890123456789012
                  messageid:
                    type: string
                    description: ID da mensagem no WhatsApp
                    example: 3A12345678901234567890123456789012
                  content:
                    type: string
                    description: Conteúdo da mensagem editada
                    example: Texto editado da mensagem
                  messageTimestamp:
                    type: integer
                    description: Timestamp da mensagem (Unix timestamp em milissegundos)
                    example: 1704067200000
                  messageType:
                    type: string
                    description: Tipo da mensagem
                    example: text
                  status:
                    type: string
                    description: Status da mensagem
                    example: Pending
                  owner:
                    type: string
                    description: Proprietário da instância
                    example: '5511999999999'
        '400':
          description: Dados inválidos na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid payload
        '401':
          description: Sem sessão ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '404':
          description: Mensagem não encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Message not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error fetching message from database
  /message/pin:
    post:
      operationId: pinMessage
      tags:
        - Ações na mensagem e Buscar
      summary: Fixa ou desafixa uma mensagem
      description: |
        Fixa ou desafixa uma mensagem específica usando a funcionalidade nativa do WhatsApp.

        O endpoint realiza:
        - Busca a mensagem original no banco de dados usando o ID fornecido
        - Envia a ação de fixar ou desafixar a mensagem no WhatsApp
        - Funciona em conversas individuais e grupos
        - Gera um novo ID para o evento de pin/unpin
        - Retorna objeto de mensagem completo seguindo o padrão da API
        - Dispara eventos SSE/Webhook automaticamente

        **Importante**:
        - O ID pode ser fornecido no formato completo (`owner:messageid`) ou apenas `messageid`
        - Em conversas `1:1`, a ação é suportada normalmente
        - Em grupos, a permissão depende da configuração do WhatsApp do grupo (`apenas admins` ou `qualquer membro`)
        - O backend não valida localmente se a instância é admin do grupo; a decisão final é do WhatsApp
        - Newsletters/canais não são suportados neste endpoint
        - Se `pin` não for enviado, o valor padrão é `true`
        - Ao fixar mensagem, `duration` aceita dias (`1`, `7` ou `30`)
        - Se `duration` não for enviado ou vier com qualquer outro valor, o backend usa `30` dias
        - Ao desafixar (`pin: false`), `duration` é ignorado
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: ID único da mensagem alvo (formato `owner:messageid` ou apenas `messageid`)
                  example: 3A12345678901234567890123456789012
                pin:
                  type: boolean
                  default: true
                  description: Define se a mensagem deve ser fixada (`true`) ou desafixada (`false`)
                  example: true
                duration:
                  type: integer
                  default: 30
                  description: 'Duração do pin em dias. Valores aceitos: `1`, `7` ou `30`. Qualquer outro valor cai para `30`.'
                  example: 7
            examples:
              pinMessage:
                summary: Fixar mensagem
                value:
                  id: 3A12345678901234567890123456789012
                  pin: true
                  duration: 7
              pinMessageFallback30Days:
                summary: Fixar mensagem com fallback para 30 dias
                value:
                  id: 3A12345678901234567890123456789012
                  pin: true
                  duration: 99
              unpinMessage:
                summary: Desafixar mensagem
                value:
                  id: 3A12345678901234567890123456789012
                  pin: false
      responses:
        '200':
          description: Ação de fixar/desafixar mensagem enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID único da mensagem gerada para o evento de pin/unpin
                    example: 5511999999999:3A12345678901234567890123456789012
                  messageid:
                    type: string
                    description: ID da mensagem do evento no WhatsApp
                    example: 3A12345678901234567890123456789012
                  chatid:
                    type: string
                    description: Chat onde a ação ocorreu
                    example: 120363123456789012@g.us
                  sender:
                    type: string
                    description: JID do remetente da ação
                    example: 5511999999999@s.whatsapp.net
                  senderName:
                    type: string
                    description: Nome do perfil da instância
                    example: Minha Instância
                  isGroup:
                    type: boolean
                    description: Indica se o chat é um grupo
                    example: true
                  fromMe:
                    type: boolean
                    description: Indica se a ação foi enviada pela própria instância
                    example: true
                  content:
                    type: object
                    description: Payload interno de `PinInChatMessage`
                  messageType:
                    type: string
                    description: Tipo da mensagem retornada
                    example: PinInChatMessage
                  source:
                    type: string
                    description: Origem estimada da mensagem
                    example: web
                  messageTimestamp:
                    type: integer
                    description: Timestamp da mensagem em milissegundos
                    example: 1704067200000
                  status:
                    type: string
                    description: Status atual da ação
                    example: Pending
                  text:
                    type: string
                    description: Texto amigável derivado da ação
                    example: Mensagem fixada
                  quoted:
                    type: string
                    description: ID da mensagem citada, quando aplicável
                    example: ''
                  edited:
                    type: string
                    description: ID da mensagem editada, quando aplicável
                    example: ''
                  reaction:
                    type: string
                    description: Emoji de reação, quando aplicável
                    example: ''
                  convertOptions:
                    type: string
                    description: Opções convertidas para mensagens interativas, quando aplicável
                    example: ''
                  owner:
                    type: string
                    description: Proprietário da instância
                    example: '5511999999999'
                  targetMessageID:
                    type: string
                    description: ID da mensagem alvo que foi fixada ou desafixada
                    example: 3EB0538DA65A59F6D8A251
                  pinned:
                    type: boolean
                    description: Estado final solicitado para a mensagem alvo
                    example: true
        '400':
          description: Dados inválidos na requisição ou operação não suportada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: message pinning is not supported for newsletters
        '401':
          description: Sem sessão ativa ou token inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '404':
          description: Mensagem não encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Message not found
        '500':
          description: Erro interno do servidor ou erro retornado pelo WhatsApp
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'error pinning message: ...'
  /group/create:
    post:
      operationId: createGroup
      tags:
        - Grupos e Comunidades
      summary: Criar um novo grupo
      description: |
        Cria um novo grupo no WhatsApp com participantes iniciais.

        ### Detalhes
        - Requer autenticação via token da instância
        - Os números devem ser fornecidos sem formatação (apenas dígitos)

        ### Limitações
        - Mínimo de 1 participante além do criador
          
        ### Comportamento
        - Retorna informações detalhadas do grupo criado
        - Inclui lista de participantes adicionados com sucesso/falha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome do grupo
                  minLength: 1
                  maxLength: 100
                  example: uazapiGO grupo
                participants:
                  type: array
                  description: Lista de números de telefone dos participantes iniciais
                  items:
                    type: string
                    description: Número de telefone sem formatação
                  minItems: 1
                  maxItems: 50
                  example:
                    - '5521987905995'
                    - '5511912345678'
              required:
                - name
                - participants
            examples:
              default:
                value:
                  name: Meu Novo Grupo
                  participants:
                    - '5521987905995'
              multiple_participants:
                value:
                  name: Equipe de Projeto
                  participants:
                    - '5521987905995'
                    - '5511912345678'
                    - '5519987654321'
      responses:
        '200':
          description: Grupo criado com sucesso
          content:
            application/json:
              schema:
                $ref: ../schemas/group.yaml#/Group
        '400':
          description: Erro de payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Could not parse phone
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to create group
      security:
        - token: []
  /group/info:
    post:
      operationId: getGroupInfo
      tags:
        - Grupos e Comunidades
      summary: Obter informações detalhadas de um grupo
      description: |
        Recupera informações completas de um grupo do WhatsApp, incluindo:
        - Detalhes do grupo
        - Participantes
        - Configurações
        - Link de convite (opcional)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo (JID)
                  example: 120363153742561022@g.us
                getInviteLink:
                  type: boolean
                  description: Recuperar link de convite do grupo
                  default: false
                  example: true
                getRequestsParticipants:
                  type: boolean
                  description: Recuperar lista de solicitações pendentes de participação
                  default: false
                  example: false
                force:
                  type: boolean
                  description: Forçar atualização, ignorando cache
                  default: false
                  example: false
              required:
                - groupjid
      responses:
        '200':
          description: Informações do grupo obtidas com sucesso
          content:
            application/json:
              schema:
                $ref: ../schemas/group.yaml#/Group
              example:
                JID: 120363153742561022@g.us
                Name: uazapiGO Community
                Participants:
                  - JID: 5521987654321@s.whatsapp.net
                    IsAdmin: true
                IsLocked: false
                IsAnnounce: false
        '400':
          description: Código de convite inválido ou mal formatado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid invite code
        '404':
          description: Grupo não encontrado ou link de convite expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Group invite link is invalid or has expired
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to retrieve group information
  /group/inviteInfo:
    post:
      operationId: getGroupInviteInfo
      tags:
        - Grupos e Comunidades
      summary: Obter informações de um grupo pelo código de convite
      description: |
        Retorna informações detalhadas de um grupo usando um código de convite ou URL completo do WhatsApp.

        Esta rota permite:
        - Recuperar informações básicas sobre um grupo antes de entrar
        - Validar um link de convite
        - Obter detalhes como nome do grupo, número de participantes e restrições de entrada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invitecode:
                  type: string
                  description: |
                    Código de convite ou URL completo do grupo.
                    Pode ser um código curto ou a URL completa do WhatsApp.
                  examples:
                    - IYnl5Zg9bUcJD32rJrDzO7
                    - https://chat.whatsapp.com/IYnl5Zg9bUcJD32rJrDzO7
              required:
                - invitecode
      responses:
        '200':
          description: Informações do grupo obtidas com sucesso
          content:
            application/json:
              schema:
                $ref: ../schemas/group.yaml#/Group
              example:
                JID: 120363153742561022@g.us
                Name: uazapiGO Community
                Participants:
                  - JID: 5521987654321@s.whatsapp.net
                    IsAdmin: true
                IsLocked: false
                IsAnnounce: false
        '400':
          description: Código de convite inválido ou mal formatado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid invite code
        '404':
          description: Grupo não encontrado ou link de convite expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Group invite link is invalid or has expired
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to retrieve group information
  /group/join:
    post:
      operationId: joinGroup
      tags:
        - Grupos e Comunidades
      summary: Entrar em um grupo usando código de convite
      description: |
        Permite entrar em um grupo do WhatsApp usando um código de convite ou URL completo. 

        Características:
        - Suporta código de convite ou URL completo
        - Valida o código antes de tentar entrar no grupo
        - Retorna informações básicas do grupo após entrada bem-sucedida
        - Trata possíveis erros como convite inválido ou expirado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invitecode
              properties:
                invitecode:
                  type: string
                  description: |
                    Código de convite ou URL completo do grupo. 
                    Formatos aceitos:
                    - Código completo: "IYnl5Zg9bUcJD32rJrDzO7"
                    - URL completa: "https://chat.whatsapp.com/IYnl5Zg9bUcJD32rJrDzO7"
                  example: https://chat.whatsapp.com/IYnl5Zg9bUcJD32rJrDzO7
                  minLength: 10
                  maxLength: 50
      responses:
        '200':
          description: Entrada no grupo realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group join successful
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '400':
          description: Código de convite inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid invite code
        '403':
          description: Usuário já está no grupo ou não tem permissão para entrar
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unable to join group
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error processing group invite
  /group/leave:
    post:
      operationId: leaveGroup
      tags:
        - Grupos e Comunidades
      summary: Sair de um grupo
      description: |
        Remove o usuário atual de um grupo específico do WhatsApp.

        Requisitos:
        - O usuário deve estar conectado a uma instância válida
        - O usuário deve ser um membro do grupo

        Comportamentos:
        - Se o usuário for o último administrador, o grupo será dissolvido
        - Se o usuário for um membro comum, será removido do grupo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: |
                    Identificador único do grupo (JID)
                    - Formato: número@g.us
                    - Exemplo válido: 120363324255083289@g.us
                  example: 120363324255083289@g.us
                  pattern: ^\d+@g\.us$
              required:
                - groupjid
      responses:
        '200':
          description: Saída do grupo realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group leave successful
        '400':
          description: Erro de payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid payload
        '500':
          description: Erro interno do servidor ou falha na conexão
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: error leaving group
  /group/list:
    get:
      operationId: listGroups
      tags:
        - Grupos e Comunidades
      summary: Listar todos os grupos
      description: |
        Retorna uma lista com todos os grupos disponíveis para a conta do WhatsApp atualmente conectada.

        Recursos adicionais:
        - Suporta atualização forçada do cache de grupos
        - Recupera informações detalhadas de grupos conectados
      parameters:
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: |
            Se definido como `true`, força a atualização do cache de grupos.
            Útil para garantir que as informações mais recentes sejam recuperadas.

            Comportamentos:
            - `false` (padrão): Usa informações em cache
            - `true`: Busca dados atualizados diretamente do WhatsApp
        - name: noparticipants
          in: query
          schema:
            type: boolean
            default: false
          description: |
            Se definido como `true`, retorna a lista de grupos sem incluir os participantes.
            Útil para otimizar a resposta quando não há necessidade dos dados dos participantes.

            Comportamentos:
            - `false` (padrão): Retorna grupos com lista completa de participantes
            - `true`: Retorna grupos sem incluir os participantes
      responses:
        '200':
          description: Lista de grupos recuperada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: ../schemas/group.yaml#/Group
                    description: Lista detalhada de grupos
        '500':
          description: Erro interno do servidor ao recuperar grupos
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
    post:
      operationId: refreshGroups
      tags:
        - Grupos e Comunidades
      summary: Listar todos os grupos com filtros e paginacao
      description: >
        Retorna uma lista com todos os grupos disponiveis para a conta do WhatsApp atualmente conectada, com opcoes de
        filtros e paginacao via corpo (POST).

        A rota GET continua para quem prefere a listagem direta sem paginacao.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  description: Quantidade maxima de resultados por pagina (padrao 50, maximo 1000)
                  default: 50
                offset:
                  type: integer
                  description: Deslocamento base zero
                  default: 0
                search:
                  type: string
                  description: Texto para filtrar grupos por nome/JID
                force:
                  type: boolean
                  default: false
                  description: |
                    Se definido como `true`, forca a atualizacao do cache de grupos.
                    Util para garantir que as informacoes mais recentes sejam recuperadas.
                noParticipants:
                  type: boolean
                  default: false
                  description: |
                    Se definido como `true`, retorna a lista de grupos sem incluir os participantes.
                    Util para otimizar a resposta quando nao ha necessidade dos dados dos participantes.
      responses:
        '200':
          description: Lista de grupos recuperada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: ../schemas/group.yaml#/Group
                    description: Lista detalhada de grupos
                  pagination:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                        description: Total de grupos encontrados
                      limit:
                        type: integer
                        description: Limite aplicado na pagina atual
                      offset:
                        type: integer
                        description: Offset efetivamente usado na pagina atual
        '500':
          description: Erro interno do servidor ao recuperar grupos
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
  /group/resetInviteCode:
    post:
      operationId: resetGroupInviteCode
      tags:
        - Grupos e Comunidades
      summary: Resetar código de convite do grupo
      description: |
        Gera um novo código de convite para o grupo, invalidando o código de convite anterior. 
        Somente administradores do grupo podem realizar esta ação.

        Principais características:
        - Invalida o link de convite antigo
        - Cria um novo link único
        - Retorna as informações atualizadas do grupo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo (JID)
                  example: 120363308883996631@g.us
              required:
                - groupjid
      responses:
        '200':
          description: Código de convite resetado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  InviteLink:
                    type: string
                    description: Novo link de convite gerado
                    example: https://chat.whatsapp.com/AbCdEfGhIjKlMnOpQrStUv
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Could not parse Group JID
        '403':
          description: Usuário sem permissão
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: User is not an admin of this group
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reset group invite link
  /group/updateAnnounce:
    post:
      operationId: updateGroupAnnounce
      tags:
        - Grupos e Comunidades
      summary: Configurar permissões de envio de mensagens no grupo
      description: |
        Define as permissões de envio de mensagens no grupo, permitindo restringir o envio apenas para administradores.

        Quando ativado (announce=true):
        - Apenas administradores podem enviar mensagens
        - Outros participantes podem apenas ler
        - Útil para anúncios importantes ou controle de spam

        Quando desativado (announce=false):
        - Todos os participantes podem enviar mensagens
        - Configuração padrão para grupos normais

        Requer que o usuário seja administrador do grupo para fazer alterações.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo no formato xxxx@g.us
                  example: 120363339858396166@g.us
                announce:
                  type: boolean
                  description: Controla quem pode enviar mensagens no grupo
                  example: true
              required:
                - groupjid
                - announce
      responses:
        '200':
          description: Configuração atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group announce enabled successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '401':
          description: Token de autenticação ausente ou inválido
        '403':
          description: Usuário não é administrador do grupo
        '404':
          description: Grupo não encontrado
        '500':
          description: Erro interno do servidor ou falha na API do WhatsApp
  /group/updateJoinApproval:
    post:
      operationId: updateGroupJoinApproval
      tags:
        - Grupos e Comunidades
      summary: Configurar aprovação para entrada no grupo
      description: |
        Define se novos participantes precisam ser aprovados antes de entrar no grupo.
        No objeto retornado em `group` e também em `/group/info`, esse estado aparece no campo `IsJoinApprovalRequired`.

        Quando ativado (`IsJoinApprovalRequired=true`):
        - Novas entradas passam por aprovação de administrador
        - Solicitações pendentes podem ser listadas em `/group/info`

        Quando desativado (`IsJoinApprovalRequired=false`):
        - Entradas por link/convite não exigem aprovação adicional

        Requer que o usuário seja administrador do grupo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo no formato xxxx@g.us
                  example: 120363339858396166@g.us
                IsJoinApprovalRequired:
                  type: boolean
                  description: Define se a entrada no grupo exige aprovação; reflete no campo `IsJoinApprovalRequired`
                  example: true
              required:
                - groupjid
                - IsJoinApprovalRequired
      responses:
        '200':
          description: Configuração atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group join approval enabled successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
              examples:
                success:
                  summary: Aprovação de entrada ativada
                  value:
                    response: Group join approval enabled successfully
                    group:
                      JID: 120363339858396166@g.us
                      IsJoinApprovalRequired: true
                    needs_refresh: false
        '400':
          description: Payload inválido ou campo IsJoinApprovalRequired ausente/inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: IsJoinApprovalRequired is required
        '401':
          description: Token de autenticação ausente ou inválido
        '403':
          description: Usuário não é administrador do grupo
        '404':
          description: Grupo não encontrado
        '500':
          description: Erro interno do servidor ou falha na API do WhatsApp
  /group/updateMemberAddMode:
    post:
      operationId: updateGroupMemberAddMode
      tags:
        - Grupos e Comunidades
      summary: Configurar quem pode adicionar novos membros ao grupo
      description: |
        Define quem tem permissão para adicionar novos participantes diretamente ao grupo.
        No objeto retornado em `group` e também em `/group/info`, esse estado aparece no campo `MemberAddMode`.

        Valores aceitos em `MemberAddMode`:
        - `admin_add`: apenas administradores podem adicionar membros
        - `all_member_add`: qualquer participante pode adicionar membros

        Requer que o usuário seja administrador do grupo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo no formato xxxx@g.us
                  example: 120363339858396166@g.us
                MemberAddMode:
                  type: string
                  enum:
                    - admin_add
                    - all_member_add
                  description: Define quem pode adicionar novos membros ao grupo; reflete no campo `MemberAddMode`
                  example: admin_add
              required:
                - groupjid
                - MemberAddMode
      responses:
        '200':
          description: Configuração atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group member add mode set to admin_add successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
              examples:
                success:
                  summary: Apenas admins podem adicionar membros
                  value:
                    response: Group member add mode set to admin_add successfully
                    group:
                      JID: 120363339858396166@g.us
                      MemberAddMode: admin_add
                    needs_refresh: false
        '400':
          description: Valor inválido para MemberAddMode
        '403':
          description: Usuário não é administrador do grupo
        '404':
          description: Grupo não encontrado
        '500':
          description: Erro interno do servidor ou falha na API do WhatsApp
  /group/updateDescription:
    post:
      operationId: updateGroupDescription
      tags:
        - Grupos e Comunidades
      summary: Atualizar descrição do grupo
      description: |
        Altera a descrição (tópico) do grupo WhatsApp especificado.
        Requer que o usuário seja administrador do grupo.
        A descrição aparece na tela de informações do grupo e pode ser visualizada por todos os participantes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - groupjid
                - description
              properties:
                groupjid:
                  type: string
                  description: JID (ID) do grupo no formato xxxxx@g.us
                  example: 120363339858396166@g.us
                  pattern: ^[0-9]+@g\.us$
                description:
                  type: string
                  description: Nova descrição/tópico do grupo
                  example: Grupo oficial de suporte
                  maxLength: 512
      responses:
        '200':
          description: Descrição atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group description updated successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '401':
          description: Token inválido ou ausente
        '403':
          description: Usuário não é administrador do grupo
        '404':
          description: Grupo não encontrado
        '413':
          description: Descrição excede o limite máximo permitido
  /group/ephemeral:
    post:
      operationId: updateGroupEphemeral
      summary: Configurar mensagens temporárias em grupo
      description: |
        Define o temporizador de mensagens temporárias (disappearing messages) de um grupo.

        Valores aceitos para a duração:
        - `0` ou `off` para desativar
        - `1d`
        - `7d`
        - `90d`

        Observações:
        - este endpoint é apenas para grupos
        - requer privilégios de administrador do grupo
        - se o identificador informado não for de grupo, a API retorna erro orientando usar `/chat/ephemeral`
        - após sucesso, a resposta devolve o chat atualizado e o snapshot mais recente do grupo no cache local
      tags:
        - Grupos e Comunidades
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - groupjid
                - duration
              properties:
                groupjid:
                  type: string
                  description: JID do grupo no formato xxxxx@g.us
                  example: 120363339858396166@g.us
                duration:
                  oneOf:
                    - type: string
                    - type: integer
                  description: Duração desejada para mensagens temporárias
                  example: 1d
            examples:
              ativar_1_dia:
                summary: Ativar por 1 dia
                value:
                  groupjid: 120363339858396166@g.us
                  duration: 1d
              desativar:
                summary: Desativar mensagens temporárias
                value:
                  groupjid: 120363339858396166@g.us
                  duration: 'off'
      responses:
        '200':
          description: Temporizador atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Ephemeral timer updated successfully
                  chat:
                    $ref: ../schemas/chat.yaml#/Chat
                  ephemeral:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        example: true
                      seconds:
                        type: integer
                        format: int64
                        example: 86400
                      label:
                        type: string
                        example: 1d
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisou ser recarregado no cache local
                    example: false
              examples:
                sucesso:
                  summary: Timer atualizado
                  value:
                    response: Ephemeral timer updated successfully
                    chat:
                      wa_chatid: 120363339858396166@g.us
                      wa_ephemeralExpiration: 86400
                      wa_isGroup: true
                    ephemeral:
                      enabled: true
                      seconds: 86400
                      label: 1d
                    group:
                      JID: 120363339858396166@g.us
                      IsEphemeral: true
                      DisappearingTimer: 86400
                    needs_refresh: false
        '400':
          description: Payload inválido, grupo inválido ou duração não suportada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'invalid duration. Allowed values: 0, off, 1d, 7d, 90d'
        '401':
          description: Token inválido ou ausente
        '403':
          description: Usuário não é administrador do grupo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: user is not an admin of this group
        '500':
          description: Erro interno ao atualizar o temporizador
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Error updating chat ephemeral timer: connection closed'
  /group/updateImage:
    post:
      operationId: updateGroupImage
      tags:
        - Grupos e Comunidades
      summary: Atualizar imagem do grupo
      description: |
        Altera a imagem do grupo especificado. A imagem pode ser enviada como URL ou como string base64.

        Requisitos da imagem:
        - Formato: JPEG
        - Resolução máxima: 640x640 pixels
        - Imagens maiores ou diferente de JPEG não são aceitas pelo WhatsApp

        Para remover a imagem atual, envie "remove" ou "delete" no campo image.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: JID do grupo
                  example: 120363308883996631@g.us
                image:
                  type: string
                  description: |
                    URL da imagem, string base64 ou "remove"/"delete" para remover.
                    A imagem deve estar em formato JPEG e ter resolução máxima de 640x640.
                  examples:
                    - https://example.com/image.jpg
                    - data:image/jpeg;base64,/9j/4AAQSkZJRg...
                    - remove
              required:
                - groupjid
                - image
      parameters: []
      responses:
        '200':
          description: Imagem atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group image updated successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '400':
          description: Erro nos parâmetros da requisição
        '401':
          description: Token inválido ou expirado
        '403':
          description: Usuário não é administrador do grupo
        '413':
          description: Imagem muito grande
        '415':
          description: Formato de imagem inválido
  /group/updateLocked:
    post:
      operationId: updateGroupLocked
      tags:
        - Grupos e Comunidades
      summary: Configurar permissão de edição do grupo
      description: |
        Define se apenas administradores podem editar as informações do grupo. 
        Quando bloqueado (locked=true), apenas administradores podem alterar nome, descrição, 
        imagem e outras configurações do grupo. Quando desbloqueado (locked=false), 
        qualquer participante pode editar as informações.

        Importante:
        - Requer que o usuário seja administrador do grupo
        - Afeta edições de nome, descrição, imagem e outras informações do grupo
        - Não controla permissões de adição de membros
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo (JID)
                  example: 120363308883996631@g.us
                locked:
                  type: boolean
                  description: |
                    Define permissões de edição:
                    - true = apenas admins podem editar infos do grupo
                    - false = qualquer participante pode editar infos do grupo
                  example: true
              required:
                - groupjid
                - locked
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group lock status changed successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '403':
          description: Usuário não é administrador do grupo
        '404':
          description: Grupo não encontrado
  /group/updateName:
    post:
      operationId: updateGroupName
      tags:
        - Grupos e Comunidades
      summary: Atualizar nome do grupo
      description: |
        Altera o nome de um grupo do WhatsApp. Apenas administradores do grupo podem realizar esta operação.
        O nome do grupo deve seguir as diretrizes do WhatsApp e ter entre 1 e 25 caracteres.
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - groupjid
                - name
              properties:
                groupjid:
                  type: string
                  description: Identificador único do grupo no formato JID
                  example: 120363339858396166@g.us
                name:
                  type: string
                  description: Novo nome para o grupo
                  example: Grupo de Suporte
                  minLength: 1
                  maxLength: 25
      responses:
        '200':
          description: Nome do grupo atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    example: Group name updated successfully
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '400':
          description: Erro de validação na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid payload
        '401':
          description: Token de autenticação ausente ou inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '403':
          description: Usuário não é administrador do grupo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: User is not an admin of this group
        '404':
          description: Grupo não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Group not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to update group name
  /group/updateParticipants:
    post:
      operationId: updateGroupParticipants
      tags:
        - Grupos e Comunidades
      summary: Gerenciar participantes do grupo
      description: |
        Gerencia participantes do grupo através de diferentes ações:
        - Adicionar ou remover participantes
        - Promover ou rebaixar administradores
        - Aprovar ou rejeitar solicitações pendentes

        Requer que o usuário seja administrador do grupo para executar as ações.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupjid:
                  type: string
                  description: JID (identificador) do grupo
                  example: 120363308883996631@g.us
                action:
                  type: string
                  description: |
                    Ação a ser executada:
                    - add: Adicionar participantes ao grupo
                    - remove: Remover participantes do grupo
                    - promote: Promover participantes a administradores
                    - demote: Remover privilégios de administrador
                    - approve: Aprovar solicitações pendentes de entrada
                    - reject: Rejeitar solicitações pendentes de entrada
                  enum:
                    - add
                    - remove
                    - promote
                    - demote
                    - approve
                    - reject
                  example: promote
                participants:
                  type: array
                  items:
                    type: string
                  description: |
                    Lista de números de telefone ou JIDs dos participantes.
                    Para números de telefone, use formato internacional sem '+' ou espaços.
                  example:
                    - '5521987654321'
                    - '5511999887766'
              required:
                - groupjid
                - action
                - participants
      responses:
        '200':
          description: Sucesso na operação
          content:
            application/json:
              schema:
                type: object
                properties:
                  groupUpdated:
                    type: array
                    items:
                      type: object
                      properties:
                        JID:
                          type: string
                          description: JID do participante
                        Error:
                          type: integer
                          description: Código de erro (0 para sucesso)
                    description: Status da operação para cada participante
                  group:
                    $ref: ../schemas/group.yaml#/Group
                    description: Informações atualizadas do grupo
                  needs_refresh:
                    type: boolean
                    description: Indica se o grupo precisa ser atualizado no cache local
                    example: false
        '400':
          description: Erro nos parâmetros da requisição
        '403':
          description: Usuário não é administrador do grupo
        '500':
          description: Erro interno do servidor
  /community/create:
    post:
      operationId: createCommunity
      tags:
        - Grupos e Comunidades
      summary: Criar uma comunidade
      description: >
        Cria uma nova comunidade no WhatsApp. Uma comunidade é uma estrutura que permite agrupar múltiplos grupos
        relacionados sob uma única administração. 


        A comunidade criada inicialmente terá apenas o grupo principal (announcements), e grupos adicionais podem ser
        vinculados posteriormente usando o endpoint `/community/updategroups`.


        **Observações importantes:**

        - O número que cria a comunidade torna-se automaticamente o administrador

        - A comunidade terá um grupo principal de anúncios criado automaticamente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome da comunidade
                  example: Comunidade do Bairro
              required:
                - name
      responses:
        '200':
          description: Comunidade criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: ../schemas/group.yaml#/Group
                  failed:
                    type: array
                    description: Lista de JIDs que falharam ao serem adicionados
                    items:
                      type: string
                      format: jid
        '400':
          description: Erro na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid payload
        '401':
          description: Token inválido ou não fornecido
        '403':
          description: Sem permissão para criar comunidades
        '429':
          description: Limite de criação de comunidades atingido
        '500':
          description: Erro interno do servidor
  /community/editgroups:
    post:
      operationId: editCommunityGroups
      tags:
        - Grupos e Comunidades
      summary: Gerenciar grupos em uma comunidade
      description: >
        Adiciona ou remove grupos de uma comunidade do WhatsApp. Apenas administradores da comunidade podem executar
        estas operações.


        ## Funcionalidades

        - Adicionar múltiplos grupos simultaneamente a uma comunidade

        - Remover grupos de uma comunidade existente

        - Suporta operações em lote


        ## Limitações

        - Os grupos devem existir previamente

        - A comunidade deve existir e o usuário deve ser administrador

        - Grupos já vinculados não podem ser adicionados novamente

        - Grupos não vinculados não podem ser removidos


        ## Ações Disponíveis

        - `add`: Adiciona os grupos especificados à comunidade

        - `remove`: Remove os grupos especificados da comunidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - community
                - action
                - groupjids
              properties:
                community:
                  type: string
                  description: JID (identificador único) da comunidade
                  example: 120363153742561022@g.us
                action:
                  type: string
                  enum:
                    - add
                    - remove
                  description: |
                    Tipo de operação a ser realizada:
                    * add - Adiciona grupos à comunidade
                    * remove - Remove grupos da comunidade
                groupjids:
                  type: array
                  items:
                    type: string
                    pattern: ^[0-9]+@g.us$
                  minItems: 1
                  description: Lista de JIDs dos grupos para adicionar ou remover
                  example:
                    - 120363324255083289@g.us
                    - 120363308883996631@g.us
      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: community updated
                  success:
                    type: array
                    items:
                      type: string
                    description: Lista de JIDs dos grupos processados com sucesso
                  failed:
                    type: array
                    items:
                      type: string
                    description: Lista de JIDs dos grupos que falharam no processamento
        '400':
          description: Requisição inválida
        '401':
          description: Não autorizado
        '403':
          description: Usuário não é administrador da comunidade
