        '401':
          description: Sem sessão ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No active session
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: WhatsApp client is not connected
  /label/edit:
    post:
      operationId: editLabel
      tags:
        - Etiquetas
      summary: Criar, editar ou deletar etiqueta
      description: |
        Cria, edita ou deleta uma etiqueta da instância.

        Regras de uso:
        - Para editar uma etiqueta existente, envie o `labelid` real da etiqueta.
        - Para criar uma nova etiqueta, envie `labelid: "new"` com `delete: false`.
          O backend irá gerar o próximo `labelid` numérico disponível para a instância.
        - Para deletar uma etiqueta existente, envie o `labelid` real com `delete: true`.

        Observações:
        - A resposta de sucesso retorna `"Label created"` para criação e `"Label edited"` para edição.
        - Para descobrir o `labelid` final criado, consulte `GET /labels` após a operação
          ou consuma o webhook/evento de labels da instância.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                labelid:
                  type: string
                  description: |
                    ID da etiqueta.

                    Use o ID real para editar/deletar uma etiqueta existente.
                    Use `"new"` para criar uma nova etiqueta quando `delete` for `false`.
                  example: '25'
                name:
                  type: string
                  description: Novo nome da etiqueta
                  example: responder editado
                color:
                  type: integer
                  description: Código numérico da nova cor (0-19)
                  minimum: 0
                  maximum: 19
                  example: 2
                delete:
                  type: boolean
                  description: Indica se a etiqueta deve ser deletada
                  example: false
              required:
                - labelid
            examples:
              criar_label:
                summary: Criar nova etiqueta
                description: |
                  Cria uma nova etiqueta usando o placeholder `labelid: "new"`.
                value:
                  labelid: new
                  name: responder editado
                  color: 2
                  delete: false
              editar_label:
                summary: Editar etiqueta existente
                description: Edita nome e cor de uma etiqueta já existente
                value:
                  labelid: '25'
                  name: responder editado
                  color: 2
                  delete: false
              deletar_label:
                summary: Deletar etiqueta existente
                description: Remove uma etiqueta já existente
                value:
                  labelid: '25'
                  name: ''
                  color: 0
                  delete: true
      responses:
        '200':
          description: Operação concluída com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    enum:
                      - Label created
                      - Label edited
                    example: Label edited
              examples:
                created:
                  summary: Resposta ao criar uma etiqueta
                  value:
                    response: Label created
                edited:
                  summary: Resposta ao editar uma etiqueta
                  value:
                    response: Label edited
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid payload
        '500':
          description: Erro interno do servidor ou sessão inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: error editing label
  /labels:
    get:
      operationId: listLabels
      tags:
        - Etiquetas
      summary: Buscar todas as etiquetas
      description: |
        Retorna a lista completa de etiquetas da instância.
      responses:
        '200':
          description: Lista de etiquetas retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/label.yaml#/Label
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to fetch labels from database
  /labels/refresh:
    post:
      operationId: refreshLabels
      tags:
        - Etiquetas
      summary: Iniciar recarga de etiquetas do WhatsApp
      description: >
        Inicia uma nova leitura das etiquetas no WhatsApp em background.

        A resposta confirma apenas que a recarga foi iniciada ou que já existe uma recarga em andamento.

        Para obter a lista atualizada, consulte `GET /labels` depois.


        Efeitos no backend:

        - a recarga também processa associações de etiquetas sincronizadas do WhatsApp

        - chats existentes podem ter o campo `wa_label` atualizado com as etiquetas corretas

        - quando uma associação de etiqueta muda após a sincronização do histórico, o webhook `chat_labels` pode ser
        enviado com os dados completos do chat


        Uso recomendado:

        - tente primeiro com `force=false`

        - se isso não trouxer as etiquetas corretamente, tente `force=true`

        - use `force=true` apenas como tentativa de correção, porque ele faz uma recarga mais pesada
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: |
                    Tente primeiro com `false`.
                    Use `true` apenas quando a recarga padrão não funcionar bem,
                    pois esse modo faz uma nova leitura mais completa das etiquetas.
                  example: false
      responses:
        '202':
          description: Recarga de etiquetas aceita para processamento em background
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - status
                  - message
                  - force
                  - fullSync
                properties:
                  success:
                    type: boolean
                    example: true
                  status:
                    type: string
                    enum:
                      - started
                      - in_progress
                    example: started
                  message:
                    type: string
                    example: Label refresh started. Use GET /labels to fetch the refreshed list.
                  force:
                    type: boolean
                    example: false
                  fullSync:
                    type: boolean
                    example: false
        '409':
          description: A recarga não pôde ser executada porque a sincronização do histórico ainda está em andamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: history sync still in progress, try again in a moment
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: failed to reload labels from WhatsApp
  /quickreply/edit:
    post:
      operationId: editQuickReply
      tags:
        - Respostas Rápidas
      summary: Criar, atualizar ou excluir resposta rápida
      description: >
        Gerencia templates de respostas rápidas para agilizar o atendimento. Por padrão, cria respostas rápidas locais.

        Para criar/sincronizar uma resposta rápida no WhatsApp Business, envie `onWhatsApp: true`.


        - Para criar: não inclua o campo `id`

        - Para atualizar: inclua o `id` existente

        - Para excluir: defina `delete: true` e inclua o `id`


        Observação: respostas rápidas sincronizadas com o WhatsApp suportam apenas `type: text`.

        Não é possível converter uma resposta rápida local existente em resposta do WhatsApp; para criar no WhatsApp,
        envie `onWhatsApp: true` sem `id`.
      requestBody:
        required: true
        content:
          application/json:
            examples:
              criar_apenas_api:
                summary: Criar apenas na API
                value:
                  shortCut: saudacao
                  type: text
                  text: Olá! Como posso ajudar?
              criar_api_whatsapp:
                summary: Criar na API e no WhatsApp Business
                value:
                  onWhatsApp: true
                  shortCut: saudacao
                  type: text
                  text: Olá! Como posso ajudar?
              editar_existente:
                summary: Editar resposta rápida existente
                value:
                  id: rb9da9c03637452
                  shortCut: saudacao
                  type: text
                  text: Olá! Como posso ajudar hoje?
            schema:
              type: object
              required:
                - shortCut
                - type
              properties:
                id:
                  type: string
                  description: Necessário para atualizações/exclusões, omitir para criação
                  example: rb9da9c03637452
                delete:
                  type: boolean
                  description: Definir como true para excluir o template
                  default: false
                onWhatsApp:
                  type: boolean
                  description: >-
                    Quando true, cria/sincroniza a resposta rápida no WhatsApp Business via app state. Disponível apenas
                    para type=text.
                  default: false
                shortCut:
                  type: string
                  description: Atalho para acesso rápido ao template
                  example: saudacao1
                type:
                  type: string
                  enum:
                    - text
                    - audio
                    - myaudio
                    - ptt
                    - document
                    - video
                    - image
                  description: Tipo da mensagem
                text:
                  type: string
                  description: Obrigatório para mensagens do tipo texto
                  example: Olá! Como posso ajudar hoje?
                file:
                  type: string
                  description: URL ou Base64 para tipos de mídia
                  example: https://exemplo.com/arquivo.pdf
                docName:
                  type: string
                  description: Nome do arquivo opcional para tipo documento
                  example: apresentacao.pdf
      responses:
        '200':
          description: Operação concluída com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Operação concluída com sucesso
                  quickReplies:
                    type: array
                    items:
                      $ref: ../schemas/quick_reply.yaml#/QuickReply
        '400':
          description: Requisição inválida (erro de validação)
        '404':
          description: Template não encontrado
        '500':
          description: Erro no servidor ou falha ao sincronizar com WhatsApp
  /quickreply/showall:
    get:
      operationId: listQuickReplies
      tags:
        - Respostas Rápidas
      summary: Listar todas as respostas rápidas
      description: Retorna todas as respostas rápidas cadastradas para a instância autenticada
      responses:
        '200':
          description: Lista de respostas rápidas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/quick_reply.yaml#/QuickReply
        '500':
          description: Erro no servidor
  /call/make:
    post:
      operationId: makeCall
      tags:
        - Chamadas
      summary: Iniciar chamada de voz
      description: >
        Inicia uma chamada de voz para um contato específico. Este endpoint permite:

        1. Iniciar chamadas de voz para contatos

        2. Funciona apenas com números válidos do WhatsApp

        3. O contato receberá uma chamada de voz


        **Nota**: O telefone do contato tocará normalmente, mas ao contato atender, ele não ouvirá nada, e você também
        não ouvirá nada. 

        Este endpoint apenas inicia a chamada, não estabelece uma comunicação de voz real.


        **Opcional**: Use `call_duration` para definir por quantos segundos a chamada deve tocar.

        Após esse período a chamada é encerrada automaticamente, sem precisar chamar `/call/reject`.


        Exemplo de requisição:

        ```json

        {
          "number": "5511999999999",
          "call_duration": 15
        }

        ```


        Exemplo de resposta:

        ```json

        {
          "response": "Call successful"
        }

        ```


        Erros comuns:

        - 401: Token inválido ou expirado

        - 400: Número inválido ou ausente

        - 500: Erro ao iniciar chamada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: 'Número do contato no formato internacional (ex: 5511999999999)'
                  example: '5511999999999'
                call_duration:
                  type: integer
                  description: Duração da chamada em segundos (opcional). Após esse tempo a chamada é encerrada automaticamente.
                  example: 15
              required:
                - number
      responses:
        '200':
          description: Chamada iniciada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmação
                    example: Call successful
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro
              examples:
                missing_number:
                  summary: Numero nao informado
                  value:
                    error: missing number in payload
                invalid_number:
                  summary: Numero invalido
                  value:
                    error: invalid number JID
                invalid_duration:
                  summary: Duracao invalida
                  value:
                    error: invalid call_duration
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro de autenticação
                    example: client not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro interno
                    example: 'error making call: network timeout'
  /call/reject:
    post:
      operationId: rejectCall
      tags:
        - Chamadas
      summary: Rejeitar chamada recebida
      description: >
        Rejeita uma chamada recebida do WhatsApp.


        O body pode ser enviado vazio `{}`. Os campos `number` e `id` são opcionais e podem ser usados para especificar
        uma chamada específica.


        Exemplo de requisição (recomendado):

        ```json

        {}

        ```


        Exemplo de requisição com campos opcionais:

        ```json

        {
          "number": "5511999999999",
          "id": "ABEiGmo8oqkAcAKrBYQAAAAA_1"
        }

        ```


        Exemplo de resposta:

        ```json

        {
          "response": "Call rejected"
        }

        ```


        Erros comuns:

        - 401: Token inválido ou expirado

        - 400: Número inválido

        - 500: Erro ao rejeitar chamada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example: {}
              properties:
                number:
                  type: string
                  description: '(Opcional) Número do contato no formato internacional (ex: 5511999999999)'
                id:
                  type: string
                  description: (Opcional) ID único da chamada a ser rejeitada
      responses:
        '200':
          description: Chamada rejeitada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmação
                    example: Call rejected
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro
                    examples:
                      - invalid number
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro de autenticação
                    example: client not found
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro interno
                    example: 'error rejecting call: timeout'
  /chatwoot/config:
    get:
      operationId: getChatwootConfig
      tags:
        - Integração Chatwoot
      summary: Obter configuração do Chatwoot
      description: |
        Retorna a configuração atual da integração com Chatwoot para a instância.

        ### Funcionalidades:
        - Retorna todas as configurações do Chatwoot incluindo credenciais
        - Mostra status de habilitação da integração
        - Útil para verificar configurações atuais antes de fazer alterações
      responses:
        '200':
          description: Configuração obtida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  chatwoot_enabled:
                    type: boolean
                    description: Se a integração com Chatwoot está habilitada
                    example: true
                  chatwoot_url:
                    type: string
                    description: URL base da instância Chatwoot
                    example: https://app.chatwoot.com
                  chatwoot_account_id:
                    type: integer
                    format: int64
                    description: ID da conta no Chatwoot
                    example: 1
                  chatwoot_inbox_id:
                    type: integer
                    format: int64
                    description: ID da inbox no Chatwoot
                    example: 5
                  chatwoot_access_token:
                    type: string
                    description: Token de acesso da API Chatwoot
                    example: pXXGHHHyJPYHYgWHJHYHgJjj
                  chatwoot_ignore_groups:
                    type: boolean
                    description: Se deve ignorar mensagens de grupos na sincronização
                    example: false
                  chatwoot_sign_messages:
                    type: boolean
                    description: Se deve assinar mensagens enviadas para o WhatsApp
                    example: true
                  chatwoot_create_new_conversation:
                    type: boolean
                    description: Sempre criar nova conversa ao invés de reutilizar conversas existentes
                    example: false
        '401':
          description: Token inválido/expirado
        '500':
          description: Erro interno do servidor
    put:
      operationId: updateChatwootConfig
      tags:
        - Integração Chatwoot
      summary: Atualizar configuração do Chatwoot
      description: |
        Atualiza a configuração da integração com Chatwoot para a instância.

        ### Funcionalidades:
        - Configura todos os parâmetros da integração Chatwoot
        - Reinicializa automaticamente o cliente Chatwoot quando habilitado
        - Retorna URL do webhook para configurar no Chatwoot
        - Sincronização bidirecional de mensagens novas entre WhatsApp e Chatwoot
        - Sincronização automática de contatos (nome e telefone)
        - Atualização automática LID → PN (Local ID para Phone Number)
        - Sistema de nomes inteligentes com til (~)

        ### Configuração no Chatwoot:
        1. Após configurar via API, use a URL retornada no webhook settings da inbox no Chatwoot
        2. Configure como webhook URL na sua inbox do Chatwoot
        3. A integração ficará ativa e sincronizará mensagens e contatos automaticamente

        ### 🏷️ Sistema de Nomes Inteligentes:
        - **Nomes com til (~)**: São atualizados automaticamente quando o contato modifica seu nome no WhatsApp
        - **Nomes específicos**: Para definir um nome fixo, remova o til (~) do nome no Chatwoot
        - **Exemplo**: "~João Silva" será atualizado automaticamente, "João Silva" (sem til) permanecerá fixo
        - **Atualização LID→PN**: Contatos migram automaticamente de Local ID para Phone Number quando disponível
        - **Sem duplicação**: Durante a migração LID→PN, não haverá duplicação de conversas
        - **Respostas nativas**: Todas as respostas dos agentes aparecem nativamente no Chatwoot

        ### 🚧 AVISO IMPORTANTE - INTEGRAÇÃO BETA:
        - **Fase Beta**: Esta integração está em fase de desenvolvimento e testes
        - **Uso por conta e risco**: O usuário assume total responsabilidade pelo uso
        - **Recomendação**: Teste em ambiente não-produtivo antes de usar em produção
        - **Suporte limitado**: Funcionalidades podem mudar sem aviso prévio

        ### ⚠️ Limitações Conhecidas:
        - **Sincronização de histórico**: Não implementada - apenas mensagens novas são sincronizadas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: Habilitar/desabilitar integração com Chatwoot
                  example: true
                url:
                  type: string
                  description: URL base da instância Chatwoot (sem barra final)
                  example: https://app.chatwoot.com
                access_token:
                  type: string
                  description: Token de acesso da API Chatwoot (obtido em Profile Settings > Access Token)
                  example: pXXGHHHyJPYHYgWHJHYHgJjj
                account_id:
                  type: integer
                  format: int64
                  description: ID da conta no Chatwoot (visível na URL da conta)
                  example: 1
                inbox_id:
                  type: integer
                  format: int64
                  description: ID da inbox no Chatwoot (obtido nas configurações da inbox)
                  example: 5
                ignore_groups:
                  type: boolean
                  description: Ignorar mensagens de grupos do WhatsApp na sincronização
                  example: false
                sign_messages:
                  type: boolean
                  description: Assinar mensagens enviadas para WhatsApp com identificação do agente
                  example: true
                create_new_conversation:
                  type: boolean
                  description: Sempre criar nova conversa ao invés de reutilizar conversas existentes
                  example: false
              required:
                - enabled
                - url
                - access_token
                - account_id
                - inbox_id
      responses:
        '200':
          description: Configuração atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensagem de confirmação
                    example: 'Chatwoot config updated successfully, put this URL in Chatwoot inbox webhook settings:'
                  chatwoot_inbox_webhook_url:
                    type: string
                    description: URL do webhook para configurar na inbox do Chatwoot
                    example: https://sua-api.com/chatwoot/webhook/inst_abc123
        '400':
          description: Dados inválidos no body da requisição
        '401':
          description: Token inválido/expirado
        '500':
          description: Erro interno ao salvar configuração
