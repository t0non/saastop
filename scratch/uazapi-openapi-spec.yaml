  /business/update/profile:
    post:
      tags:
        - Business
      summary: Atualizar o perfil comercial
      description: |
        Atualiza os dados do perfil comercial da conta do WhatsApp Business atualmente conectada.
        Todos os campos são opcionais; apenas os enviados serão atualizados.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Nova descrição do perfil comercial.
                  example: Loja de eletrônicos e acessórios
                address:
                  type: string
                  description: Novo endereço do perfil comercial.
                  example: Rua das Flores, 123 - Centro
                email:
                  type: string
                  description: Novo email do perfil comercial.
                  example: contato@empresa.com
            examples:
              todos_campos:
                summary: Atualizar todos os campos
                value:
                  description: Loja de eletrônicos e acessórios
                  address: Rua das Flores, 123 - Centro
                  email: contato@empresa.com
              apenas_descricao:
                summary: Atualizar apenas a descrição
                value:
                  description: Nova descrição da empresa
              endereco_email:
                summary: Atualizar endereço e email
                value:
                  address: Av. Principal, 456
                  email: novo@email.com
      responses:
        '200':
          description: Todos os campos enviados foram atualizados
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    description: Resultado por campo
                  updated:
                    type: integer
                    description: Total de campos atualizados
                    example: 3
                  failed:
                    type: integer
                    description: Total de campos que falharam
                    example: 0
              examples:
                sucesso_todos:
                  summary: Todos os campos atualizados
                  value:
                    response:
                      description:
                        status: updated
                      address:
                        status: updated
                      email:
                        status: updated
                    updated: 3
                    failed: 0
        '207':
          description: Sucesso parcial — ao menos um campo falhou
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    description: Resultado por campo
                  updated:
                    type: integer
                    example: 1
                  failed:
                    type: integer
                    example: 1
              examples:
                parcial:
                  summary: Falha em um dos campos
                  value:
                    response:
                      description:
                        status: updated
                      address:
                        status: error
                        error: upstream unavailable
                    updated: 1
                    failed: 1
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro de validação
              examples:
                payload_invalido:
                  value:
                    error: invalid payload
                campo_obrigatorio:
                  value:
                    error: at least one field (description, address, email) is required
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de autenticação
                    example: client not found
        '500':
          description: Falha total — nenhum campo foi atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    description: Resultado por campo
                  updated:
                    type: integer
                    example: 0
                  failed:
                    type: integer
                    example: 3
  /business/catalog/list:
    post:
      operationId: getCatalog
      tags:
        - Business
      summary: Listar os produtos do catálogo
      description: >
        Lista uma página de produtos do catálogo de um perfil comercial no WhatsApp.


        Observações:

        - envie apenas `jid` para buscar a primeira página

        - a paginação pública usa o campo `after`

        - copie exatamente o valor retornado em `response.Paging.After` e envie na próxima chamada

        - o valor de `after` é um token opaco: não tente decodificar ou modificar

        - a integração atual retorna até 10 produtos por chamada

        - o retorno espelha as structs atuais da camada `whatsmeow`, então os campos de `response` usam nomes em
        maiúsculas (`Products`, `Paging`, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jid:
                  type: string
                  description: JID do catálogo a consultar
                  example: 5511999999999@s.whatsapp.net
                after:
                  type: string
                  description: Token da próxima página. Use exatamente o valor retornado em `response.Paging.After`.
                  example: Q1VSU09SX1BST1hJTUFfUEFHSU5B
              required:
                - jid
            examples:
              primeiraPagina:
                summary: Buscar a primeira página do catálogo
                value:
                  jid: 5511999999999@s.whatsapp.net
              proximaPagina:
                summary: Buscar a próxima página usando after
                value:
                  jid: 5511999999999@s.whatsapp.net
                  after: Q1VSU09SX1BST1hJTUFfUEFHSU5B
      responses:
        '200':
          description: Produtos do catálogo recuperados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    description: Página atual do catálogo retornada pelo WhatsApp.
                    properties:
                      JID:
                        type: object
                        description: JID do catálogo consultado, serializado pela struct atual do backend.
                        properties:
                          User:
                            type: string
                            example: '5511999999999'
                          RawAgent:
                            type: integer
                            example: 0
                          Device:
                            type: integer
                            example: 0
                          Integrator:
                            type: integer
                            example: 0
                          Server:
                            type: string
                            example: s.whatsapp.net
                      CartEnabled:
                        type: boolean
                        description: Indica se o carrinho do catálogo está habilitado.
                        example: false
                      Source:
                        type: string
                        description: Origem do catálogo retornada pelo WhatsApp.
                        example: ''
                      Products:
                        type: array
                        description: Lista de produtos da página atual.
                        items:
                          type: object
                          properties:
                            ID:
                              type: string
                              example: '1234567890'
                            Name:
                              type: string
                              example: Produto Exemplo
                            Description:
                              type: string
                              example: Descrição do produto
                            Price:
                              type: object
                              nullable: true
                              properties:
                                Amount:
                                  type: string
                                  example: '1990'
                                Currency:
                                  type: string
                                  example: BRL
                            SalePrice:
                              type: string
                              example: ''
                            RetailerID:
                              type: string
                              example: sku-123
                            Url:
                              type: string
                              example: https://exemplo.com/produto
                            Availability:
                              type: string
                              example: in stock
                            IsHidden:
                              type: boolean
                              example: false
                            StatusInfo:
                              type: object
                              properties:
                                Status:
                                  type: string
                                  example: active
                                CanAppeal:
                                  type: boolean
                                  example: false
                            MaxAvailable:
                              type: integer
                              example: 10
                            ImageFetchStatus:
                              type: string
                              example: success
                            Images:
                              type: array
                              items:
                                type: object
                                properties:
                                  ID:
                                    type: string
                                    example: img-1
                                  OriginalDimensions:
                                    type: object
                                    properties:
                                      Height:
                                        type: integer
                                        example: 720
                                      Width:
                                        type: integer
                                        example: 720
                                  RequestImageUrl:
                                    type: string
                                    example: https://mmg.whatsapp.net/v/t62.7118-24/...
                                  OriginalImageUrl:
                                    type: string
                                    example: https://lookaside.whatsapp.net/...
                      Paging:
                        type: object
                        description: Cursores de paginação retornados pelo WhatsApp.
                        properties:
                          Before:
                            type: string
                            example: ''
                          After:
                            type: string
                            example: Q1VSU09SX1BST1hJTUFfUEFHSU5B
              examples:
                sucesso:
                  value:
                    response:
                      JID:
                        User: '5511999999999'
                        RawAgent: 0
                        Device: 0
                        Integrator: 0
                        Server: s.whatsapp.net
                      CartEnabled: false
                      Source: ''
                      Products:
                        - ID: '1234567890'
                          Name: Produto Exemplo
                          Description: Descrição do produto
                          Price:
                            Amount: '1990'
                            Currency: BRL
                          SalePrice: ''
                          RetailerID: sku-123
                          Url: https://exemplo.com/produto
                          Availability: in stock
                          IsHidden: false
                          StatusInfo:
                            Status: active
                            CanAppeal: false
                          MaxAvailable: 10
                          ImageFetchStatus: success
                          Images:
                            - ID: img-1
                              OriginalDimensions:
                                Height: 720
                                Width: 720
                              RequestImageUrl: https://mmg.whatsapp.net/v/t62.7118-24/...
                              OriginalImageUrl: https://lookaside.whatsapp.net/...
                      Paging:
                        Before: ''
                        After: Q1VSU09SX1BST1hJTUFfUEFHSU5B
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro de validação do payload ou JID
                    example: invalid payload
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro de autenticação
                    example: client not found
        '500':
          description: Erro interno do servidor ao recuperar os produtos do catálogo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
