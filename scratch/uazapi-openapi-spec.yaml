  /instance/proxy:
    get:
      operationId: getProxyConfig
      tags:
        - Proxy
      summary: Obter configuração de proxy da instância
      description: >
        A uazapiGO distingue a intenção persistida do cliente (`mode`) do transporte efetivo em runtime
        (`effective_mode`).

        Isso evita degradar silenciosamente para conexão direta quando a instância foi configurada para usar proxy.


        `mode` sempre será:
          - `custom`: o cliente escolheu um proxy próprio;
          - `internal`: a instância deve usar o pool interno ou a rota interna; ou
          - `none`: o cliente confirmou explicitamente que aceita conexão direta.

        `effective_mode` mostra o que está sendo usado no momento:
          - `custom`
          - `internal`
          - `direct`

        `effective_detail` qualifica o transporte efetivo:
          - `managed_pool`: proxy interno gerenciado pela plataforma;
          - `internal_route`: rota interna dedicada do ambiente, sem uma `proxy_url` própria;
          - `relay`: túnel relay do cliente;
          - campo omitido: sem detalhe adicional.

        Quando um proxy customizado falha, a plataforma pode seguir uma cadeia de contingência:
          1. `proxy_fallback` explícito, se configurado com outra URL;
          2. proxy interno;
          3. conexão direta como último recurso, quando a política permitir.

        Em qualquer fallback, a intenção persistida continua sendo `mode=custom`. O cliente deve olhar

        `effective_mode`, `effective_detail` e `fallback.active` para entender o estado runtime.


        Como ler cada campo da resposta:

        - `mode`: intenção salva na instância. É o que o cliente pediu para usar.

        - `effective_mode`: transporte realmente em uso agora. Pode divergir de `mode` durante fallback.

        - `effective_detail`: detalhe extra do transporte efetivo. Use para distinguir pool interno, rota interna ou
        relay. Quando não há detalhe adicional, o campo é omitido.

        - `fallback.active`: `true` quando a instância está operando fora da rota principal configurada.

        - `fallback.reason`: motivo interno resumido do fallback atual. Serve para diagnóstico e pode mudar conforme a
        causa.

        - `fallback.since`: timestamp Unix em milissegundos desde quando o fallback atual começou.

        - `proxy_url`: proxy persistido na instância, sempre mascarado. Se `mode=custom`, continua mostrando o proxy do
        cliente mesmo quando a sessão caiu em fallback.

        - `proxy_fallback`: política persistida de contingência para `mode=custom`. Pode ser `internal`, `never` ou
        outra URL de proxy.

        - `managed`: campo legado. Fica `true` quando a infraestrutura interna da plataforma está envolvida no
        transporte atual ou pretendido.

        - `last_test_at`: timestamp Unix em milissegundos do último teste ou da última falha persistida para esse proxy.

        - `last_test_error`: último erro persistido para diagnóstico. String vazia significa ausência de erro salvo.

        - `validation_error`: atalho booleano para `last_test_error != ""`.


        Leitura rápida dos cenários mais comuns:

        - `mode=custom` + `effective_mode=custom`: o proxy do cliente está sendo usado normalmente.

        - `mode=custom` + `effective_mode=internal`: o proxy do cliente falhou e a sessão está operando no fallback
        interno.

        - `mode=custom` + `effective_mode=direct`: o proxy do cliente falhou e a sessão caiu para conexão direta como
        último recurso.

        - `mode=internal` + `effective_detail=managed_pool`: a instância está usando um proxy do pool interno.

        - `mode=internal` + `effective_detail=internal_route`: a instância está usando uma rota interna dedicada, sem
        `proxy_url` própria.

        - `mode=none` + `effective_mode=direct`: conexão direta assumida explicitamente.


        Combinações que não devem aparecer numa resposta válida:

        - `mode=none` com `effective_mode=custom` ou `internal`

        - `effective_detail=managed_pool` com `effective_mode=custom`

        - `effective_detail=relay` com `effective_mode=internal` ou `direct`
      security:
        - token: []
      responses:
        '200':
          description: Configuração de proxy recuperada com sucesso
          content:
            application/json:
              examples:
                custom_active:
                  summary: Proxy do cliente ativo
                  value:
                    mode: custom
                    effective_mode: custom
                    fallback:
                      active: false
                      reason: ''
                      since: 0
                    proxy_url: http://***:***@cliente-proxy.example:8080
                    proxy_fallback: internal
                    managed: false
                    last_test_at: 0
                    last_test_error: ''
                    validation_error: false
                custom_internal_fallback:
                  summary: Proxy do cliente falhou e a sessão subiu no proxy interno
                  value:
                    mode: custom
                    effective_mode: internal
                    effective_detail: managed_pool
                    fallback:
                      active: true
                      reason: custom_failed_internal:dial tcp timeout
                      since: 1760000000000
                    proxy_url: http://***:***@cliente-proxy.example:8080
                    proxy_fallback: internal
                    managed: true
                    last_test_at: 1760000000000
                    last_test_error: dial tcp timeout
                    validation_error: true
                custom_direct_fallback:
                  summary: Proxy do cliente falhou e a sessão caiu para direto como último recurso
                  value:
                    mode: custom
                    effective_mode: direct
                    fallback:
                      active: true
                      reason: custom_failed_direct:dial tcp timeout
                      since: 1760000005000
                    proxy_url: http://***:***@cliente-proxy.example:8080
                    proxy_fallback: internal
                    managed: false
                    last_test_at: 1760000005000
                    last_test_error: dial tcp timeout
                    validation_error: true
                internal_dedicated_route:
                  summary: Modo interno usando rota interna dedicada
                  value:
                    mode: internal
                    effective_mode: internal
                    effective_detail: internal_route
                    fallback:
                      active: false
                      reason: ''
                      since: 0
                    proxy_url: ''
                    proxy_fallback: internal
                    managed: true
                    last_test_at: 0
                    last_test_error: ''
                    validation_error: false
              schema:
                type: object
                example:
                  mode: custom
                  effective_mode: internal
                  effective_detail: managed_pool
                  fallback:
                    active: true
                    reason: custom_failed_internal:dial tcp timeout
                    since: 1760000000000
                  proxy_url: http://***:***@cliente-proxy.example:8080
                  proxy_fallback: internal
                  managed: true
                  last_test_at: 1760000000000
                  last_test_error: dial tcp timeout
                  validation_error: true
                properties:
                  mode:
                    type: string
                    enum:
                      - custom
                      - internal
                      - none
                    description: >-
                      Intenção persistida do cliente. Representa o modo salvo na instância, não necessariamente o
                      transporte em uso agora.
                    example: custom
                  effective_mode:
                    type: string
                    enum:
                      - custom
                      - internal
                      - direct
                    description: >-
                      Transporte efetivo em runtime. É o valor principal para entender por onde a sessão está saindo
                      neste momento.
                    example: internal
                  effective_detail:
                    type: string
                    enum:
                      - managed_pool
                      - internal_route
                      - relay
                    description: |
                      Detalhe opcional do transporte atual.
                      `managed_pool` = proxy interno gerenciado.
                      `internal_route` = rota interna dedicada do ambiente.
                      `relay` = túnel relay do cliente.
                      Quando não há detalhe adicional, o campo é omitido.
                    example: managed_pool
                  fallback:
                    type: object
                    description: >-
                      Estado do fallback runtime. Só fica ativo quando a instância precisou sair da rota principal
                      configurada.
                    properties:
                      active:
                        type: boolean
                        description: Indica se a instância está operando em fallback neste momento.
                        example: true
                      reason:
                        type: string
                        description: Motivo interno resumido do fallback atual, útil para observabilidade e suporte.
                        example: custom_failed_internal:dial tcp timeout
                      since:
                        type: integer
                        description: Timestamp Unix em milissegundos desde quando o fallback atual está ativo.
                        example: 1760000000000
                  proxy_url:
                    type: string
                    description: >-
                      URL mascarada do proxy persistido. Em fallback de proxy custom, continua mostrando a URL do
                      cliente; não troca para o proxy efetivo de contingência.
                    example: http://***:***@cliente-proxy.example:8080
                  proxy_fallback:
                    type: string
                    description: |
                      Política de contingência persistida para `mode=custom`.
                      Valores aceitos:
                        - `internal`
                        - `never`
                        - uma URL de proxy HTTP/HTTPS/SOCKS para contingência explícita
                    example: internal
                  managed:
                    type: boolean
                    description: >-
                      Campo legado indicando participação da infraestrutura interna. Pode ficar `true` tanto em
                      `mode=internal` quanto em fallback interno de `mode=custom`.
                    example: true
                  last_test_at:
                    type: integer
                    description: Timestamp Unix em milissegundos do último teste ou da última falha persistida.
                    example: 1760000000000
                  last_test_error:
                    type: string
                    description: Último erro persistido para diagnóstico. String vazia significa ausência de erro salvo.
                    example: dial tcp timeout
                  validation_error:
                    type: boolean
                    description: Indica se `last_test_error` está preenchido.
                    example: true
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '500':
          description: Erro interno do servidor ao recuperar a configuração
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
    post:
      operationId: updateProxyConfig
      tags:
        - Proxy
      summary: Configurar ou alterar o proxy
      description: >
        Define explicitamente um dos três estados aceitos:
          - `mode=custom`: usa um proxy próprio informado em `proxy_url`;
          - `mode=internal`: usa a infraestrutura interna; ou
          - `mode=none`: conexão direta, permitida apenas com `confirm_no_proxy=true`.

        Importante: `POST /instance/proxy` confirma que a configuração foi salva, não que o proxy já foi comprovado em
        uso.

        A validação operacional principal acontece no próximo ciclo real de conexão da instância.


        Em termos práticos:
          - `200 OK` aqui = configuração persistida com sucesso;
          - falhas reais de conectividade podem aparecer depois; e
          - para observar o estado real, consulte `GET /instance/proxy` e leia:
            - `effective_mode`
            - `effective_detail`
            - `fallback.active`
            - `last_test_error`
            - `validation_error`

        Quando `mode=custom`, você também pode definir a contingência via `proxy_fallback`:
          - `internal`: tenta a infraestrutura interna e, se ainda assim falhar, pode usar direto como último recurso;
          - `never`: não usa contingência; ou
          - uma URL de proxy de contingência controlada pelo próprio cliente.

        Quando `mode=internal`, `rotate_now: true` troca imediatamente o proxy interno persistido.

        Se houver mais de uma origem interna disponível, a plataforma escolhe outra origem sem expor o fornecedor.

        Se houver apenas uma origem, troca apenas o proxy/IP dentro dessa origem.


        Protocolos aceitos em URLs de proxy customizado:
          - `http://usuario:senha@host:porta`
          - `https://usuario:senha@host:porta`
          - `socks5://usuario:senha@host:porta`
          - `socks5h://usuario:senha@host:porta`

        O esquema `socks://` genérico não é aceito. Para proxies SOCKS, use `socks5://` ou `socks5h://`.
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            examples:
              custom_with_internal_fallback:
                summary: Proxy customizado com fallback interno
                value:
                  mode: custom
                  proxy_url: http://usuario:senha@proxy-do-cliente.example:8080
                  proxy_fallback: internal
              custom_with_explicit_backup_proxy:
                summary: Proxy customizado com proxy de contingência próprio
                value:
                  mode: custom
                  proxy_url: http://usuario:senha@proxy-principal.example:8080
                  proxy_fallback: socks5://backup:senha@proxy-backup.example:1080
              internal_now:
                summary: Modo interno
                value:
                  mode: internal
              internal_rotate_now:
                summary: Rotacionar proxy interno agora
                value:
                  mode: internal
                  rotate_now: true
              no_proxy:
                summary: Direto explícito
                value:
                  mode: none
                  confirm_no_proxy: true
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                    - custom
                    - internal
                    - none
                  description: Campo canônico para definir a estratégia de proxy.
                proxy_url:
                  type: string
                  description: |
                    Obrigatório quando `mode=custom`.
                    Protocolos aceitos: `http://`, `https://`, `socks5://` e `socks5h://`.
                    O esquema `socks://` genérico não é suportado; use `socks5://` ou `socks5h://`.
                  example: http://usuario:senha@ip:porta
                proxy_fallback:
                  type: string
                  description: >
                    Política de contingência para `mode=custom`.

                    Aceita `internal`, `never` ou uma URL de proxy de contingência usando `http://`, `https://`,
                    `socks5://` ou `socks5h://`.
                confirm_no_proxy:
                  type: boolean
                  description: Obrigatório quando `mode=none`.
                rotate_now:
                  type: boolean
                  description: >-
                    Quando `true` com `mode=internal`, troca imediatamente o proxy interno persistido sem expor o
                    fornecedor usado.
                  default: false
      responses:
        '200':
          description: Proxy configurado com sucesso
          content:
            application/json:
              examples:
                custom_internal_fallback_saved:
                  summary: Configuração salva; o uso real será confirmado no próximo ciclo de conexão
                  value:
                    details: Proxy configurado
                    proxy:
                      mode: custom
                      effective_mode: custom
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: http://***:***@proxy-do-cliente.example:8080
                      proxy_fallback: internal
                      managed: false
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
                    restart_requested: true
                after_connect_failure_example:
                  summary: Exemplo do que o GET pode mostrar depois se o proxy salvo falhar
                  value:
                    details: Proxy configurado
                    proxy:
                      mode: custom
                      effective_mode: custom
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: http://***:***@proxy-do-cliente.example:8080
                      proxy_fallback: internal
                      managed: false
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
                    restart_requested: true
                direct_explicit:
                  summary: Direto explícito
                  value:
                    details: Proxy configurado
                    proxy:
                      mode: none
                      effective_mode: direct
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: ''
                      proxy_fallback: internal
                      managed: false
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
                internal_rotated:
                  summary: Proxy interno rotacionado
                  value:
                    details: Proxy configurado
                    rotated: true
                    proxy:
                      mode: internal
                      effective_mode: internal
                      effective_detail: managed_pool
                      fallback:
                        active: false
                        reason: ''
                        since: 0
                      proxy_url: managed_pool://hidden
                      proxy_fallback: internal
                      managed: true
                      last_test_at: 0
                      last_test_error: ''
                      validation_error: false
              schema:
                type: object
                example:
                  details: Proxy configurado
                  proxy:
                    mode: custom
                    effective_mode: custom
                    fallback:
                      active: false
                      reason: ''
                      since: 0
                    proxy_url: http://***:***@proxy-do-cliente.example:8080
                    proxy_fallback: internal
                    managed: false
                    last_test_at: 0
                    last_test_error: ''
                    validation_error: false
                  restart_requested: true
                properties:
                  details:
                    type: string
                    example: Proxy configurado
                  proxy:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum:
                          - custom
                          - internal
                          - none
                        description: Intenção persistida do cliente após a gravação.
                      effective_mode:
                        type: string
                        enum:
                          - custom
                          - internal
                          - direct
                        description: Transporte efetivo no momento da resposta.
                      effective_detail:
                        type: string
                        enum:
                          - managed_pool
                          - internal_route
                          - relay
                        description: >-
                          Detalhe complementar do transporte efetivo. Quando não há detalhe adicional, o campo é
                          omitido.
                      fallback:
                        type: object
                        description: Estado do fallback runtime.
                        properties:
                          active:
                            type: boolean
                            description: Indica se a instância está operando em fallback neste momento.
                          reason:
                            type: string
                            description: Motivo interno resumido do fallback atual.
                          since:
                            type: integer
                            description: Timestamp Unix em milissegundos desde quando o fallback atual está ativo.
                      proxy_url:
                        type: string
                        description: URL mascarada do proxy persistido.
                      proxy_fallback:
                        type: string
                        description: Política de contingência persistida para `mode=custom`.
                      managed:
                        type: boolean
                        description: Campo legado ligado ao uso da infraestrutura interna.
                      last_test_at:
                        type: integer
                        description: Timestamp do último teste/erro persistido.
                      last_test_error:
                        type: string
                        description: Último erro persistido para diagnóstico.
                      validation_error:
                        type: boolean
                        description: Indica se `last_test_error` está preenchido.
                  restart_requested:
                    type: boolean
                    description: Indica se uma reinicialização da conexão foi solicitada para aplicar o proxy.
                  rotated:
                    type: boolean
                    description: Presente como `true` quando `rotate_now` troca o proxy interno com sucesso.
        '400':
          description: Payload inválido ou falha na validação do proxy
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: confirm_no_proxy é obrigatório para desabilitar proxy
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '409':
          description: Não há proxy alternativo disponível para rotação interna
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'nao foi possivel rotacionar proxy interno: nenhum proxy alternativo disponível para rotação'
        '500':
          description: Erro interno do servidor ao configurar o proxy
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
  /proxy-managed/cities:
    get:
      operationId: listRegionCities
      tags:
        - Proxy
      summary: Proxy Interno - Listar cidades disponíveis
      description: |
        Retorna a lista de cidades disponíveis para uso nos campos
        `proxy_managed_country`, `proxy_managed_state` e `proxy_managed_city` do endpoint
        `POST /instance/connect`.

        O backend consulta o catálogo disponível e aplica um cache interno de 24 horas.
        Se o catálogo de cidades não estiver disponível, o endpoint retorna erro.

        - Autenticação: requer `token` válido de qualquer instância (ou admin token via instância).
        - Query `country` (opcional): ISO alpha-2 minúsculo. Default `br`.
        - Query `state` (opcional): UF/subdivisão minúscula, como `sp`.
        - Query `search` (opcional): filtro parcial por nome/slug, insensível a acento/caixa.

        Como escolher a cidade:
        1. Use `br` em `proxy_managed_country`.
        2. Chame `GET /proxy-managed/cities?country=br` para obter as cidades brasileiras.
        3. Quando a cidade retornar `state`, envie também esse valor em `proxy_managed_state`.
        4. Quando o usuário escolher uma cidade, envie em `/instance/connect`:
           - `proxy_managed_country`: o país escolhido, ex. `br`
           - `proxy_managed_state`: o `state` retornado pela cidade, ex. `sp`, quando disponível
           - `proxy_managed_city`: sempre o `cities[].value`

        Se `state` não vier na cidade selecionada, envie apenas `proxy_managed_country` e `proxy_managed_city`.
        O backend valida a combinação e retorna erro se faltar algum dado necessário.

        Exemplo de requisição:
        ```
        GET /proxy-managed/cities?country=br&state=sp&search=camp
        ```
      parameters:
        - in: query
          name: country
          required: false
          schema:
            type: string
            pattern: ^[a-z]{2}$
            default: br
          description: ISO alpha-2 (minúsculo). Default `br`.
        - in: query
          name: state
          required: false
          schema:
            type: string
            pattern: ^[a-z0-9-]{1,16}$
          description: Filtra por UF/subdivisão quando o catálogo traz `state`. Para Brasil, use valores como `sp`, `rj`, `mg`.
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Filtro parcial por nome/slug (insensível a acento/caixa).
      responses:
        '200':
          description: Lista de cidades disponíveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  country:
                    type: string
                    example: br
                  state:
                    type: string
                    description: Retornado apenas quando a query `state` foi informada.
                    example: sp
                  cities:
                    type: array
                    items:
                      type: object
                      properties:
                        value:
                          type: string
                          description: Slug aceito em `proxy_managed_city`.
                          example: saopaulo
                        label:
                          type: string
                          description: Nome apresentável da cidade.
                          example: São Paulo
                        state:
                          type: string
                          description: Código ISO 3166-2 da subdivisão/estado quando disponível.
                          example: sp
                        state_label:
                          type: string
                          description: Nome apresentável do estado/subdivisão quando disponível.
                          example: São Paulo
                        raw_city:
                          type: string
                          description: Campo técnico para diagnóstico. Não envie este campo no `/instance/connect`; use `value`.
                          example: sao_paulo
              examples:
                brasil_enriquecido:
                  summary: Cidade brasileira enriquecida
                  value:
                    country: br
                    state: sp
                    cities:
                      - value: campinas
                        label: Campinas
                        state: sp
                        state_label: São Paulo
                        raw_city: campinas
                      - value: saopaulo
                        label: São Paulo
                        state: sp
                        state_label: São Paulo
                        raw_city: sao_paulo
                pais_sem_enriquecimento:
                  summary: Cidade fora do Brasil
                  value:
                    country: us
                    cities:
                      - value: losangeles
                        label: Los Angeles
        '400':
          description: country inválido (não é ISO alpha-2)
        '401':
          description: Token inválido/ausente
        '500':
          description: Erro interno
        '503':
          description: Provider indisponível ou catálogo de cidades inacessível
  /profile/name:
    post:
      operationId: updateProfileName
      tags:
        - Perfil
      summary: Altera o nome do perfil do WhatsApp
      description: |
        Altera o nome de exibição do perfil da conta do WhatsApp atualmente conectada.

        O endpoint realiza:
        - Atualiza o nome do perfil usando o WhatsApp AppState
        - Sincroniza a mudança com o servidor do WhatsApp
        - Retorna confirmação da alteração

        **Importante**: 
        - A conta do WhatsApp deve estar conectada
        - O nome será visível para todos os contatos
        - Pode haver um limite de alterações por período (conforme WhatsApp)
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Novo nome do perfil do WhatsApp
                  example: Minha Empresa - Atendimento
                  maxLength: 25
      responses:
        '200':
          description: Nome do perfil alterado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Nome do perfil alterado com sucesso
                  profile:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Novo nome do perfil
                        example: Minha Empresa - Atendimento
                      updated_at:
                        type: integer
                        description: Timestamp da alteração (Unix timestamp)
                        example: 1704067200
        '400':
          description: Dados inválidos na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Nome muito longo ou inválido
        '401':
          description: Sem sessão ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '403':
          description: Ação não permitida
