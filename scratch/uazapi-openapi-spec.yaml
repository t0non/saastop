  /newsletter/updates:
    post:
      operationId: getNewsletterMessageUpdates
      tags:
        - Newsletters e Canais
      summary: Buscar updates de mensagens de um canal
      description: |
        Consulta diretamente no WhatsApp os updates de posts já existentes de um canal.

        Esta rota é diferente de `/newsletter/messages`:
        - `/newsletter/messages` retorna o conteúdo dos posts
        - `/newsletter/updates` retorna mudanças posteriores nos posts, especialmente métricas

        Esta rota também não é um evento de webhook:
        - não existe webhook `newsletter_messages_update`
        - para views e reactions de canais, consulte `/newsletter/updates` sob demanda

        Casos de uso:
        - atualizar contadores de `views` de posts já carregados
        - atualizar `reactionCounts` de posts do canal
        - consultar sob demanda os mesmos tipos de métricas que chegam nos live updates internos do WhatsApp

        Observações:
        - use preferencialmente `afterid`
        - `afterid` filtra updates depois de um `serverid`
        - `since` filtra pelo momento do update
        - `since` aceita timestamp em segundos ou milissegundos
        - o retorno vem no campo `response`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: ID numérico do canal. Se informado sem domínio, será convertido para `@newsletter`.
                  example: '120363123456789012'
                jid:
                  type: string
                  description: JID completo do canal.
                  example: 120363123456789012@newsletter
                count:
                  type: integer
                  minimum: 1
                  description: Quantidade máxima de updates retornados.
                  example: 50
                afterid:
                  type: integer
                  minimum: 1
                  description: Retorna apenas updates posteriores ao `serverid` informado.
                  example: 12345
                since:
                  type: integer
                  description: |
                    Timestamp de corte.
                    - Se maior que `1000000000000`, é interpretado como milissegundos.
                    - Caso contrário, é interpretado como segundos.
                  example: 1710000000
            examples:
              por_after_id:
                summary: Buscar updates depois de um post conhecido
                value:
                  id: '120363123456789012'
                  count: 50
                  afterid: 12345
              por_since:
                summary: Buscar updates a partir de um timestamp
                value:
                  jid: 120363123456789012@newsletter
                  count: 50
                  since: 1710000000
      responses:
        '200':
          description: Updates de mensagens do canal recuperados com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    description: Lista de updates de mensagens do canal.
                    items:
                      type: object
                      properties:
                        serverid:
                          type: integer
                          description: Identificador do post no canal.
                          example: 12345
                        messageid:
                          type: string
                          description: ID lógico da mensagem.
                          example: 3EB0B4302B3A8A52F7A1
                        type:
                          type: string
                          description: Tipo da mensagem do canal.
                          example: text
                        timestamp:
                          type: string
                          format: date-time
                          description: Momento associado ao update retornado.
                        viewsCount:
                          type: integer
                          description: Quantidade atualizada de visualizações.
                          example: 1540
                        reactionCounts:
                          type: object
                          additionalProperties:
                            type: integer
                          description: Mapa atualizado de emoji para quantidade de reações.
                          example:
                            👍: 35
                            🔥: 11
                        message:
                          type: object
                          description: |
                            Conteúdo bruto da mensagem, quando presente.
                            Em muitos live updates esse campo pode vir ausente.
                          additionalProperties: true
              examples:
                sucesso:
                  value:
                    response:
                      - messageid: 3EB0B4302B3A8A52F7A1
                        serverid: 12345
                        type: text
                        timestamp: '2026-03-24T19:00:00Z'
                        viewsCount: 1540
                        reactionCounts:
                          👍: 35
                          🔥: 11
        '400':
          description: Payload inválido ou ID/JID do canal inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid newsletter id
        '401':
          description: Instância não autenticada ou cliente não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: client not found
        '500':
          description: Erro interno ao consultar updates do canal no WhatsApp
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: connection closed
