  /contacts:
    get:
      operationId: checkContacts
      tags:
        - Contatos
      summary: Retorna lista de contatos do WhatsApp
      description: |
        Retorna a lista de contatos do WhatsApp conforme o filtro informado em `contactScope`.

        O endpoint realiza:
        - Busca todos os contatos armazenados
        - Filtra para contatos da agenda, fora da agenda ou todos
        - Usa `address_book` como padrao quando `contactScope` nao for informado
        - Retorna dados formatados incluindo JID e informações de nome
      security:
        - token: []
      parameters:
        - in: query
          name: contactScope
          required: false
          schema:
            type: string
            enum:
              - address_book
              - outside_address_book
              - all
            default: address_book
          description: Define se a busca retorna apenas contatos da agenda, apenas fora da agenda ou todos os contatos conhecidos.
      responses:
        '200':
          description: Lista de contatos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    jid:
                      type: string
                      description: 'ID único do contato no WhatsApp (formato: número@s.whatsapp.net)'
                      example: 5511999999999@s.whatsapp.net
                    contact_name:
                      type: string
                      description: Nome completo do contato
                      example: Contato Exemplo
                    contact_FirstName:
                      type: string
                      description: Primeiro nome do contato
                      example: Contato
                  example:
                    jid: 5511999999999@s.whatsapp.net
                    contact_name: Contato Exemplo
                    contact_FirstName: Contato
        '401':
          description: Sem sessão ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
  /contacts/list:
    post:
      operationId: listContacts
      tags:
        - Contatos
      summary: Listar todos os contatos com paginacao
      description: >
        Retorna uma lista paginada de contatos da conta do WhatsApp atualmente conectada.

        Use este endpoint (POST) para controlar `limit` e `offset` via corpo da requisicao.

        O campo `contactScope` permite escolher entre contatos da agenda, fora da agenda ou todos os contatos
        conhecidos.

        A rota GET `/contacts` continua disponivel para quem prefere a lista completa sem paginacao.
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  description: Quantidade maxima de resultados por pagina (padrao 100, maximo 1000)
                  default: 100
                offset:
                  type: integer
                  description: Deslocamento base zero para paginacao
                  default: 0
                contactScope:
                  type: string
                  description: >-
                    Define se a busca retorna apenas contatos da agenda, apenas fora da agenda ou todos os contatos
                    conhecidos.
                  enum:
                    - address_book
                    - outside_address_book
                    - all
                  default: address_book
      responses:
        '200':
          description: Lista de contatos recuperada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        jid:
                          type: string
                          description: 'ID unico do contato no WhatsApp (formato: numero@s.whatsapp.net)'
                          example: 5511999999999@s.whatsapp.net
                        contact_name:
                          type: string
                          description: Nome completo do contato (quando salvo)
                          example: Joao Silva
                        contact_FirstName:
                          type: string
                          description: Primeiro nome do contato
                          example: Joao
                  totalDeviceContacts:
                    type: integer
                    description: Total bruto de contatos no dispositivo
                  pagination:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                        description: Total de contatos apos filtragem
                      limit:
                        type: integer
                        description: Limite aplicado na pagina atual
                      offset:
                        type: integer
                        description: Offset efetivamente usado na pagina atual
        '401':
          description: Token nao fornecido ou invalido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '500':
          description: Erro interno do servidor ao recuperar contatos
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem detalhando o erro encontrado
  /contact/add:
    post:
      operationId: addContact
      tags:
        - Contatos
      summary: Adiciona um contato à agenda
      description: |
        Adiciona um novo contato à agenda do celular.

        O endpoint realiza:
        - Adiciona o contato à agenda usando o WhatsApp
        - Usa o campo 'name' tanto para o nome completo quanto para o primeiro nome
        - Salva as informações do contato na agenda do WhatsApp
        - Retorna informações do contato adicionado
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - number
                - name
              properties:
                number:
                  type: string
                  description: |
                    Número de telefone no formato internacional com código do país obrigatório. 
                    Para Brasil, deve começar com 55. Aceita variações com/sem símbolo +, 
                    com/sem parênteses, com/sem hífen e com/sem espaços. Também aceita formato 
                    JID do WhatsApp (@s.whatsapp.net). Não aceita contatos comerciais (@lid) 
                    nem grupos (@g.us).
                  examples:
                    - +55 (21) 99999-9999
                    - +55 21 99999-9999
                    - +55 21 999999999
                    - '+5521999999999'
                    - '5521999999999'
                    - 5521999999999@s.whatsapp.net
                name:
                  type: string
                  description: Nome completo do contato (será usado como primeiro nome e nome completo)
                  example: João Silva
      responses:
        '200':
          description: Contato adicionado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Contato adicionado com sucesso
                  contact:
                    type: object
                    properties:
                      jid:
                        type: string
                        description: 'ID único do contato no WhatsApp (formato: número@s.whatsapp.net)'
                        example: 5511999999999@s.whatsapp.net
                      name:
                        type: string
                        description: Nome completo do contato
                        example: João Silva
                      phone:
                        type: string
                        description: Número de telefone
                        example: '5511999999999'
        '400':
          description: Dados inválidos na requisição
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Número inválido
        '401':
          description: Sem sessão ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No session
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Erro ao adicionar contato
