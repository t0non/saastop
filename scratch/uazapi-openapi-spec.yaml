  /message/presence:
    post:
      operationId: sendPresence
      tags:
        - Enviar Mensagem
      summary: Enviar atualização de presença
      description: |
        Envia uma atualização de presença para um contato ou grupo de forma **assíncrona**.

        ## 🔄 Comportamento Assíncrono:
        - **Execução independente**: A presença é gerenciada em background, não bloqueia o retorno da API
        - **Limite máximo**: 5 minutos de duração (300 segundos)
        - **Tick de atualização**: Reenvia a presença a cada 10 segundos
        - **Cancelamento automático**: Presença é cancelada automaticamente ao enviar uma mensagem para o mesmo chat

        ## 📱 Tipos de presença suportados:
        - **composing**: Indica que você está digitando uma mensagem
        - **recording**: Indica que você está gravando um áudio
        - **paused**: Remove/cancela a indicação de presença atual

        ## ⏱️ Controle de duração:
        - **Sem delay**: Usa limite padrão de 5 minutos
        - **Com delay**: Usa o valor especificado (máximo 5 minutos)
        - **Cancelamento**: Envio de mensagem cancela presença automaticamente

        ## 📋 Exemplos de uso:

        ### Digitar por 30 segundos:
        ```json
        {
          "number": "5511999999999",
          "presence": "composing",
          "delay": 30000
        }
        ```

        ### Gravar áudio por 1 minuto:
        ```json
        {
          "number": "5511999999999",
          "presence": "recording",
          "delay": 60000
        }
        ```

        ### Cancelar presença atual:
        ```json
        {
          "number": "5511999999999",
          "presence": "paused"
        }
        ```

        ### Usar limite máximo (5 minutos):
        ```json
        {
          "number": "5511999999999",
          "presence": "composing"
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: 'Número do destinatário no formato internacional (ex: 5511999999999)'
                  example: '5511999999999'
                presence:
                  type: string
                  description: Tipo de presença a ser enviada
                  enum:
                    - composing
                    - recording
                    - paused
                  example: composing
                delay:
                  type: integer
                  description: |
                    Duração em milissegundos que a presença ficará ativa (máximo 5 minutos = 300000ms).
                    Se não informado ou valor maior que 5 minutos, usa o limite padrão de 5 minutos.
                    A presença é reenviada a cada 10 segundos durante este período.
                  maximum: 300000
                  example: 30000
              required:
                - number
                - presence
      responses:
        '200':
          description: Presença atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: Mensagem de confirmação
                    example: Chat presence sent successfully
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro
                    example: Número inválido ou tipo de presença inválido
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro de autenticação
                    example: Token inválido ou expirado
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Descrição do erro interno
                    example: Erro ao enviar presença
  /send/status:
    post:
      operationId: sendStatus
      tags:
        - Enviar Mensagem
      summary: Enviar status (stories)
      description: >
        Envia um status do WhatsApp com suporte para texto, imagem, vídeo e áudio.


        Este endpoint possui 3 modos de uso:


        - envio normal: omita `recipients` e `max_recipients`

        - envio explícito: informe `recipients` para enviar apenas para números específicos; o backend aproveita os
        válidos e descarta os inválidos com motivo no `debug`

        - envio parcial: informe `max_recipients` para limitar a audiência ou aplicar um cap de segurança sobre
        `recipients`


        ## Observação importante sobre `recipients`

        Quando `recipients` é informado, o backend:


        - aceita números em formato WhatsApp, JIDs `@s.whatsapp.net` e JIDs `@lid`

        - quando recebe `@lid`, primeiro tenta resolver esse identificador para o PN (`@s.whatsapp.net`) usando o cache
        local de LID do WhatsApp

        - se o `@lid` não puder ser resolvido para PN, esse item é descartado com motivo `lid_unresolved`

        - valida se o destinatário existe no WhatsApp usando o mesmo fluxo de verificação do envio normal, com batch
        para evitar uma chamada remota por recipient

        - cruza os destinatários verificados com a audiência atual permitida pela privacidade do status, aceitando
        equivalência PN/LID quando o cache local conhece esse vínculo

        - recipients descartados aparecem em `debug.discarded_recipients`, com motivos como `invalid_format`,
        `lid_unresolved`, `not_on_whatsapp`, `outside_status_audience` e `duplicate`

        - a requisição só retorna `400` quando nenhum recipient válido sobra para envio


        ## Observação importante sobre `max_recipients`

        O campo `max_recipients` foi adicionado como mitigação operacional.

        Já observamos casos em que o WhatsApp bloqueia imediatamente o envio de status quando a audiência é muito grande

        (por exemplo, agendas com milhares de contatos, como ~3.000).

        A causa exata ainda não está totalmente clara, então a recomendação é começar com limites menores e aumentar
        gradualmente.


        ## Tipos suportados

        - `text`: texto com cor de fundo e fonte

        - `image`: imagem com legenda opcional

        - `video`: vídeo com legenda opcional

        - `audio`: áudio normal

        - `myaudio`: áudio enviado como voz

        - `ptt`: áudio enviado como voz


        ## Cores de fundo

        Informe um valor de `1` a `19`. O backend converte esse índice para a cor ARGB usada pelo WhatsApp.


        - `1`: amarelo esverdeado suave

        - `2`: amarelo pálido

        - `3`: amarelo alaranjado vibrante

        - `4`: verde vibrante

        - `5`: verde musgo

        - `6`: verde claro

        - `7`: azul piscina

        - `8`: azul intenso

        - `9`: azul claro acinzentado

        - `10`: lilás claro

        - `11`: lilás quente

        - `12`: roxo azulado

        - `13`: magenta profundo

        - `14`: rosa suave

        - `15`: salmão rosado

        - `16`: marrom claro

        - `17`: cinza claro azulado

        - `18`: cinza médio

        - `19`: cinza profundo padrão


        Exemplo rápido:

        - `7`: azul piscina

        - `13`: magenta profundo

        - `19`: cinza profundo (padrão)


        ## Fontes válidas para `type=text`

        Valores aceitos atualmente: `0`, `1`, `2`, `6`, `7`, `8`, `9`, `10`.


        ## Limites

        - `text`: máximo de 656 caracteres

        - `max_recipients`: não pode ser negativo

        - `recipients`: aceita números, JIDs `@s.whatsapp.net` e JIDs `@lid`

        - `@lid` só entra no envio quando puder ser resolvido localmente para um PN válido; caso contrário, é descartado

        - para tipos de mídia, `file` é obrigatório


        Exemplo de envio explícito:

        ```json

        {
          "type": "text",
          "text": "Novidades chegando!",
          "recipients": [
            "5511999999999",
            "5511888888888@s.whatsapp.net"
          ]
        }

        ```


        Exemplo de envio parcial:

        ```json

        {
          "type": "text",
          "text": "Novidades chegando!",
          "background_color": 7,
          "font": 1,
          "max_recipients": 100
        }

        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - text
                    - image
                    - video
                    - audio
                    - myaudio
                    - ptt
                  description: Tipo do status.
                  example: text
                text:
                  type: string
                  description: Texto principal ou legenda.
                  example: Novidades chegando!
                background_color:
                  type: integer
                  minimum: 1
                  maximum: 19
                  description: Índice da cor de fundo para status em texto.
                  example: 7
                font:
                  type: integer
                  enum:
                    - 0
                    - 1
                    - 2
                    - 6
                    - 7
                    - 8
                    - 9
                    - 10
                  description: Fonte aceita para `type=text`.
                  example: 1
                file:
                  type: string
                  description: URL ou base64 do arquivo de mídia.
                  example: https://example.com/video.mp4
                thumbnail:
                  type: string
                  description: Campo aceito no payload; o backend gera thumbnail automaticamente quando necessário.
                  example: https://example.com/thumb.jpg
                mimetype:
                  type: string
                  description: MIME type do arquivo, quando necessário.
                  example: video/mp4
                recipients:
                  type: array
                  description: >-
                    Lista explícita de destinatários. Aceita números em formato WhatsApp, JIDs `@s.whatsapp.net` e JIDs
                    `@lid`. O backend valida item a item, descarta os inválidos com motivo no `debug` e envia para o
                    subconjunto válido restante. Entradas `@lid` dependem de resolução local para PN.
                  items:
                    type: string
                  example:
                    - '5511999999999'
                    - 5511888888888@s.whatsapp.net
                max_recipients:
                  type: integer
                  minimum: 0
                  description: >-
                    Limita o envio a um subconjunto determinístico da audiência. Quando `recipients` for informado,
                    funciona como cap de segurança sobre a lista explícita já validada.
                  example: 100
              required:
                - type
      responses:
        '200':
          description: Status enviado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  Id:
                    type: string
                    description: ID da mensagem quando há envio real.
                    example: ABCD1234
                  content:
                    type: object
                    description: Conteúdo processado da mensagem quando há envio real.
                  messageTimestamp:
                    type: integer
                    description: Timestamp em milissegundos quando há envio real.
                    example: 1672531200000
                  status:
                    type: string
                    description: Status do envio quando há envio real.
                    example: Pending
                  debug:
                    type: object
                    description: Métricas agregadas da audiência e da seleção aplicada.
                    properties:
                      status_privacy_type:
                        type: string
                        example: contacts
                      audience_recipient_count:
                        type: integer
                        example: 245
                      total_contacts_in_store:
                        type: integer
                        example: 300
                      contacts_with_full_name:
                        type: integer
                        example: 245
                      contacts_with_push_name_only:
                        type: integer
                        example: 32
                      contacts_with_business_name_only:
                        type: integer
                        example: 23
                      used_default_privacy_fallback:
                        type: boolean
                        example: false
                      privacy_lookup_error:
                        type: string
                        example: privacy unavailable
                      explicit_recipients:
                        type: boolean
                        example: true
                      requested_recipient_count:
                        type: integer
                        example: 25
                      resolved_recipient_count:
                        type: integer
                        example: 20
                      discarded_recipient_count:
                        type: integer
                        example: 5
                      discarded_recipients:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: string
                              example: 144637553594388@lid
                            reason:
                              type: string
                              example: lid_unresolved
                      max_recipients:
                        type: integer
                        example: 100
                      selected_recipient_count:
                        type: integer
                        example: 100
                      partial_send:
                        type: boolean
                        example: true
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid font
                  debug:
                    type: object
                    description: >-
                      Presente especialmente quando `recipients` foi informado, para indicar quais itens foram
                      descartados antes de concluir que nenhum recipient válido sobrou.
        '401':
          description: Não autorizado
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'failed to determine status audience: privacy unavailable'
  /send/menu:
    post:
      operationId: sendMenu
      tags:
        - Enviar Mensagem
      summary: Enviar menu interativo (botões, carrosel, lista ou enquete)
      description: >
        Este endpoint oferece uma interface unificada para envio de quatro tipos principais de mensagens interativas:

        - Botões: Para ações rápidas e diretas

        - Carrosel de Botões: Para uma lista horizontal de botões com imagens

        - Listas: Para menus organizados em seções

        - Enquetes: Para coleta de opiniões e votações


        **Suporte a campos de rastreamento**: Este endpoint também suporta `track_source` e `track_id` documentados na
        tag **"Enviar Mensagem"**.


        ## Estrutura Base do Payload


        Todas as requisições seguem esta estrutura base:


        ```json

        {
          "number": "5511999999999",
          "type": "button|list|poll|carousel",
          "text": "Texto principal da mensagem",
          "choices": ["opções baseadas no tipo escolhido"],
          "footerText": "Texto do rodapé (opcional para botões e listas)",
          "listButton": "Texto do botão (para listas)",
          "selectableCount": "Número de opções selecionáveis (apenas para enquetes)"
        }

        ```


        ## Tipos de Mensagens Interativas


        ### 1. Botões (type: "button")


        Cria botões interativos com diferentes funcionalidades de ação.


        #### Campos Específicos

        - `footerText`: Texto opcional exibido abaixo da mensagem principal

        - `choices`: Array de opções que serão convertidas em botões


        #### Formatos de Botões

        Cada botão pode ser configurado usando `|` (pipe) ou `\n` (quebra de linha) como separadores:


        - **Botão de Resposta**: 
          - `"texto|id"` ou 
          - `"texto\nid"` ou 
          - `"texto"` (ID será igual ao texto)

        - **Botão de Cópia**: 
          - `"texto|copy:código"` ou 
          - `"texto\ncopy:código"`

        - **Botão de Chamada**: 
          - `"texto|call:+5511999999999"` ou 
          - `"texto\ncall:+5511999999999"`

        - **Botão de URL**: 
          - `"texto|https://exemplo.com"` ou 
          - `"texto|url:https://exemplo.com"`

        #### Botões com Imagem

        Para adicionar uma imagem aos botões, use o campo `imageButton` no payload:


        #### Exemplo com Imagem

        ```json

        {
          "number": "5511999999999",
          "type": "button",
          "text": "Escolha um produto:",
          "imageButton": "https://exemplo.com/produto1.jpg",
          "choices": [
            "Produto A|prod_a",
            "Mais Info|https://exemplo.com/produto-a",
            "Produto B|prod_b",
            "Ligar|call:+5511999999999"
          ],
          "footerText": "Produtos em destaque"
        }

        ```


        > **Suporte**: O campo `imageButton` aceita URLs ou imagens em base64.


        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "button",
          "text": "Como podemos ajudar?",
          "choices": [
            "Suporte Técnico|suporte",
            "Fazer Pedido|pedido",
            "Nosso Site|https://exemplo.com",
            "Falar Conosco|call:+5511999999999"
          ],
          "footerText": "Escolha uma das opções abaixo"
        }

        ```


        #### Limitações e Compatibilidade

        > **Importante**: Ao combinar botões de resposta com outros tipos (call, url, copy) na mesma mensagem, será
        exibido o aviso: "Não é possível exibir esta mensagem no WhatsApp Web. Abra o WhatsApp no seu celular para
        visualizá-la."


        ### 2. Listas (type: "list")


        Cria menus organizados em seções com itens selecionáveis.


        #### Campos Específicos

        - `listButton`: Texto do botão que abre a lista

        - `footerText`: Texto opcional do rodapé

        - `choices`: Array com seções e itens da lista


        #### Formato das Choices

        - `"[Título da Seção]"`: Inicia uma nova seção

        - `"texto|id|descrição"`: Item da lista com:
          - texto: Label do item
          - id: Identificador único, opcional
          - descrição: Texto descritivo adicional e opcional

        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "list",
          "text": "Catálogo de Produtos",
          "choices": [
            "[Eletrônicos]",
            "Smartphones|phones|Últimos lançamentos",
            "Notebooks|notes|Modelos 2024",
            "[Acessórios]",
            "Fones|fones|Bluetooth e com fio",
            "Capas|cases|Proteção para seu device"
          ],
          "listButton": "Ver Catálogo",
          "footerText": "Preços sujeitos a alteração"
        }

        ```


        ### 3. Enquetes (type: "poll")


        Cria enquetes interativas para votação.


        #### Campos Específicos

        - `selectableCount`: Número de opções que podem ser selecionadas (padrão: 1)

        - `choices`: Array simples com as opções de voto


        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "poll",
          "text": "Qual horário prefere para atendimento?",
          "choices": [
            "Manhã (8h-12h)",
            "Tarde (13h-17h)",
            "Noite (18h-22h)"
          ],
          "selectableCount": 1
        }

        ```


        ### 4. Carousel (type: "carousel")


        Cria um carrossel de cartões com imagens e botões interativos.


        #### Campos Específicos

        - `choices`: Array com elementos do carrossel na seguinte ordem:
          - `[Texto do cartão]`: Texto do cartão entre colchetes
          - `{URL ou base64 da imagem}`: Imagem entre chaves
          - Botões do cartão (um por linha):
            - `"texto|copy:código"` para botão de copiar
            - `"texto|https://url"` para botão de link
            - `"texto|call:+número"` para botão de ligação

        #### Exemplo Completo

        ```json

        {
          "number": "5511999999999",
          "type": "carousel",
          "text": "Conheça nossos produtos",
          "choices": [
            "[Smartphone XYZ\nO mais avançado smartphone da linha]",
            "{https://exemplo.com/produto1.jpg}",
            "Copiar Código|copy:PROD123",
            "Ver no Site|https://exemplo.com/xyz",
            "Fale Conosco|call:+5511999999999",
            "[Notebook ABC\nO notebook ideal para profissionais]",
            "{https://exemplo.com/produto2.jpg}",
            "Copiar Código|copy:NOTE456",
            "Comprar Online|https://exemplo.com/abc",
            "Suporte|call:+5511988888888"
          ]
        }

        ```


        > **Nota**: Criamos outro endpoint para carrossel: `/send/carousel`, funciona da mesma forma, mas com outro
        formato de payload. Veja o que é mais fácil para você.


        ## Termos de uso


        Os recursos de botões interativos e listas podem ser descontinuados a qualquer momento sem aviso prévio. Não nos
        responsabilizamos por quaisquer alterações ou indisponibilidade destes recursos.


        ### Alternativas e Compatibilidade


        Considerando a natureza dinâmica destes recursos, nosso endpoint foi projetado para facilitar a migração entre
        diferentes tipos de mensagens (botões, listas e enquetes). 


        Recomendamos criar seus fluxos de forma flexível, preparados para alternar entre os diferentes tipos.


        Em caso de descontinuidade de algum recurso, você poderá facilmente migrar para outro tipo de mensagem apenas
        alterando o campo "type" no payload, mantendo a mesma estrutura de choices.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: >-
                    ID do chat para o qual a mensagem será enviada. Pode ser um número de telefone em formato
                    internacional, um ID de grupo (`@g.us`), um ID de usuário (com `@s.whatsapp.net` ou `@lid`).
                  example: '5511999999999'
                type:
                  type: string
                  description: Tipo do menu (button, list, poll, carousel)
                  enum:
                    - button
                    - list
                    - poll
                    - carousel
                  example: list
                text:
                  type: string
                  description: Texto principal (aceita placeholders)
                  example: 'Escolha uma opção:'
                footerText:
                  type: string
                  description: Texto do rodapé (opcional)
                  example: Menu de serviços
                listButton:
                  type: string
                  description: Texto do botão principal
                  example: Ver opções
                selectableCount:
                  type: integer
                  description: Número máximo de opções selecionáveis (para enquetes)
                  example: 1
                choices:
                  type: array
                  description: Lista de opções. Use [Título] para seções em listas
                  items:
                    type: string
                  example:
                    - '[Eletrônicos]'
                    - Smartphones|phones|Últimos lançamentos
                    - Notebooks|notes|Modelos 2024
                    - '[Acessórios]'
                    - Fones|fones|Bluetooth e com fio
                    - Capas|cases|Proteção para seu device
                imageButton:
                  type: string
                  description: 'URL da imagem para botões (recomendado para type: button)'
                  example: https://exemplo.com/imagem-botao.jpg
                replyid:
                  type: string
                  description: ID da mensagem para responder
                  example: 3EB0538DA65A59F6D8A251
                mentions:
                  type: string
                  description: Números para mencionar (separados por vírgula)
                  example: 5511999999999,5511888888888
                readchat:
                  type: boolean
                  description: Marca conversa como lida após envio
                  example: true
                readmessages:
                  type: boolean
                  description: Marca últimas mensagens recebidas como lidas
                  example: true
                delay:
                  type: integer
                  description: Atraso em milissegundos antes do envio, durante o atraso apacerá 'Digitando...'
                  example: 1000
                track_source:
                  type: string
                  description: Origem do rastreamento da mensagem
                  example: chatwoot
                track_id:
                  type: string
                  description: ID para rastreamento da mensagem (aceita valores duplicados)
                  example: msg_123456789
                async:
                  type: boolean
                  description: Se true, envia a mensagem de forma assíncrona via fila interna
                  example: false
              required:
                - number
                - type
                - text
                - choices
      responses:
        '200':
          description: Menu enviado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../schemas/message.yaml#/Message
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          status:
                            type: string
                            example: success
                          message:
                            type: string
                            example: Menu sent successfully
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing required fields or invalid menu type
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid token
        '429':
          description: Limite de requisições excedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Rate limit exceeded
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to send menu
  /send/carousel:
    post:
      operationId: sendCarousel
      tags:
        - Enviar Mensagem
      summary: Enviar carrossel de mídia com botões
      description: >
        Este endpoint permite enviar um carrossel com imagens e botões interativos.

        Funciona de maneira igual ao endpoint `/send/menu` com type: carousel, porém usando outro formato de payload.


        ## Campos Comuns


        Este endpoint suporta todos os **campos opcionais comuns** documentados na tag **"Enviar Mensagem"**, incluindo:

        `delay`, `readchat`, `readmessages`, `replyid`, `mentions`, `forward`, `track_source`, `track_id`, placeholders
        e envio para grupos.


        ## Estrutura do Payload


        ```json

        {
          "number": "5511999999999",
          "text": "Texto principal",
          "carousel": [
            {
              "text": "Texto do cartão",
              "image": "URL da imagem",
              "buttons": [
                {
                  "id": "resposta1",
                  "text": "Texto do botão",
                  "type": "REPLY"
                }
              ]
            }
          ],
          "delay": 1000,
          "readchat": true
        }

        ```


        ## Tipos de Botões


        - `REPLY`: Botão de resposta rápida
          - Quando clicado, envia o valor do id como resposta ao chat
          - O id será o texto enviado como resposta

        - `URL`: Botão com link
          - Quando clicado, abre a URL especificada
          - O id deve conter a URL completa (ex: https://exemplo.com)

        - `COPY`: Botão para copiar texto
          - Quando clicado, copia o texto para a área de transferência
          - O id será o texto que será copiado

        - `CALL`: Botão para realizar chamada
          - Quando clicado, inicia uma chamada telefônica
          - O id deve conter o número de telefone

        ## Exemplo de Botões

        ```json

        {
          "buttons": [
            {
              "id": "Sim, quero comprar!",
              "text": "Confirmar Compra",
              "type": "REPLY"
            },
            {
              "id": "https://exemplo.com/produto",
              "text": "Ver Produto",
              "type": "URL"
            },
            {
              "id": "CUPOM20",
              "text": "Copiar Cupom",
              "type": "COPY"
            },
            {
              "id": "5511999999999",
              "text": "Falar com Vendedor",
              "type": "CALL"
            }
          ]
        }

        ```


        ## Exemplo Completo de Carrossel

        ```json

        {
          "number": "5511999999999",
          "text": "Nossos Produtos em Destaque",
          "carousel": [
            {
              "text": "Smartphone XYZ\nO mais avançado smartphone da linha",
              "image": "https://exemplo.com/produto1.jpg",
              "buttons": [
                {
                  "id": "SIM_COMPRAR_XYZ",
                  "text": "Comprar Agora",
                  "type": "REPLY"
                },
                {
                  "id": "https://exemplo.com/xyz",
                  "text": "Ver Detalhes",
                  "type": "URL"
                }
              ]
            },
            {
