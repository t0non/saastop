            schema:
              type: object
              properties:
                limit:
                  type: integer
                  example: 20
                view:
                  type: string
                  example: RECOMMENDED
                countryCodes:
                  type: array
                  items:
                    type: string
                  example:
                    - BR
                searchText:
                  type: string
                  example: promo
                after:
                  type: string
                  example: YXJyYXljb25uZWN0aW9uOjE5
      responses:
        '200':
          description: Pesquisa executada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      after:
                        type: string
                        nullable: true
                        example: YXJyYXljb25uZWN0aW9uOjIw
                      data:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
