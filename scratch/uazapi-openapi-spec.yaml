                  example: 123e4567-e89b-12d3-a456-426614174000
                pixType:
                  type: string
                  description: Tipo da chave PIX (`CPF`, `CNPJ`, `PHONE`, `EMAIL`, `EVP`). Padrão `EVP`
                  example: EVP
                pixName:
